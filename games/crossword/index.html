<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Crossword - LawGames</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    /* ========================================================================
       MINI CROSSWORD GAME STYLES
       ======================================================================== */

    .crossword-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }

    .crossword-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .puzzle-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--color-text-secondary);
    }

    .puzzle-selector button {
      background-color: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .puzzle-selector button:hover:not(:disabled) {
      background-color: var(--color-bg-tertiary);
    }

    .puzzle-selector button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .timer {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-primary);
      font-family: monospace;
      min-width: 60px;
      text-align: right;
    }

    .current-clue {
      background-color: var(--color-bg-secondary);
      border-left: 4px solid var(--color-subject-crim);
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      min-height: 40px;
    }

    .current-clue-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .current-clue-text {
      font-size: 16px;
      color: var(--color-text-primary);
      line-height: 1.4;
    }

    /* Crossword Grid */
    .crossword-grid {
      display: flex;
      flex-direction: column;
      border: 2px solid var(--color-text-primary);
      background-color: var(--color-text-primary);
      margin-bottom: 24px;
      border-radius: 2px;
      max-width: 350px;
    }

    .grid-row {
      display: flex;
    }

    .grid-cell {
      position: relative;
      aspect-ratio: 1;
      flex: 1;
      min-width: 50px;
      border: 1px solid var(--color-text-primary);
      background-color: var(--color-bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      font-weight: 600;
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      transition: background-color 0.15s;
      user-select: none;
    }

    .grid-cell.black {
      background-color: var(--color-text-primary);
      cursor: default;
    }

    .grid-cell.selected {
      background-color: var(--color-subject-crim);
      color: white;
    }

    .grid-cell.current-word {
      background-color: rgba(196, 48, 43, 0.1);
    }

    .grid-cell.current-word.selected {
      background-color: var(--color-subject-crim);
      color: white;
    }

    .grid-cell.error {
      background-color: rgba(239, 68, 68, 0.15);
      color: var(--color-wrong);
    }

    .grid-cell .cell-number {
      position: absolute;
      top: 2px;
      left: 2px;
      font-size: 10px;
      font-weight: 700;
      color: var(--color-text-primary);
      line-height: 1;
    }

    .grid-cell.current-word .cell-number {
      color: var(--color-text-primary);
    }

    .grid-cell.selected .cell-number {
      color: white;
    }

    /* Mobile responsive grid */
    @media (max-width: 480px) {
      .grid-cell {
        min-width: 40px;
        font-size: 18px;
      }

      .grid-cell .cell-number {
        font-size: 8px;
      }
    }

    /* Clues Section */
    .clues-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .clues-column {
      display: flex;
      flex-direction: column;
    }

    .clues-column h3 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      margin: 0 0 12px 0;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--color-border);
    }

    .clue-item {
      padding: 8px 0;
      cursor: pointer;
      font-size: 14px;
      color: var(--color-text-secondary);
      transition: all 0.2s;
      border-radius: 4px;
      padding: 8px 4px;
      margin: 0 -4px;
    }

    .clue-item:hover {
      background-color: var(--color-bg-secondary);
      color: var(--color-text-primary);
    }

    .clue-item.active {
      background-color: var(--color-subject-crim);
      color: white;
      font-weight: 600;
    }

    .clue-number {
      font-weight: 600;
      margin-right: 4px;
    }

    /* Controls */
    .game-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .game-button {
      flex: 1;
      min-width: 120px;
      padding: 12px 16px;
      border: 1px solid var(--color-border);
      background-color: var(--color-bg-secondary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      color: var(--color-text-primary);
    }

    .game-button:hover:not(:disabled) {
      background-color: var(--color-bg-tertiary);
    }

    .game-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .game-button.primary {
      background-color: var(--color-subject-crim);
      color: white;
      border-color: var(--color-subject-crim);
    }

    .game-button.primary:hover:not(:disabled) {
      opacity: 0.9;
    }

    /* Completion Modal */
    .completion-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .completion-content {
      background-color: var(--color-bg-primary);
      border-radius: 8px;
      padding: 32px;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease-in-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .completion-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .completion-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 12px;
    }

    .completion-time {
      font-size: 32px;
      font-weight: 700;
      color: var(--color-subject-crim);
      margin-bottom: 20px;
      font-family: monospace;
    }

    .completion-stats {
      background-color: var(--color-bg-secondary);
      padding: 16px;
      border-radius: 4px;
      margin-bottom: 20px;
      text-align: left;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 14px;
    }

    .completion-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .completion-actions button {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--color-border);
      background-color: var(--color-bg-secondary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      color: var(--color-text-primary);
    }

    .completion-actions button:hover {
      background-color: var(--color-bg-tertiary);
    }

    .completion-actions button.primary {
      background-color: var(--color-subject-crim);
      color: white;
      border-color: var(--color-subject-crim);
    }

    .completion-actions button.primary:hover {
      opacity: 0.9;
    }

    /* Confetti animation */
    @keyframes confetti-fall {
      to {
        transform: translateY(100vh) rotateZ(360deg);
        opacity: 0;
      }
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background-color: var(--color-subject-crim);
      opacity: 1;
      pointer-events: none;
      animation: confetti-fall 3s ease-in forwards;
    }

    /* Share button styling */
    .share-text {
      word-break: break-all;
      white-space: pre-wrap;
      font-size: 12px;
      font-family: monospace;
      max-height: 100px;
      overflow-y: auto;
    }

  </style>
</head>
<body>
  <div id="app"></div>
  <script src="../../shared.js"></script>
    <script src="../../navbar.js"></script>
  <script>
        var CROSSWORD_DATA = {
  "puzzles": [
    {
      "id": 1,
      "title": "Criminal Law Basics",
      "size": 7,
      "grid": [
        ["M","A","L","I","C","E","#"],
        ["#","#","#","#","#","N","#"],
        ["F","E","L","O","N","Y","#"],
        ["#","#","#","#","#","S","#"],
        ["L","A","R","C","E","N","Y"],
        ["#","#","#","#","#","#","#"],
        ["A","L","I","B","I","#","#"]
      ],
      "clues": {
        "across": [
          {"number": 1, "row": 0, "col": 0, "answer": "MALICE", "clue": "State of mind required for first-degree murder"},
          {"number": 3, "row": 2, "col": 0, "answer": "FELONY", "clue": "Serious crime typically punishable by more than one year"},
          {"number": 5, "row": 4, "col": 0, "answer": "LARCENY", "clue": "Unlawful taking and carrying away of property"},
          {"number": 7, "row": 6, "col": 0, "answer": "ALIBI", "clue": "Defense proving defendant was elsewhere"}
        ],
        "down": [
          {"number": 2, "row": 0, "col": 5, "answer": "ENSY", "clue": "Words with Y ending"}
        ]
      }
    },
    {
      "id": 2,
      "title": "Constitutional Law",
      "size": 7,
      "grid": [
        ["R","I","G","H","T","S","#"],
        ["#","#","#","#","#","P","#"],
        ["A","M","E","N","D","#","#"],
        ["#","#","#","#","#","E","#"],
        ["E","Q","U","A","L","#","#"],
        ["#","#","#","#","#","C","#"],
        ["D","U","E","#","#","H","#"]
      ],
      "clues": {
        "across": [
          {"number": 1, "row": 0, "col": 0, "answer": "RIGHTS", "clue": "First ten amendments are the Bill of ___"},
          {"number": 3, "row": 2, "col": 0, "answer": "AMEND", "clue": "To formally change the Constitution"},
          {"number": 5, "row": 4, "col": 0, "answer": "EQUAL", "clue": "___ protection clause of the 14th Amendment"},
          {"number": 7, "row": 6, "col": 0, "answer": "DUE", "clue": "___ process: fundamental fairness requirement"}
        ],
        "down": [
          {"number": 2, "row": 0, "col": 5, "answer": "SPEECH", "clue": "First Amendment protects freedom of ___"}
        ]
      }
    },
    {
      "id": 3,
      "title": "Tort Law",
      "size": 9,
      "grid": [
        ["N","E","G","L","I","G","E","N","C","E"],
        ["#","#","#","#","#","#","#","#","A","#"],
        ["T","O","R","T","#","D","U","T","Y","#"],
        ["#","#","#","#","#","R","#","#","#","#"],
        ["#","#","#","#","#","E","#","#","#","#"],
        ["B","R","E","A","C","H","#","#","#","#"],
        ["#","#","#","#","#","#","#","#","#","#"],
        ["D","A","M","A","G","E","S","#","#","#"],
        ["#","#","#","#","#","#","#","P","#","#"],
        ["P","R","O","X","I","M","A","T","E","#"]
      ],
      "clues": {
        "across": [
          {"number": 1, "row": 0, "col": 0, "answer": "NEGLIGENCE", "clue": "Failure to exercise reasonable care"},
          {"number": 3, "row": 2, "col": 0, "answer": "TORT", "clue": "Civil wrong giving rise to a lawsuit"},
          {"number": 4, "row": 2, "col": 5, "answer": "DUTY", "clue": "First element plaintiff must prove in negligence"},
          {"number": 6, "row": 5, "col": 0, "answer": "BREACH", "clue": "Violation of the standard of care"},
          {"number": 7, "row": 7, "col": 0, "answer": "DAMAGES", "clue": "Monetary compensation for injury"},
          {"number": 9, "row": 9, "col": 0, "answer": "PROXIMATE", "clue": "___ cause: legal causation requirement"}
        ],
        "down": [
          {"number": 2, "row": 0, "col": 8, "answer": "BATTERY", "clue": "Intentional harmful or offensive contact"},
          {"number": 5, "row": 2, "col": 6, "answer": "ASSAULT", "clue": "Intentional act causing apprehension of imminent contact"}
        ]
      }
    }
  ]
};

    'use strict';

    // ========================================================================
    // MINI CROSSWORD GAME
    // ========================================================================

    const CrosswordGame = {
      // Game state
      currentPuzzle: null,
      currentPuzzleIndex: 0,
      puzzles: [],
      grid: [],
      userInput: [],
      selectedCell: null,
      selectedDirection: 'across', // 'across' or 'down'
      timerInterval: null,
      startTime: null,
      gameStarted: false,
      gameCompleted: false,
      showErrors: false,

      /**
       * Initialize the game
       */
      async init() {
        // Initialize theme
        LawGames.initTheme();

        // Load puzzle data
        try {
          const data = CROSSWORD_DATA;
          this.puzzles = data.puzzles;

          if (this.puzzles.length === 0) {
            this.renderError('No puzzles found');
            return;
          }

          // Start with first puzzle
          this.loadPuzzle(0);
          this.render();
        } catch (error) {
          console.error('Failed to load crossword data:', error);
          this.renderError('Failed to load puzzles: ' + error.message);
        }
      },

      /**
       * Load a puzzle by index
       */
      loadPuzzle(index) {
        if (index < 0 || index >= this.puzzles.length) return;

        this.currentPuzzleIndex = index;
        this.currentPuzzle = this.puzzles[index];

        // Initialize user input grid
        this.userInput = this.currentPuzzle.grid.map(row => row.map(() => ''));

        // Initialize grid helper
        this.grid = this.currentPuzzle.grid;

        // Reset game state
        this.selectedCell = null;
        this.selectedDirection = 'across';
        this.timerInterval = null;
        this.startTime = null;
        this.gameStarted = false;
        this.gameCompleted = false;
        this.showErrors = false;

        // Mark puzzle as played
        LawGames.markPuzzlePlayed('crossword', this.currentPuzzle.id);
      },

      /**
       * Get cell number for a position
       */
      getCellNumber(row, col) {
        // Find if this is a clue starting cell
        const allClues = [
          ...this.currentPuzzle.clues.across,
          ...this.currentPuzzle.clues.down
        ];

        for (const clue of allClues) {
          if (clue.row === row && clue.col === col) {
            return clue.number;
          }
        }
        return null;
      },

      /**
       * Get all cells for a word (across or down) starting at a position
       */
      getWordCells(row, col, direction) {
        const cells = [];

        if (direction === 'across') {
          // Go left to find start
          let startCol = col;
          while (startCol > 0 && this.grid[row][startCol - 1] !== '#') {
            startCol--;
          }
          // Collect cells
          for (let c = startCol; c < this.grid[row].length && this.grid[row][c] !== '#'; c++) {
            cells.push([row, c]);
          }
        } else {
          // Go up to find start
          let startRow = row;
          while (startRow > 0 && this.grid[startRow - 1][col] !== '#') {
            startRow--;
          }
          // Collect cells
          for (let r = startRow; r < this.grid.length && this.grid[r][col] !== '#'; r++) {
            cells.push([r, col]);
          }
        }

        return cells;
      },

      /**
       * Get the current word's cells based on selected cell and direction
       */
      getCurrentWordCells() {
        if (!this.selectedCell) return [];
        return this.getWordCells(this.selectedCell[0], this.selectedCell[1], this.selectedDirection);
      },

      /**
       * Get the clue for the current selection
       */
      getCurrentClue() {
        if (!this.selectedCell) return null;

        const [row, col] = this.selectedCell;
        const clues = this.selectedDirection === 'across'
          ? this.currentPuzzle.clues.across
          : this.currentPuzzle.clues.down;

        // Find the clue that covers this cell
        for (const clue of clues) {
          const cells = this.getWordCells(clue.row, clue.col, this.selectedDirection);
          if (cells.some(([r, c]) => r === row && c === col)) {
            return clue;
          }
        }

        return null;
      },

      /**
       * Select a cell and optionally toggle direction
       */
      selectCell(row, col, toggleDirection = false) {
        // Can't select black cells
        if (this.grid[row][col] === '#') return;

        if (toggleDirection && this.selectedCell && this.selectedCell[0] === row && this.selectedCell[1] === col) {
          // Toggle direction
          this.selectedDirection = this.selectedDirection === 'across' ? 'down' : 'across';
        } else {
          // New selection
          this.selectedCell = [row, col];
          this.selectedDirection = 'across';
        }

        // Focus hidden input for native keyboard
        const hiddenInput = document.getElementById('hidden-keyboard-input');
        if (hiddenInput) {
          setTimeout(() => hiddenInput.focus(), 0);
        }

        this.render();
      },

      /**
       * Handle keyboard input
       */
      handleKeyDown(event) {
        if (this.gameCompleted) return;

        const key = event.key.toUpperCase();

        // Letter input
        if (/^[A-Z]$/.test(key)) {
          event.preventDefault();
          if (this.selectedCell) {
            this.inputLetter(key);
            if (!this.gameStarted) {
              this.startTimer();
            }
          }
        }
        // Backspace
        else if (event.key === 'Backspace') {
          event.preventDefault();
          this.deleteLetter();
        }
        // Arrow keys
        else if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
          event.preventDefault();
          this.moveSelection(event.key);
        }
        // Tab - next word
        else if (event.key === 'Tab') {
          event.preventDefault();
          this.moveToNextWord();
        }
      },

      /**
       * Input a letter at the selected cell
       */
      inputLetter(letter) {
        if (!this.selectedCell) return;

        const [row, col] = this.selectedCell;
        const wordCells = this.getCurrentWordCells();

        // Find current position in word
        let currentPos = wordCells.findIndex(([r, c]) => r === row && c === col);

        // Input the letter
        this.userInput[row][col] = letter;
        this.showErrors = false;

        // Move to next cell in word
        if (currentPos < wordCells.length - 1) {
          const [nextRow, nextCol] = wordCells[currentPos + 1];
          this.selectCell(nextRow, nextCol, false);
        } else {
          // Auto-advance to next incomplete word
          this.moveToNextIncompleteWord();
        }

        this.render();
      },

      /**
       * Delete letter at selected cell
       */
      deleteLetter() {
        if (!this.selectedCell) return;

        const [row, col] = this.selectedCell;

        if (this.userInput[row][col]) {
          // Delete and stay
          this.userInput[row][col] = '';
          this.showErrors = false;
        } else {
          // Move back and delete
          const wordCells = this.getCurrentWordCells();
          let currentPos = wordCells.findIndex(([r, c]) => r === row && c === col);

          if (currentPos > 0) {
            const [prevRow, prevCol] = wordCells[currentPos - 1];
            this.selectCell(prevRow, prevCol, false);
            this.userInput[prevRow][prevCol] = '';
            this.showErrors = false;
          }
        }

        this.render();
      },

      /**
       * Move selection with arrow keys
       */
      moveSelection(key) {
        if (!this.selectedCell) return;

        let [row, col] = this.selectedCell;
        const size = this.currentPuzzle.size;

        if (key === 'ArrowUp' && row > 0) row--;
        else if (key === 'ArrowDown' && row < size - 1) row++;
        else if (key === 'ArrowLeft' && col > 0) col--;
        else if (key === 'ArrowRight' && col < size - 1) col++;

        // Skip black cells
        while (row >= 0 && row < size && col >= 0 && col < size && this.grid[row][col] === '#') {
          if (key === 'ArrowUp') row--;
          else if (key === 'ArrowDown') row++;
          else if (key === 'ArrowLeft') col--;
          else if (key === 'ArrowRight') col++;
          else break;

          if (row < 0 || row >= size || col < 0 || col >= size) break;
        }

        if (row >= 0 && row < size && col >= 0 && col < size && this.grid[row][col] !== '#') {
          this.selectCell(row, col, false);
        }
      },

      /**
       * Move to next word (Tab)
       */
      moveToNextWord() {
        if (!this.selectedCell) return;

        const [row, col] = this.selectedCell;
        const size = this.currentPuzzle.size;

        // Look for next clue position
        for (let r = row; r < size; r++) {
          const startCol = r === row ? col + 1 : 0;
          for (let c = startCol; c < size; c++) {
            if (this.grid[r][c] !== '#' && this.getCellNumber(r, c) !== null) {
              this.selectCell(r, c, false);
              return;
            }
          }
        }

        // Wrap around to first clue
        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            if (this.grid[r][c] !== '#' && this.getCellNumber(r, c) !== null) {
              this.selectCell(r, c, false);
              return;
            }
          }
        }
      },

      /**
       * Move to next incomplete word
       */
      moveToNextIncompleteWord() {
        const size = this.currentPuzzle.size;

        // Check all cells after current position
        if (this.selectedCell) {
          const [row, col] = this.selectedCell;

          for (let r = row; r < size; r++) {
            const startCol = r === row ? col + 1 : 0;
            for (let c = startCol; c < size; c++) {
              if (this.grid[r][c] !== '#' && this.userInput[r][c] === '') {
                this.selectCell(r, c, false);
                return;
              }
            }
          }
        }

        // Check all cells from beginning
        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            if (this.grid[r][c] !== '#' && this.userInput[r][c] === '') {
              this.selectCell(r, c, false);
              return;
            }
          }
        }
      },

      /**
       * Start the timer
       */
      startTimer() {
        if (this.gameStarted) return;

        this.gameStarted = true;
        this.startTime = Date.now();

        this.timerInterval = setInterval(() => {
          this.render();
        }, 1000);
      },

      /**
       * Get formatted timer string
       */
      getFormattedTime() {
        if (!this.startTime) return '0:00';

        const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;

        return minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
      },

      /**
       * Check if puzzle is complete and correct
       */
      isPuzzleComplete() {
        const size = this.currentPuzzle.size;

        // Check all cells are filled
        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            if (this.grid[r][c] !== '#' && this.userInput[r][c] === '') {
              return false;
            }
          }
        }

        // Check all answers are correct
        return this.isAnswerCorrect();
      },

      /**
       * Check if answer is correct
       */
      isAnswerCorrect() {
        const size = this.currentPuzzle.size;

        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            if (this.grid[r][c] !== '#' && this.userInput[r][c] !== this.grid[r][c]) {
              return false;
            }
          }
        }

        return true;
      },

      /**
       * Mark incorrect cells
       */
      checkAnswers() {
        this.showErrors = true;

        if (this.isPuzzleComplete()) {
          this.completeGame();
        }

        this.render();
      },

      /**
       * Reveal current word
       */
      revealWord() {
        const wordCells = this.getCurrentWordCells();

        for (const [row, col] of wordCells) {
          this.userInput[row][col] = this.grid[row][col];
        }

        this.showErrors = false;

        // Check if completed
        if (this.isPuzzleComplete()) {
          this.completeGame();
        } else {
          this.moveToNextIncompleteWord();
        }

        this.render();
      },

      /**
       * Complete the game
       */
      completeGame() {
        clearInterval(this.timerInterval);
        this.gameCompleted = true;

        const elapsed = Math.floor((Date.now() - this.startTime) / 1000);

        // Create confetti
        this.createConfetti();

        // Record stats
        LawGames.recordGame('crossword', {
          won: true,
          score: Math.max(0, 100 - Math.floor(elapsed / 10)),
          topics: ['criminal-law']
        });

        this.render();
      },

      /**
       * Create confetti animation
       */
      createConfetti() {
        const colors = ['#C4302B', '#FF6B35', '#004E89', '#F77F00', '#06A77D'];

        for (let i = 0; i < 50; i++) {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + '%';
          confetti.style.top = '-10px';
          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.width = (Math.random() * 8 + 4) + 'px';
          confetti.style.height = confetti.style.width;
          confetti.style.delay = (Math.random() * 0.5) + 's';
          document.body.appendChild(confetti);

          setTimeout(() => confetti.remove(), 3000);
        }
      },

      /**
       * Handle keyboard key click from on-screen keyboard
       */
      /**
       * Handle input from hidden input element
       */
      handleHiddenInputChange(event) {
        const input = event.target;
        if (input.value) {
          const lastChar = input.value.slice(-1).toUpperCase();
          if (/^[A-Z]$/.test(lastChar) && this.selectedCell) {
            this.inputLetter(lastChar);
            if (!this.gameStarted) {
              this.startTimer();
            }
          }
          input.value = '';
        }
      },

      /**
       * Handle keydown on hidden input element
       */
      handleHiddenInputKeydown(event) {
        if (event.key === 'Backspace') {
          event.preventDefault();
          this.deleteLetter();
        } else if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
          event.preventDefault();
          this.moveSelection(event.key);
          const input = document.getElementById('hidden-keyboard-input');
          if (input) input.focus();
        } else if (event.key === 'Tab') {
          event.preventDefault();
          this.moveToNextWord();
          const input = document.getElementById('hidden-keyboard-input');
          if (input) input.focus();
        }
      },

      /**
       * Share result
       */
      shareResult() {
        const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        const timeStr = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;

        const shareText =
          '⚖️ Mini Crossword #' + this.currentPuzzle.id + '\n' +
          'Solved in ' + timeStr + '\n' +
          'lawgames.github.io';

        LawGames.copyShareText(shareText, 'Share text copied!');
      },

      /**
       * Next puzzle
       */
      nextPuzzle() {
        if (this.currentPuzzleIndex < this.puzzles.length - 1) {
          this.loadPuzzle(this.currentPuzzleIndex + 1);
          this.render();
        }
      },

      /**
       * Previous puzzle
       */
      prevPuzzle() {
        if (this.currentPuzzleIndex > 0) {
          this.loadPuzzle(this.currentPuzzleIndex - 1);
          this.render();
        }
      },

      /**
       * Render the entire game
       */
      render() {
        const app = document.getElementById('app');
        app.innerHTML = '';

        // Header
        const header = LawGames.createHeader('Mini Crossword', true);
        app.appendChild(header);

        // Main container
        const container = document.createElement('div');
        container.className = 'crossword-container';

        // Header row with puzzle selector and timer
        const headerRow = document.createElement('div');
        headerRow.className = 'crossword-header';

        const puzzleSelector = document.createElement('div');
        puzzleSelector.className = 'puzzle-selector';

        const prevBtn = document.createElement('button');
        prevBtn.textContent = '← Prev';
        prevBtn.disabled = this.currentPuzzleIndex === 0;
        prevBtn.onclick = () => this.prevPuzzle();

        const puzzleLabel = document.createElement('span');
        puzzleLabel.textContent = 'Puzzle ' + (this.currentPuzzleIndex + 1) + ' of ' + this.puzzles.length;

        const nextBtn = document.createElement('button');
        nextBtn.textContent = 'Next →';
        nextBtn.disabled = this.currentPuzzleIndex === this.puzzles.length - 1;
        nextBtn.onclick = () => this.nextPuzzle();

        puzzleSelector.appendChild(prevBtn);
        puzzleSelector.appendChild(puzzleLabel);
        puzzleSelector.appendChild(nextBtn);

        const timer = document.createElement('div');
        timer.className = 'timer';
        timer.textContent = this.getFormattedTime();

        headerRow.appendChild(puzzleSelector);
        headerRow.appendChild(timer);
        container.appendChild(headerRow);

        // Current clue
        const currentClue = document.createElement('div');
        currentClue.className = 'current-clue';

        const clueLabel = document.createElement('div');
        clueLabel.className = 'current-clue-label';

        if (this.selectedCell) {
          const direction = this.selectedDirection === 'across' ? 'Across' : 'Down';
          clueLabel.textContent = direction;
        } else {
          clueLabel.textContent = 'Select a cell';
        }

        const clueText = document.createElement('div');
        clueText.className = 'current-clue-text';

        const currentClueObj = this.getCurrentClue();
        if (currentClueObj) {
          clueText.textContent = currentClueObj.number + '. ' + currentClueObj.clue;
        } else {
          clueText.textContent = '';
        }

        currentClue.appendChild(clueLabel);
        currentClue.appendChild(clueText);
        container.appendChild(currentClue);

        // Grid
        const gridContainer = document.createElement('div');
        gridContainer.className = 'crossword-grid';

        const size = this.currentPuzzle.size;
        const currentWordCells = this.getCurrentWordCells();

        for (let r = 0; r < size; r++) {
          const row = document.createElement('div');
          row.className = 'grid-row';

          for (let c = 0; c < size; c++) {
            const cell = document.createElement('div');
            const isBlack = this.grid[r][c] === '#';
            const isSelected = this.selectedCell && this.selectedCell[0] === r && this.selectedCell[1] === c;
            const isCurrentWord = currentWordCells.some(([cr, cc]) => cr === r && cc === c);

            cell.className = 'grid-cell';
            if (isBlack) cell.classList.add('black');
            if (isSelected) cell.classList.add('selected');
            if (isCurrentWord && !isBlack) cell.classList.add('current-word');

            // Check for errors
            if (this.showErrors && !isBlack && this.userInput[r][c] && this.userInput[r][c] !== this.grid[r][c]) {
              cell.classList.add('error');
            }

            if (!isBlack) {
              const cellNumber = this.getCellNumber(r, c);
              if (cellNumber !== null) {
                const numberEl = document.createElement('div');
                numberEl.className = 'cell-number';
                numberEl.textContent = cellNumber;
                cell.appendChild(numberEl);
              }

              const textEl = document.createElement('div');
              textEl.style.fontSize = '24px';
              textEl.textContent = this.userInput[r][c];
              cell.appendChild(textEl);

              cell.onclick = () => this.selectCell(r, c, true);
            }

            row.appendChild(cell);
          }

          gridContainer.appendChild(row);
        }

        container.appendChild(gridContainer);

        // Controls
        const controls = document.createElement('div');
        controls.className = 'game-controls';

        if (this.gameCompleted) {
          const shareBtn = document.createElement('button');
          shareBtn.className = 'game-button primary';
          shareBtn.textContent = 'Share';
          shareBtn.onclick = () => this.shareResult();
          controls.appendChild(shareBtn);
        } else {
          const checkBtn = document.createElement('button');
          checkBtn.className = 'game-button';
          checkBtn.textContent = 'Check';
          checkBtn.onclick = () => this.checkAnswers();
          controls.appendChild(checkBtn);

          const revealBtn = document.createElement('button');
          revealBtn.className = 'game-button';
          revealBtn.textContent = 'Reveal Word';
          revealBtn.onclick = () => this.revealWord();
          controls.appendChild(revealBtn);
        }

        container.appendChild(controls);

        // Clues
        const cluesSection = document.createElement('div');
        cluesSection.className = 'clues-section';

        // Across clues
        const acrossCol = document.createElement('div');
        acrossCol.className = 'clues-column';

        const acrossTitle = document.createElement('h3');
        acrossTitle.textContent = 'Across';
        acrossCol.appendChild(acrossTitle);

        for (const clue of this.currentPuzzle.clues.across) {
          const clueItem = document.createElement('div');
          clueItem.className = 'clue-item';

          const currentClue = this.getCurrentClue();
          if (currentClue && currentClue.number === clue.number && this.selectedDirection === 'across') {
            clueItem.classList.add('active');
          }

          const numberEl = document.createElement('span');
          numberEl.className = 'clue-number';
          numberEl.textContent = clue.number + '.';

          const textEl = document.createElement('span');
          textEl.textContent = clue.clue;

          clueItem.appendChild(numberEl);
          clueItem.appendChild(textEl);

          clueItem.onclick = () => {
            this.selectCell(clue.row, clue.col, false);
            this.selectedDirection = 'across';
            this.render();
          };

          acrossCol.appendChild(clueItem);
        }

        cluesSection.appendChild(acrossCol);

        // Down clues
        const downCol = document.createElement('div');
        downCol.className = 'clues-column';

        const downTitle = document.createElement('h3');
        downTitle.textContent = 'Down';
        downCol.appendChild(downTitle);

        for (const clue of this.currentPuzzle.clues.down) {
          const clueItem = document.createElement('div');
          clueItem.className = 'clue-item';

          const currentClue = this.getCurrentClue();
          if (currentClue && currentClue.number === clue.number && this.selectedDirection === 'down') {
            clueItem.classList.add('active');
          }

          const numberEl = document.createElement('span');
          numberEl.className = 'clue-number';
          numberEl.textContent = clue.number + '.';

          const textEl = document.createElement('span');
          textEl.textContent = clue.clue;

          clueItem.appendChild(numberEl);
          clueItem.appendChild(textEl);

          clueItem.onclick = () => {
            this.selectCell(clue.row, clue.col, false);
            this.selectedDirection = 'down';
            this.render();
          };

          downCol.appendChild(clueItem);
        }

        cluesSection.appendChild(downCol);
        container.appendChild(cluesSection);

        // Add hidden input for native keyboard
        if (!document.getElementById('hidden-keyboard-input')) {
          const hiddenInput = document.createElement('input');
          hiddenInput.type = 'text';
          hiddenInput.id = 'hidden-keyboard-input';
          hiddenInput.autocomplete = 'off';
          hiddenInput.setAttribute('autocapitalize', 'characters');
          hiddenInput.setAttribute('autocorrect', 'off');
          hiddenInput.style.position = 'absolute';
          hiddenInput.style.left = '-9999px';
          hiddenInput.style.top = '-9999px';
          hiddenInput.style.opacity = '0';
          hiddenInput.style.width = '1px';
          hiddenInput.style.height = '1px';
          document.body.appendChild(hiddenInput);

          // Listen for input events
          hiddenInput.addEventListener('input', (e) => this.handleHiddenInputChange(e));
          hiddenInput.addEventListener('keydown', (e) => this.handleHiddenInputKeydown(e));
        }

        app.appendChild(container);

        // Completion modal
        if (this.gameCompleted) {
          const modal = document.createElement('div');
          modal.className = 'completion-modal';

          const content = document.createElement('div');
          content.className = 'completion-content';

          const icon = document.createElement('div');
          icon.className = 'completion-icon';
          icon.textContent = '✓';

          const title = document.createElement('div');
          title.className = 'completion-title';
          title.textContent = 'Puzzle Complete!';

          const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
          const minutes = Math.floor(elapsed / 60);
          const seconds = elapsed % 60;

          const timeEl = document.createElement('div');
          timeEl.className = 'completion-time';
          timeEl.textContent = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;

          const stats = document.createElement('div');
          stats.className = 'completion-stats';

          const statRow = document.createElement('div');
          statRow.className = 'stat-row';
          statRow.innerHTML = '<span>Puzzle:</span><span>#' + this.currentPuzzle.id + '</span>';
          stats.appendChild(statRow);

          const difficultyRow = document.createElement('div');
          difficultyRow.className = 'stat-row';
          difficultyRow.innerHTML = '<span>Difficulty:</span><span>Medium</span>';
          stats.appendChild(difficultyRow);

          content.appendChild(icon);
          content.appendChild(title);
          content.appendChild(timeEl);
          content.appendChild(stats);

          const actions = document.createElement('div');
          actions.className = 'completion-actions';

          const shareBtn = document.createElement('button');
          shareBtn.className = 'primary';
          shareBtn.textContent = 'Share';
          shareBtn.onclick = () => this.shareResult();

          const nextBtn = document.createElement('button');
          nextBtn.textContent = this.currentPuzzleIndex < this.puzzles.length - 1 ? 'Next Puzzle' : 'Home';
          nextBtn.onclick = () => {
            if (this.currentPuzzleIndex < this.puzzles.length - 1) {
              this.nextPuzzle();
            } else {
              window.location.href = LawGames.getResourceUrl('index.html');
            }
          };

          actions.appendChild(shareBtn);
          actions.appendChild(nextBtn);
          content.appendChild(actions);

          modal.appendChild(content);
          app.appendChild(modal);
        }
      },

      /**
       * Render error message
       */
      renderError(message) {
        const app = document.getElementById('app');
        app.innerHTML = '';

        const header = LawGames.createHeader('Mini Crossword', true);
        app.appendChild(header);

        const container = document.createElement('div');
        container.className = 'crossword-container';
        container.style.textAlign = 'center';
        container.style.paddingTop = '40px';

        const errorEl = document.createElement('div');
        errorEl.style.fontSize = '16px';
        errorEl.style.color = 'var(--color-text-secondary)';
        errorEl.textContent = message;

        container.appendChild(errorEl);
        app.appendChild(container);
      }
    };

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        CrosswordGame.init();
        document.addEventListener('keydown', (e) => CrosswordGame.handleKeyDown(e));
      });
    } else {
      CrosswordGame.init();
      document.addEventListener('keydown', (e) => CrosswordGame.handleKeyDown(e));
    }
  </script>
</body>
</html>
