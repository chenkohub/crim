                    whyExists: 'These five categories represent situations where limiting liability to omissions is fair and enforceable. Special relationships: Parents are legally responsible for children because they create the dependency. A parent who fails to feed a child is as culpable as one who actively starves them—the child cannot exist independently. Jailers are responsible for prisoners because they\'ve assumed control and removed the prisoner\'s ability to self-protect. These relationships are bounded and verifiable. Contractual duty: If you contract to be a lifeguard, you\'ve explicitly assumed a duty. If you\'re paid to watch someone\'s child and the child drowns, your failure is breach of contract and criminality. The duty is clear and limited. Statute: Legislatures can impose positive duties (like reporting child abuse for professionals) because they can calibrate scope carefully. Voluntary assumption: If you begin rescuing someone, you can\'t abandon them once you\'ve created reliance. This addresses a specific unfairness: harm caused by your own intervention. Creation of danger: If you hit a pedestrian with your car, you\'ve created the danger and must help. This is fairness: don\'t make things worse and leave. These five capture situations where either (1) a relationship justifies the duty (special relationships), (2) it\'s been explicitly accepted (contract, voluntary assumption, statute), or (3) you\'re the causal source (creation of danger). Each is bounded and manageable.',

                    whyExists: 'Common law developed incrementally through cases. Different jurisdictions had different rules. Larceny, embezzlement, and false pretenses were separate. Specific vs general intent blurred across cases. Mens rea categories weren\'t uniform. This created chaos: a conduct that was a crime in one jurisdiction might be lawful in another. Lawyers and judges couldn\'t reliably predict liability. The MPC aimed to rationalize and unify. It created a systematic approach: unified theft (covering larceny, embezzlement, false pretenses), clear mens rea hierarchy (purpose, knowledge, recklessness, negligence), uniform treatment of defenses (mistake, duress, etc.). This was motivated by respect for rule of law: people deserve clear notice of what\'s prohibited. Additionally, the MPC aimed to reflect modern criminal policy. Common law rules were centuries old and didn\'t reflect contemporary justice values. The MPC incorporated retribution, deterrence, and rehabilitation explicitly. It also aimed to reduce the burden on courts: instead of applying common law categories, courts could apply statutory definitions. From a comparative standpoint, the MPC followed the German approach of codification—systematizing criminal law in a comprehensive code. Why has common law persisted? Inertia, tradition, and values. Jurisdictions that adopted common law rules early often maintain them for stability. Additionally, some argue case-by-case development (common law) is more flexible and responsive to justice than codification.',

                    connectionQuestions: [
                        'Is common law or statutory code more democratic?',

            'UNIT IX: Theft Offenses': [

                    title: 'Why do we distinguish between larceny, embezzlement, and false pretenses?',
                    rule: 'These three theft offenses punish different mechanisms of wrongfully taking property: larceny (taking), embezzlement (misappropriation by fiduciary), false pretenses (deception).',
                    whyExists: 'The distinction reflects different culpability and social harms. Larceny is the most basic theft—you simply take someone else\'s property and carry it off. It\'s direct, forceful wrong. Embezzlement targets a particular harm: breach of trust. When someone in a position of trust (accountant, employee, trustee) misappropriates funds, the harm is double—loss of money plus violation of trust. Society relies on trust relationships; embezzlement is particularly pernicious because it exploits that reliance. False pretenses also involves deception but targets the act of lying to obtain property. The wrongdoer tricked the victim into voluntarily giving up property. This requires proof of false statements, knowledge of falsity, and reliance—different elements from simple taking. From a moral standpoint: the larcenist wants your property and takes it; the embezzler is trusted with your property and betrays that trust; the con artist lies to you to make you give up property. These feel like different wrongs. Legally, distinguishing them allows for: (1) tailored punishment (embezzlement often punished more severely because breach of trust aggravates), (2) different proof requirements (false pretenses requires proving the false statement; larceny doesn\'t), (3) different defenses (mistake of fact might apply to false pretenses but not larceny). Practically, the distinctions help prosecutors charge appropriately: if you embezzle from your employer, that\'s embezzlement (not larceny), which may carry stiffer penalties and signals breach of trust to judge/jury.',

                {
                    title: 'Why does robbery require force or intimidation (not just theft)?',
                    rule: 'Robbery = larceny + force/intimidation. The force element elevates it from property crime to violent crime.',

                    whyExists: 'The imminence requirement prevents vigilantism and preemptive violence. If someone threatens to hurt you tomorrow, you cannot justifiably use force today. Why? Because alternatives exist. You can report to police, get a restraining order, avoid the person, or prepare defensive measures. Forcing someone to wait for police/legal remedies instead of taking immediate self-help is central to rule of law. If we permitted force based on future threats, every argument would justify preemptive violence. Person A says "I\'ll hurt you next week"—does A then get to hurt B preventively first? This descends into cycles of mutual violence. Imminence ensures that self-defense applies only when there\'s no time for law enforcement or alternatives. It\'s a last resort. Morally, the requirement reflects fairness: the threat must be immediate enough that you reasonably cannot escape or seek help. If you had time to warn, flee, or call police, you had alternatives to violence. Legally, imminence prevents a claim that "I was defending myself from a threat three months away." Practically, imminence also prevents false claims. If defendants could invoke self-defense for any perceived future threat, litigation would explode (every defendant would claim self-defense). Limiting self-defense to imminent threats makes the law administrable. From a policy perspective, imminence requires the defendant to attempt escape or avoidance first (rule of retreat in some jurisdictions). This reflects policy to minimize violence. However, imminence doesn\'t require the defendant to wait for the attacker to strike first. The threat need only be about to materialize immediately.',

                    problem: 'If self-defense were merely an excuse, defendants would receive criminal records (though potentially reduced sentences). This would stigmatize victims who defended themselves.',
                    counterargument: 'Some argue the distinction is semantic. Others note that imperfect self-defense (under MPC § 3.09) reduces liability without being full justification, showing the line isn\'t always clear.',
                    connectionQuestions: [
                        'Should victims of assault face any criminal liability even if their self-defense was excessive?',

        // Initialize the page
        function init() {
            renderAllUnits();
            setupEventListeners();
            updateProgress();
        }

        function renderAllUnits() {
            const container = document.getElementById('unitsContainer');
            container.innerHTML = '';

            Object.entries(doctrinesData).forEach(([unit, doctrines]) => {
                const unitElement = createUnitElement(unit, doctrines);
                container.appendChild(unitElement);
            });
        }

        function createUnitElement(unit, doctrines) {
            const unitDiv = document.createElement('div');
            unitDiv.className = 'unit';

            const header = document.createElement('div');
            header.className = 'unit-header collapsed';
            header.innerHTML = `
                <h2>${unit}</h2>
                <span class="toggle-icon">▶</span>
            `;

            const content = document.createElement('div');
            content.className = 'unit-content';

            doctrines.forEach((doctrine, idx) => {
                const doctrineId = `${unit.replace(/\s+/g, '-')}-${idx}`;
                const doctrineElement = createDoctrineElement(doctrine, doctrineId);
                content.appendChild(doctrineElement);
            });

            header.addEventListener('click', () => {
                header.classList.toggle('collapsed');
                content.classList.toggle('expanded');
                const unitName = unit.replace(/\s+/g, '-');
                if (header.classList.contains('collapsed')) {
                    expandedUnits.delete(unitName);
                } else {
                    expandedUnits.add(unitName);
                }
            });

            unitDiv.appendChild(header);
            unitDiv.appendChild(content);
            return unitDiv;
        }

        function createDoctrineElement(doctrine, doctrineId) {
            const doctrineDiv = document.createElement('div');
            doctrineDiv.className = 'doctrine';
            doctrineDiv.id = doctrineId;
            if (readDoctrines.has(doctrineId)) {
                doctrineDiv.classList.add('read');
            }

            const header = document.createElement('div');
            header.className = 'doctrine-header';
            header.innerHTML = `
                <h3>${doctrine.title}</h3>
                <span class="expand-icon">▼</span>
            `;

            const content = document.createElement('div');
            content.className = 'doctrine-content';
            if (expandedDoctrines.has(doctrineId)) {
                header.classList.add('expanded');
                content.classList.add('expanded');
            }

            content.innerHTML = `
                <div class="doctrine-section">
                    <h4>The Rule</h4>
                    <p>${doctrine.rule}</p>
                </div>

                <div class="doctrine-section">
                    <h4>Why This Rule Exists</h4>
                    <p>${doctrine.whyExists}</p>
                    <button class="why-button" onclick="this.nextElementSibling.classList.toggle('expanded'); this.classList.toggle('expanded');">
                        Deeper Dive →
                    </button>
                    <div class="deeper-explanation">
                        <p><strong>Policy Rationale:</strong> The core of why this rule matters is that it balances competing values. It prevents the system from going too far in one direction (whether that's deterrence, fairness, or flexibility) while ensuring that the law achieves its fundamental goals.</p>
                    </div>
                </div>

                <div class="doctrine-section">
                    <h4>What Problem It Solves</h4>
                    <p>${doctrine.problem}</p>
                </div>

                <div class="doctrine-section">
                    <h4>The Counterargument</h4>
                    <p>${doctrine.counterargument}</p>
                </div>

                <div class="connection-questions">
                    <div class="connection-questions-header" onclick="this.classList.toggle('collapsed'); this.nextElementSibling.classList.toggle('expanded')">
                        <span>📚 Connection Questions (Elaborative Interrogation)</span>
                        <span class="toggle">▼</span>
                    </div>
                    <div class="questions-list expanded">
                        ${doctrine.connectionQuestions.map(q => `
                            <div class="question">${q}</div>
                        `).join('')}
                    </div>
                </div>

                <button class="mark-read-btn ${readDoctrines.has(doctrineId) ? 'marked' : ''}"
                    onclick="toggleMarkRead('${doctrineId}')">
                    ${readDoctrines.has(doctrineId) ? '✓ Read' : 'Mark as Read'}
                </button>
            `;

            header.addEventListener('click', () => {
                header.classList.toggle('expanded');
                content.classList.toggle('expanded');
                if (header.classList.contains('expanded')) {
                    expandedDoctrines.add(doctrineId);
                } else {
                    expandedDoctrines.delete(doctrineId);
                }
            });

            doctrineDiv.appendChild(header);
            doctrineDiv.appendChild(content);
            return doctrineDiv;
        }

        function setupEventListeners() {
            document.getElementById('expandAllBtn').addEventListener('click', () => {
                document.querySelectorAll('.unit-header').forEach(h => {
                    h.classList.remove('collapsed');
                    h.nextElementSibling.classList.add('expanded');
                });
                document.querySelectorAll('.doctrine-header').forEach(h => {
                    h.classList.add('expanded');
                    h.nextElementSibling.classList.add('expanded');
                });
                expandedUnits.clear();
                expandedDoctrines.clear();
                Object.keys(doctrinesData).forEach(u => expandedUnits.add(u.replace(/\s+/g, '-')));
                document.querySelectorAll('.doctrine').forEach(d => {
                    expandedDoctrines.add(d.id);
                });
            });

            document.getElementById('collapseAllBtn').addEventListener('click', () => {
                document.querySelectorAll('.unit-header').forEach(h => {
                    h.classList.add('collapsed');
                    h.nextElementSibling.classList.remove('expanded');
                });
                document.querySelectorAll('.doctrine-header').forEach(h => {
                    h.classList.remove('expanded');
                    h.nextElementSibling.classList.remove('expanded');
                });
                expandedUnits.clear();
                expandedDoctrines.clear();
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                readDoctrines.clear();
                updateProgress();
                document.querySelectorAll('.doctrine').forEach(d => {
                    d.classList.remove('read');
                    const btn = d.querySelector('.mark-read-btn');
                    if (btn) {
                        btn.classList.remove('marked');
                        btn.textContent = 'Mark as Read';
                    }
                });
            });

            document.getElementById('searchBox').addEventListener('input', (e) => {
                filterDoctrines(e.target.value.toLowerCase());
            });
        }

        function toggleMarkRead(doctrineId) {
            const doctrine = document.getElementById(doctrineId);
            const btn = doctrine.querySelector('.mark-read-btn');

            if (readDoctrines.has(doctrineId)) {
                readDoctrines.delete(doctrineId);
                doctrine.classList.remove('read');
                btn.classList.remove('marked');
                btn.textContent = 'Mark as Read';
            } else {
                readDoctrines.add(doctrineId);
                doctrine.classList.add('read');
                btn.classList.add('marked');
                btn.textContent = '✓ Read';
            }

            updateProgress();
        }

        function updateProgress() {
            const totalDoctrines = Object.values(doctrinesData).reduce((sum, arr) => sum + arr.length, 0);
            const readCount = readDoctrines.size;
            document.getElementById('progressText').textContent = `${readCount} / ${totalDoctrines}`;
            const percentage = totalDoctrines > 0 ? (readCount / totalDoctrines) * 100 : 0;
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function filterDoctrines(searchTerm) {
            document.querySelectorAll('.doctrine').forEach(doctrine => {
                const title = doctrine.querySelector('h3').textContent.toLowerCase();
                const rule = doctrine.querySelector('.doctrine-section p').textContent.toLowerCase();
                const matches = title.includes(searchTerm) || rule.includes(searchTerm);
                doctrine.style.display = matches ? 'block' : 'none';
            });
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
    <script src="../shared.js"></script>
    <script src="../navbar.js"></script>
</body>
</html>
