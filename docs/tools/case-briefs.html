<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criminal Law Case Brief Database</title>
    <style>
        :root, [data-theme] {
            --tool-accent: #f97316;
            --tool-accent-dark: #ea580c;
            --tool-accent-light: #fb923c;
            --tool-accent-lighter: #fdba74;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--tool-accent);
        }

        .subtitle {
            color: var(--color-text-secondary);
            font-size: 0.95rem;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 2px solid var(--color-border-subtle);
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--color-text-secondary);
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: var(--tool-accent);
            border-bottom-color: var(--tool-accent);
        }

        .tab-btn:hover {
            color: var(--color-text-primary);
        }

        input[type="text"],
        select {
            padding: 0.75rem 1rem;
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            color: var(--color-text-primary);
            font-size: 0.95rem;
        }

        input[type="text"]::placeholder {
            color: var(--color-text-tertiary);
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--tool-accent);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }

        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--tool-accent);
            color: var(--color-header-text);
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            background-color: var(--tool-accent-dark);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .case-card {
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .case-card:hover {
            border-color: var(--tool-accent);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.15);
        }

        .case-card.selected {
            border-color: var(--tool-accent);
            background-color: var(--color-bg-secondary);
            box-shadow: 0 0 0 2px var(--tool-accent);
        }

        .case-name {
            font-weight: 700;
            color: var(--tool-accent);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .case-topic {
            display: inline-block;
            background-color: var(--color-bg-tertiary);
            color: var(--color-text-primary);
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .case-rule {
            color: var(--color-text-primary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .case-rank {
            color: var(--color-text-tertiary);
            font-size: 0.8rem;
        }

        .case-details {
            display: none;
            background-color: var(--color-bg-primary);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-top: 1rem;
            border: 1px solid var(--color-border);
        }

        .case-details.show {
            display: block;
        }

        .detail-section {
            margin-bottom: 1.5rem;
        }

        .detail-label {
            color: var(--tool-accent);
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .detail-content {
            color: var(--color-text-primary);
            line-height: 1.6;
        }

        .quiz-mode {
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .quiz-question {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .quiz-controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .quiz-answer {
            background-color: var(--color-bg-primary);
            border: 2px solid var(--tool-accent);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-top: 1.5rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .comparison-table thead {
            background-color: var(--color-bg-tertiary);
        }

        .comparison-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 700;
            color: var(--tool-accent);
            border-bottom: 2px solid var(--color-bg-tertiary);
        }

        .comparison-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text-primary);
        }

        .comparison-table tr:last-child td {
            border-bottom: none;
        }

        .comparison-table tbody tr:hover {
            background-color: var(--color-bg-primary);
        }

        .similarity {
            background-color: rgba(106, 170, 100, 0.1);
            border-left: 3px solid var(--color-correct);
        }

        .difference {
            background-color: rgba(249, 115, 22, 0.1);
            border-left: 3px solid var(--tool-accent);
        }

        .quick-ref-list {
            list-style: none;
        }

        .quick-ref-item {
            background-color: var(--color-bg-secondary);
            border-left: 3px solid var(--tool-accent);
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-radius: 0.25rem;
        }

        .quick-ref-case {
            font-weight: 700;
            color: var(--tool-accent);
            margin-bottom: 0.25rem;
        }

        .quick-ref-rule {
            color: var(--color-text-primary);
            font-size: 0.95rem;
        }

        .topic-cluster {
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .cluster-title {
            color: var(--tool-accent);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .cluster-cases {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .cluster-case {
            background-color: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cluster-case:hover {
            border-color: var(--tool-accent);
        }

        .cluster-case-name {
            color: var(--tool-accent);
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .cluster-case-rule {
            color: var(--color-text-primary);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .comparison-presets {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .preset-btn {
            padding: 1rem;
            background-color: var(--color-bg-secondary);
            border: 2px solid var(--color-border);
            border-radius: 0.5rem;
            color: var(--color-text-primary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .preset-btn:hover {
            border-color: var(--tool-accent);
            background-color: var(--color-bg-tertiary);
        }

        .section-divider {
            border-top: 1px solid var(--color-border);
            margin: 2rem 0;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--color-text-tertiary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-label input[type="checkbox"] {
            cursor: pointer;
            accent-color: var(--tool-accent);
            width: 18px;
            height: 18px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .cases-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                gap: 0;
            }

            .tab-btn {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }

            .control-group {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group input,
            .control-group select,
            .control-group button {
                width: 100%;
            }

            .comparison-table {
                font-size: 0.85rem;
                overflow-x: auto;
                display: block;
            }

            .comparison-table th,
            .comparison-table td {
                padding: 0.75rem;
            }
        }

        .no-results {
            text-align: center;
            padding: 2rem;
            color: var(--color-text-tertiary);
        }
    </style>
    <link rel="stylesheet" href="../theme.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Criminal Law Case Database</h1>
            <p class="subtitle">27 foundational cases with side-by-side comparison & study tools</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="browse">Browse Cases</button>
            <button class="tab-btn" data-tab="search">Search & Filter</button>
            <button class="tab-btn" data-tab="comparison">Comparison Tool</button>
            <button class="tab-btn" data-tab="quiz">Quiz Mode</button>
            <button class="tab-btn" data-tab="quick-ref">Quick Reference</button>
            <button class="tab-btn" data-tab="topics">By Topic</button>
        </div>

        <!-- BROWSE TAB -->
        <div id="browse" class="tab-content active">
            <div class="control-group">
                <select id="topicFilter">
                    <option value="">All Topics</option>
                </select>
                <select id="rankFilter">
                    <option value="">All Importance Levels</option>
                    <option value="5">Critical (5)</option>
                    <option value="4">High (4)</option>
                    <option value="3">Medium (3)</option>
                    <option value="2">Low (2)</option>
                    <option value="1">Reference (1)</option>
                </select>
            </div>
            <div id="casesContainer" class="cases-grid"></div>
        </div>

        <!-- SEARCH TAB -->
        <div id="search" class="tab-content">
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Search by case name, topic, or keyword...">
                <button onclick="performSearch()">Search</button>
            </div>
            <div id="searchResults" class="cases-grid"></div>
        </div>

        <!-- COMPARISON TAB -->
        <div id="comparison" class="tab-content">
            <h2 style="margin-bottom: 1rem; color: var(--tool-accent);">Preset Comparisons</h2>
            <div class="comparison-presets">
                <button class="preset-btn" onclick="loadPresetComparison('murder')">Murder Cases: P&D</button>
                <button class="preset-btn" onclick="loadPresetComparison('manslaughter')">Manslaughter Approaches</button>
                <button class="preset-btn" onclick="loadPresetComparison('felony-murder')">Felony Murder Limits</button>
                <button class="preset-btn" onclick="loadPresetComparison('theft')">Theft Offenses</button>
                <button class="preset-btn" onclick="loadPresetComparison('mens-rea')">Mens Rea Tests</button>
                <button class="preset-btn" onclick="loadPresetComparison('actus-reus')">Actus Reus</button>
            </div>

            <div class="section-divider"></div>

            <h2 style="margin-bottom: 1rem; color: var(--tool-accent);">Custom Comparison</h2>
            <div class="controls">
                <p style="color: var(--color-text-secondary); margin-bottom: 1rem;">Select 2-3 cases to compare side-by-side:</p>
                <div id="comparisonCheckboxes" class="checkbox-group"></div>
                <button onclick="performCustomComparison()">Compare Selected Cases</button>
            </div>
            <div id="comparisonTable"></div>
        </div>

        <!-- QUIZ TAB -->
        <div id="quiz" class="tab-content">
            <div class="controls">
                <select id="quizTopic">
                    <option value="">Random from All Topics</option>
                </select>
                <button onclick="startQuiz()">Start Quiz</button>
            </div>
            <div id="quizContainer"></div>
        </div>

        <!-- QUICK REFERENCE TAB -->
        <div id="quick-ref" class="tab-content">
            <p style="color: var(--color-text-secondary); margin-bottom: 1.5rem;">One-liner rules for rapid review:</p>
            <ul id="quickRefList" class="quick-ref-list"></ul>
        </div>

        <!-- TOPICS TAB -->
        <div id="topics" class="tab-content">
            <div id="topicsContainer"></div>
        </div>
    </div>

    <script>
        // ===== DATA =====
        const cases = [
            {
                id: 1,
                name: "Regina v. Dudley & Stephens",
                topic: "Necessity",
                rank: 5,
                facts: "Shipwrecked sailors starving at sea. Two crew members kill and eat a boy to survive. The boy was weakest and unlikeliest to survive anyway.",
                issue: "Can necessity justify killing an innocent person to preserve one's own life?",
                holding: "No. Necessity cannot justify the killing of an innocent person, even to save multiple lives.",
                rule: "Necessity is not a defense to murder. The law does not permit the taking of innocent life to preserve other lives.",
                reasoning: "To allow necessity as a defense would permit the strong to kill the weak whenever survival is at stake, undermining the fundamental principle that innocent life is sacred. The law must maintain an absolute rule against murder even in extremis.",
                examRelevance: "Foundational case defining the outer boundary of necessity. Appears on virtually every criminal law exam. Tests understanding that some acts cannot be justified, only excused."
            },
            {
                id: 2,
                name: "People v. Atkins",
                topic: "Mens Rea Classification",
                rank: 5,
                facts: "Defendant charged with taking indecent liberties with a child. Raises mistake of age defense.",
                issue: "How do courts distinguish between crimes requiring specific intent vs. general criminal intent?",
                holding: "A crime requiring a specific intent for one element can be a general criminal intent crime for other elements. The nature of each element must be separately analyzed.",
                rule: "Specific intent crimes require the defendant's act to be motivated by a further intent beyond the act itself. General criminal intent crimes require only that the defendant acted with awareness of the nature of the conduct.",
                reasoning: "Classification depends on the statutory language and the nature of the harm protected. Courts look to whether the legislature required a specific purpose or further intent beyond the criminal act itself.",
                examRelevance: "Essential framework for analyzing any crime on an exam. Determines what mental state defenses are available and how to structure the analysis."
            },
            {
                id: 3,
                name: "State v. Brown",
                topic: "First-Degree Murder",
                rank: 5,
                facts: "Defendant kills victim in a sudden passion argument without apparent advance planning.",
                issue: "What constitutes 'deliberation' for purposes of first-degree murder?",
                holding: "Deliberation means the defendant acted with a cool mind capable of forming, and which did form, a conscious purpose and design to kill.",
                rule: "Premeditation and deliberation are separate elements. Deliberation requires a moment of thought and reflection, not necessarily a long period of time.",
                reasoning: "The law requires that the killer not act in a heated, passionate moment but with some degree of reflection on the decision to kill. This separates calculated murder from manslaughter.",
                examRelevance: "Critical for distinguishing first-degree from second-degree murder. Frequently appears with fact patterns testing whether quick decisions can still be 'deliberate'."
            },
            {
                id: 4,
                name: "Commonwealth v. Mercado",
                topic: "Actus Reus",
                rank: 5,
                facts: "Defendant's arm involuntarily jerks, striking another person in an uncontrolled convulsion.",
                issue: "Can involuntary bodily movements satisfy the actus reus requirement?",
                holding: "No. The actus reus requires a voluntary act. Involuntary movements like convulsions, reflexes, or sleepwalking cannot constitute the criminal act.",
                rule: "A criminal act must be a voluntary movement of the body. Involuntary acts lack the minimum requirement of moral blameworthiness.",
                reasoning: "Criminal responsibility assumes the ability to control one's conduct. Involuntary movements occur without conscious control, making punishment unjust and ineffective as deterrence.",
                examRelevance: "Establishes the baseline for actus reus. Often paired with fact patterns distinguishing voluntary acts from automatic or convulsive movements."
            },
            {
                id: 5,
                name: "State v. Freeman",
                topic: "Mistake of Fact",
                rank: 5,
                facts: "Defendant mistakes victim's age, consensual partner whom he reasonably believed was 18.",
                issue: "When does a mistake of fact negate the mens rea required for a crime?",
                holding: "A reasonable mistake of fact negates mens rea for crimes where that element is required. The defendant's belief must be honest and reasonable based on the circumstances.",
                rule: "Mistake of fact is a defense when: (1) the crime requires a specific intent or knowledge element, and (2) the defendant's mistake, if true, would negate that element.",
                reasoning: "Mens rea requires awareness of the factual circumstances making the conduct criminal. If the defendant is mistaken about those facts and her mistake is reasonable, she lacks the required mental state.",
                examRelevance: "Key framework for analyzing whether a defendant can escape liability based on honest mistakes about facts. Distinguishes from mistake of law, which is generally not a defense."
            },
            {
                id: 6,
                name: "State v. Bingham",
                topic: "Premeditation",
                rank: 5,
                facts: "Defendant shoots victim within moments of deciding to do so during a heated confrontation.",
                issue: "Does a killing lack premeditation simply because it occurs shortly after the decision to kill?",
                holding: "No. Premeditation can occur in a brief moment. The time span between decision and killing is not determinative; what matters is whether there was actual reflection and deliberation.",
                rule: "Premeditation requires the formation of an intent to kill before the act, with some thought, however brief, about taking the victim's life.",
                reasoning: "The requirement is not a minimum time interval but a conscious decision to kill. Even instantaneous reflection following provocation can constitute premeditation if the defendant actually considered the killing.",
                examRelevance: "Crucial for disproving the defense argument that 'quick acts cannot be premeditated.' Tests understanding that timing and deliberation are distinct concepts."
            },
            {
                id: 7,
                name: "Gilbert v. State",
                topic: "Premeditation Evidence",
                rank: 5,
                facts: "Defendant carries a loaded gun to meeting; kills victim; had previously expressed anger toward the victim.",
                issue: "What factors support a finding of premeditation and deliberation?",
                holding: "Premeditation is supported by evidence of: (1) the manner of killing showing a deliberate purpose to cause death, (2) procurement of a weapon, (3) the relationship and prior events between parties, and (4) any circumstances showing the killing was not a sudden act of passion.",
                rule: "Courts examine the circumstances surrounding the killing for evidence of a formed purpose to kill. Multiple factors pointing to reflection support premeditation.",
                reasoning: "These factors collectively suggest the defendant had time to consider the killing. The presence of a ready weapon, prior animosity, and deliberate manner all indicate the defendant acted with premeditation.",
                examRelevance: "Provides the checklist for analyzing whether evidence supports a premeditation finding. Commonly tested by asking whether specific factors are present in a fact pattern."
            },
            {
                id: 8,
                name: "State v. Arrington",
                topic: "Second-Degree Murder Instruction",
                rank: 4,
                facts: "Defendant charged with first-degree murder; prosecution's case is based primarily on circumstantial evidence of premeditation.",
                issue: "When must a jury instruction on second-degree murder as a lesser included offense be given?",
                holding: "A jury instruction on second-degree murder must be given when the evidence would permit a rational jury to find the defendant guilty of that lesser offense.",
                rule: "If the prosecution's evidence for first-degree murder is circumstantial and premeditation is not clearly established, an instruction on second-degree murder as a lesser included offense is required.",
                reasoning: "Due process requires that juries have the option to convict of a lesser degree of guilt if the evidence does not clearly establish all elements of the charged offense.",
                examRelevance: "Tests understanding of burden of proof and when juries must be given intermediate options. Important for recognizing when weak premeditation evidence creates alternative convictions."
            },
            {
                id: 9,
                name: "People v. Berry",
                topic: "Voluntary Manslaughter",
                rank: 5,
                facts: "Defendant kills wife after 20 hours of cumulative emotional provocation including infidelity revelation and insults.",
                issue: "Does prolonged emotional provocation constitute legally adequate provocation for voluntary manslaughter?",
                holding: "Yes. Voluntary manslaughter is established when: (1) there is adequate provocation, (2) the defendant actually acted in the heat of passion, and (3) there was insufficient time to cool off. Modern approach focuses on cumulative effect.",
                rule: "Adequate provocation need not be a single incident. The cumulative effect of events can create the heat of passion if they reasonably provoke someone to lose self-control.",
                reasoning: "While the law traditionally required sudden provocation, modern courts recognize that repeated emotional wounds can cumulatively provoke a reasonable person to lose self-control, even over hours.",
                examRelevance: "Represents the modern trend away from narrow categories of 'adequate provocation' toward a more flexible standard. Frequently tested with scenarios involving cumulative emotional harm."
            },
            {
                id: 10,
                name: "State v. Dumlao",
                topic: "Extreme Mental or Emotional Disturbance",
                rank: 5,
                facts: "Defendant in severe emotional turmoil kills spouse; the killing is not in the heat of passion but reflects EMED.",
                issue: "What is the test for 'Extreme Mental or Emotional Disturbance' (EMED) as a mitigation to murder?",
                holding: "EMED is a two-step test: (1) was the defendant in a state of extreme mental or emotional disturbance at the time of the killing, and (2) was there a reasonable explanation for the disturbance?",
                rule: "Unlike heat of passion, EMED does not require sudden provocation or loss of self-control. It requires only that the defendant experienced extreme disturbance with a reasonable explanation.",
                reasoning: "EMED is broader than heat of passion because it recognizes that mental illness, severe depression, or emotional breakdown can reduce murder to manslaughter without the traditional provocation elements.",
                examRelevance: "Distinguishes modern mitigation doctrines from traditional heat of passion. Often tested by contrasting EMED (with explanation) from heat of passion (without explanation)."
            },
            {
                id: 11,
                name: "People v. Knoller",
                topic: "Depraved Heart Murder",
                rank: 4,
                facts: "Defendant kept dangerous dogs that killed another person; defendant showed extreme recklessness toward the risk.",
                issue: "What mental state constitutes depraved heart murder—the implied malice murder without intent to kill?",
                holding: "Depraved heart murder requires the defendant's act be done with a conscious disregard of the risk of death. It is not sufficient to show gross negligence or even extreme recklessness; the defendant must know of the danger.",
                rule: "Implied malice (depraved heart) murder requires: (1) the natural and probable consequence of the act is death, (2) the act was deliberately performed, and (3) at the time of the performance, the defendant knew of the danger and deliberately acted with conscious disregard for human life.",
                reasoning: "This distinguishes depraved heart murder from involuntary manslaughter. The defendant must consciously appreciate the risk, not merely fail to appreciate it.",
                examRelevance: "Tests the distinction between extreme recklessness (murder) and ordinary negligence (manslaughter). Frequently tested with scenarios involving dangerous activities."
            },
            {
                id: 12,
                name: "State v. Williams",

        // ===== INITIALIZATION =====
        function init() {
            populateTopicFilter();
            populateQuizTopics();
            populateComparisonCheckboxes();
            renderBrowseView();
            renderQuickReference();
            renderTopicsView();
        }

        function populateTopicFilter() {
            const topics = [...new Set(cases.map(c => c.topic))].sort();
            const filter = document.getElementById('topicFilter');
            topics.forEach(topic => {
                const option = document.createElement('option');
                option.value = topic;
                option.textContent = topic;
                filter.appendChild(option);
            });
        }

        function populateQuizTopics() {
            const topics = [...new Set(cases.map(c => c.topic))].sort();
            const quizTopic = document.getElementById('quizTopic');
            topics.forEach(topic => {
                const option = document.createElement('option');
                option.value = topic;
                option.textContent = topic;
                quizTopic.appendChild(option);
            });
        }

        function populateComparisonCheckboxes() {
            const container = document.getElementById('comparisonCheckboxes');
            cases.forEach(caseItem => {
                const label = document.createElement('label');
                label.className = 'checkbox-label';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = caseItem.id;
                const span = document.createElement('span');
                span.textContent = caseItem.name;
                label.appendChild(checkbox);
                label.appendChild(span);
                container.appendChild(label);
            });
        }

        // ===== TAB NAVIGATION =====
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.getAttribute('data-tab');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(tab).classList.add('active');
            });
        });

        // ===== BROWSE VIEW =====
        function renderBrowseView() {
            const filtered = filterCases();
            const container = document.getElementById('casesContainer');
            container.innerHTML = '';
            filtered.forEach(caseItem => {
                const card = createCaseCard(caseItem);
                container.appendChild(card);
            });
        }

        function filterCases() {
            const topicFilter = document.getElementById('topicFilter').value;
            const rankFilter = document.getElementById('rankFilter').value;
            return cases.filter(c => {
                const topicMatch = !topicFilter || c.topic === topicFilter;
                const rankMatch = !rankFilter || c.rank.toString() === rankFilter;
                return topicMatch && rankMatch;
            });
        }

        function createCaseCard(caseItem) {
            const card = document.createElement('div');
            card.className = 'case-card';
            card.innerHTML = `
                <div class="case-name">${caseItem.name}</div>
                <div class="case-topic">${caseItem.topic}</div>
                <div class="case-rule">${caseItem.rule}</div>
                <div class="case-rank">Importance: ${'★'.repeat(caseItem.rank)}${'☆'.repeat(5-caseItem.rank)}</div>
                <div class="case-details">
                    <div class="detail-section">
                        <div class="detail-label">Facts</div>
                        <div class="detail-content">${caseItem.facts}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">Issue</div>
                        <div class="detail-content">${caseItem.issue}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">Holding</div>
                        <div class="detail-content">${caseItem.holding}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">Reasoning</div>
                        <div class="detail-content">${caseItem.reasoning}</div>
                    </div>
                    <div class="detail-section">
                        <div class="detail-label">Exam Relevance</div>
                        <div class="detail-content">${caseItem.examRelevance}</div>
                    </div>
                </div>
            `;
            card.addEventListener('click', () => {
                card.querySelector('.case-details').classList.toggle('show');
            });
            return card;
        }

        // ===== SEARCH =====
        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const results = cases.filter(c =>
                c.name.toLowerCase().includes(query) ||
                c.topic.toLowerCase().includes(query) ||
                c.rule.toLowerCase().includes(query) ||
                c.facts.toLowerCase().includes(query)
            );
            const container = document.getElementById('searchResults');
            container.innerHTML = '';
            if (results.length === 0) {
                container.innerHTML = '<div class="no-results">No cases match your search.</div>';
                return;
            }
            results.forEach(caseItem => {
                const card = createCaseCard(caseItem);
                container.appendChild(card);
            });
        }

        // ===== FILTERS =====
        document.getElementById('topicFilter').addEventListener('change', renderBrowseView);
        document.getElementById('rankFilter').addEventListener('change', renderBrowseView);

        // ===== COMPARISON =====
        function loadPresetComparison(preset) {
            const presets = {
                'murder': [3, 6, 7], // Brown, Bingham, Gilbert
                'manslaughter': [9, 10], // Berry, Dumlao
                'felony-murder': [24, 25, 22, 23], // James, Bodely, Rose, Canola
                'theft': [20, 21, 19], // Barbour, Pierce, Navarro
                'mens-rea': [2, 14, 13], // Atkins, Jewell, Morissette
                'actus-reus': [26, 17, 4] // Martin, Robinson, Mercado
            };
            const ids = presets[preset];
            const selectedCases = cases.filter(c => ids.includes(c.id));
            displayComparison(selectedCases);
        }

        function performCustomComparison() {
            const checkboxes = document.querySelectorAll('#comparisonCheckboxes input[type="checkbox"]:checked');
            if (checkboxes.length < 2) {
                alert('Please select at least 2 cases to compare.');
                return;
            }
            const ids = Array.from(checkboxes).map(cb => parseInt(cb.value));
            const selectedCases = cases.filter(c => ids.includes(c.id));
            displayComparison(selectedCases);
        }

        function displayComparison(selectedCases) {
            const container = document.getElementById('comparisonTable');
            const table = document.createElement('table');
            table.className = 'comparison-table';

            // Header row
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = '<th>Element</th>';
            selectedCases.forEach(c => {
                const th = document.createElement('th');
                th.textContent = c.name;
                headerRow.appendChild(th);
            });
            table.appendChild(headerRow);

            // Data rows
            const elements = ['Topic', 'Facts', 'Issue', 'Holding', 'Rule', 'Reasoning', 'Exam Relevance'];
            const propertyMap = {
                'Topic': 'topic',
                'Facts': 'facts',
                'Issue': 'issue',
                'Holding': 'holding',
                'Rule': 'rule',
                'Reasoning': 'reasoning',
                'Exam Relevance': 'examRelevance'
            };

            elements.forEach(element => {
                const row = document.createElement('tr');
                const labelCell = document.createElement('td');
                labelCell.innerHTML = `<strong>${element}</strong>`;
                labelCell.style.fontWeight = 'bold';
                labelCell.style.backgroundColor = '#334155';
                row.appendChild(labelCell);

                selectedCases.forEach((caseItem, idx) => {
                    const cell = document.createElement('td');
                    const value = caseItem[propertyMap[element]];
                    cell.textContent = value;

                    // Highlight similarities and differences
                    const isLastCase = idx === selectedCases.length - 1;
                    if (idx > 0 && !isLastCase) {
                        const prevValue = selectedCases[idx - 1][propertyMap[element]];
                        if (value === prevValue) {
                            cell.classList.add('similarity');
                        } else {
                            cell.classList.add('difference');
                        }
                    }
                    row.appendChild(cell);
                });
                table.appendChild(row);
            });

            container.innerHTML = '';
            container.appendChild(table);
        }

        // ===== QUIZ MODE =====
        let currentQuizCase = null;

        function startQuiz() {
            const topicFilter = document.getElementById('quizTopic').value;
            let quizPool = cases;
            if (topicFilter) {
                quizPool = cases.filter(c => c.topic === topicFilter);
            }
            currentQuizCase = quizPool[Math.floor(Math.random() * quizPool.length)];
            displayQuizQuestion();
        }

        function displayQuizQuestion() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = `
                <div class="quiz-mode">
                    <div class="quiz-question">
                        <strong>Facts:</strong> ${currentQuizCase.facts}<br><br>
                        <strong>Issue:</strong> ${currentQuizCase.issue}
                    </div>
                    <div class="quiz-controls">
                        <button onclick="revealQuizAnswer()">Reveal Answer</button>
                        <button onclick="nextQuizQuestion()">Next Question</button>
                    </div>
                    <div id="quizAnswerContainer"></div>
                </div>
            `;
        }

        function revealQuizAnswer() {
            const container = document.getElementById('quizAnswerContainer');
            container.innerHTML = `
                <div class="quiz-answer">
                    <div class="detail-label">Case</div>
                    <div class="detail-content" style="margin-bottom: 1rem;">${currentQuizCase.name}</div>
                    <div class="detail-label">Holding</div>
                    <div class="detail-content" style="margin-bottom: 1rem;">${currentQuizCase.holding}</div>
                    <div class="detail-label">Rule</div>
                    <div class="detail-content" style="margin-bottom: 1rem;">${currentQuizCase.rule}</div>
                    <div class="detail-label">Reasoning</div>
                    <div class="detail-content">${currentQuizCase.reasoning}</div>
                </div>
            `;
        }

        function nextQuizQuestion() {
            startQuiz();
        }

        // ===== QUICK REFERENCE =====
        function renderQuickReference() {
            const sorted = [...cases].sort((a, b) => b.rank - a.rank);
            const list = document.getElementById('quickRefList');
            list.innerHTML = '';
            sorted.forEach(caseItem => {
                const item = document.createElement('li');
                item.className = 'quick-ref-item';
                item.innerHTML = `
                    <div class="quick-ref-case">${caseItem.name}</div>
                    <div class="quick-ref-rule">${caseItem.rule}</div>
                `;
                list.appendChild(item);
            });
        }

        // ===== TOPICS VIEW =====
        function renderTopicsView() {
            const topics = {};
            cases.forEach(caseItem => {
                if (!topics[caseItem.topic]) {
                    topics[caseItem.topic] = [];
                }
                topics[caseItem.topic].push(caseItem);
            });

            const container = document.getElementById('topicsContainer');
            container.innerHTML = '';
            Object.keys(topics).sort().forEach(topic => {
                const cluster = document.createElement('div');
                cluster.className = 'topic-cluster';
                cluster.innerHTML = `<div class="cluster-title">${topic}</div><div class="cluster-cases"></div>`;
                const casesDiv = cluster.querySelector('.cluster-cases');
                topics[topic].forEach(caseItem => {
                    const caseDiv = document.createElement('div');
                    caseDiv.className = 'cluster-case';
                    caseDiv.innerHTML = `
                        <div class="cluster-case-name">${caseItem.name}</div>
                        <div class="cluster-case-rule">${caseItem.rule}</div>
                    `;
                    caseDiv.addEventListener('click', () => {
                        const card = createCaseCard(caseItem);
                        const details = card.querySelector('.case-details');
                        details.classList.add('show');
                        const modal = document.createElement('div');
                        modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:var(--color-overlay);display:flex;align-items:center;justify-content:center;z-index:1000;';
                        const modalContent = document.createElement('div');
                        modalContent.style.cssText = 'background: var(--color-bg-secondary);border:1px solid var(--tool-accent);border-radius:1rem;padding:2rem;max-width:600px;max-height:80vh;overflow-y:auto;';
                        modalContent.innerHTML = card.innerHTML;
                        modal.appendChild(modalContent);
                        modal.addEventListener('click', (e) => {
                            if (e.target === modal) modal.remove();
                        });
                        document.body.appendChild(modal);
                    });
                    casesDiv.appendChild(caseDiv);
                });
                container.appendChild(cluster);
            });
        }

        // Initialize on load
        init();
    </script>
    <script src="../shared.js"></script>
    <script src="../navbar.js"></script>
</body>
</html>
