<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criminal Law - Interleaved Issue Spotter</title>
    <style>
        :root, [data-theme] {
            --tool-accent: #d97706;
            --tool-accent-dark: #b45309;
            --tool-accent-light: #f59e0b;
            --tool-accent-lighter: #fbbf24;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: var(--tool-accent-light);
        }

        .subtitle {
            color: var(--color-text-secondary);
            font-size: 0.95rem;
        }

        /* MODE SELECTOR */
        .mode-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--color-border);
            background: var(--color-bg-secondary);
            color: var(--color-text-primary);
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            border-color: var(--tool-accent-light);
            color: var(--tool-accent-light);
        }

        .mode-btn.active {
            background: var(--tool-accent-light);
            color: var(--color-text-primary);
            border-color: var(--tool-accent-light);
        }

        /* STATS PANEL */
        .stats-panel {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: var(--color-bg-primary);
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
            border-left: 3px solid var(--tool-accent-light);
        }

        .stat-label {
            color: var(--color-text-secondary);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--tool-accent-light);
        }

        .stat-percent {
            color: var(--color-text-tertiary);
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        /* PROGRESS BAR */
        .progress-container {
            margin-bottom: 1rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        .progress-bar {
            background: var(--color-bg-primary);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            background: var(--tool-accent-light);
            height: 100%;
            transition: width 0.3s ease;
        }

        /* TOPIC BREAKDOWN */
        .topic-breakdown {
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .topic-breakdown h3 {
            font-size: 0.9rem;
            color: var(--tool-accent-light);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .topic-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--color-border);
        }

        .topic-item:last-child {
            border-bottom: none;
        }

        .topic-name {
            color: var(--color-text-primary);
        }

        .topic-score {
            color: var(--tool-accent-light);
            font-weight: 600;
        }

        /* MAIN CARD */
        .card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .problem-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .difficulty {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .difficulty.easy {
            background: var(--color-correct);
            color: #86efac;
        }

        .difficulty.medium {
            background: var(--color-partial);
            color: var(--tool-accent-lighter);
        }

        .difficulty.hard {
            background: var(--color-wrong);
            color: #fca5a5;
        }

        .problem-number {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .fact-pattern {
            background: var(--color-bg-primary);
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--tool-accent-light);
            line-height: 1.8;
        }

        .question {
            font-weight: 600;
            color: var(--tool-accent-lighter);
            margin-bottom: 1rem;
            margin-top: 1rem;
        }

        /* OPTIONS */
        .options {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .option-btn {
            padding: 1rem;
            border: 2px solid var(--color-border);
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            border-radius: 0.5rem;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--tool-accent-light);
            background: var(--color-bg-secondary);
        }

        .option-btn.selected {
            border-color: var(--tool-accent-light);
            background: var(--color-bg-secondary);
        }

        .option-btn.correct {
            border-color: var(--color-correct);
            background: rgba(16, 185, 129, 0.15);
            color: #86efac;
        }

        .option-btn.incorrect {
            border-color: var(--color-wrong);
            background: var(--color-wrong);
            color: #fca5a5;
        }

        .option-btn.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* FEEDBACK */
        .feedback {
            background: var(--color-bg-primary);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--tool-accent-light);
            display: none;
        }

        .feedback.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .feedback.correct {
            border-left-color: var(--color-correct);
            background: rgba(16, 185, 129, 0.15);
        }

        .feedback.incorrect {
            border-left-color: var(--color-wrong);
            background: var(--color-wrong);
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .feedback.correct .feedback-title {
            color: #86efac;
        }

        .feedback.incorrect .feedback-title {
            color: #fca5a5;
        }

        .feedback-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--color-text-primary);
        }

        /* FOLLOW-UP */
        .followup-section {
            background: var(--color-bg-primary);
            padding: 1.5rem;
            border-radius: 0.5rem;
            border-left: 4px solid var(--tool-accent);
            display: none;
            margin-bottom: 1.5rem;
        }

        .followup-section.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .followup-question {
            font-weight: 600;
            color: var(--tool-accent-light);
            margin-bottom: 1rem;
        }

        .analysis-textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            background: var(--color-bg-secondary);
            border: 2px solid var(--color-border);
            border-radius: 0.5rem;
            color: var(--color-text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            margin-bottom: 1rem;
        }

        .analysis-textarea:focus {
            outline: none;
            border-color: var(--tool-accent-light);
            background: var(--color-bg-secondary);
        }

        .model-answer {
            background: var(--color-bg-secondary);
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid var(--tool-accent);
            margin-top: 1rem;
            display: none;
        }

        .model-answer.show {
            display: block;
        }

        .model-answer h4 {
            color: var(--tool-accent-light);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .model-answer-text {
            color: var(--color-text-primary);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        /* BUTTONS */
        .button-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--tool-accent-light);
            color: var(--color-text-primary);
        }

        .btn-primary:hover {
            background: var(--tool-accent-lighter);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--color-bg-secondary);
            color: var(--color-text-primary);
        }

        .btn-secondary:hover {
            background: var(--color-bg-secondary);
        }

        .btn-reveal {
            background: var(--tool-accent);
            color: var(--color-header-text);
        }

        .btn-reveal:hover {
            background: var(--tool-accent-light);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--color-text-secondary);
        }

        .empty-state h2 {
            color: var(--tool-accent-light);
            margin-bottom: 1rem;
        }

        /* ANIMATIONS */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .card {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.4rem;
            }

            .mode-selector {
                flex-direction: column;
            }

            .mode-btn {
                width: 100%;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .problem-header {
                flex-direction: column;
            }
        }

        /* REVIEW MODE */
        .review-controls {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .review-controls button {
            flex: 1;
            min-width: 120px;
        }

        .review-label {
            color: var(--color-text-secondary);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
    <link rel="stylesheet" href="../theme.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Criminal Law Issue Spotter</h1>
            <p class="subtitle">Mixed-Topic Problem Identification & Analysis</p>
        </header>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('sequential')">Sequential</button>
            <button class="mode-btn" onclick="setMode('shuffle')">Shuffle</button>
            <button class="mode-btn" onclick="setMode('review')">Review Missed</button>
        </div>

        <div class="stats-panel">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Correct</div>
                    <div class="stat-value" id="correctCount">0</div>
                    <div class="stat-percent" id="correctPercent">0%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Attempted</div>
                    <div class="stat-value" id="attemptedCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Remaining</div>
                    <div class="stat-value" id="remainingCount">30+</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Accuracy</div>
                    <div class="stat-value" id="accuracyPercent">-</div>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-label">
                    <span>Progress</span>
                    <span id="progressText">0 / 37</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <div class="topic-breakdown" id="topicBreakdown" style="display: none;">
                <h3>Topic Breakdown</h3>
                <div id="topicBreakdownContent"></div>
            </div>
        </div>

        <div id="mainContent"></div>
    </div>

    <script>
        // ============ PROBLEM BANK ============
        const problems = [
            {
                id: 1,
                difficulty: 'medium',
                topic: 'Actus Reus - Voluntary Act',
                factPattern: 'Marcus was sleeping in his apartment when he reflexively swung his arm during a nightmare, striking his roommate in the face and breaking his nose. The roommate wants to sue for battery.',
                question: 'What is the primary legal issue?',
                options: [
                    'Voluntary act requirement',
                    'Transferred intent',
                    'Assault vs battery',
                    'Causation',
                    'Duty to warn'
                ],
                correctAnswer: 'Voluntary act requirement',
                explanation: 'This is a classic involuntary act problem. Reflexive actions during sleep lack the voluntary act element required for criminal liability. No actus reus exists.',
                followup: 'Would the result be different if Marcus had voluntarily taken a medication that caused violent involuntary movements? Explain why.',
                modelAnswer: 'Yes, the result would likely differ. If Marcus knowingly took a medication with known side effects (violent movements), courts might find voluntary act through his initial voluntary ingestion. The key is whether the defendant voluntarily created the circumstances causing the involuntary conduct.'
            },
            {
                id: 2,
                difficulty: 'hard',
                topic: 'Mens Rea - Knowledge vs Purpose',
                factPattern: 'Dr. Chen prescribed an FDA-banned medication to his cancer patient because he honestly believed it was the best available treatment and had researched it extensively. The patient suffered an allergic reaction and died. The FDA classification suggests strict regulatory liability.',
                question: 'What is the primary legal issue?',
                options: [
                    'Strict liability',
                    'Knowledge vs purpose distinction',
                    'Professional judgment defense',
                    'Causation',
                    'Negligence vs recklessness'
                ],
                correctAnswer: 'Knowledge vs purpose distinction',
                explanation: 'While strict liability might apply to the regulatory violation, the criminal charge requires analyzing mens rea. Did Dr. Chen act with knowledge (conscious awareness) or purpose (desire)? His honest but mistaken belief about effectiveness suggests neither knowledge nor purpose to harm.',
                followup: 'How would the analysis change if Dr. Chen knew the medication was banned but prescribed it anyway because he believed he was above the law?',
                modelAnswer: 'The analysis shifts significantly. Knowledge that the medication was banned is now established. The question becomes whether he acted with recklessness (conscious disregard of substantial risk) or negligence (failure to perceive risk). His defiance of the law suggests at least recklessness, which is sufficient for many criminal charges.'
            },
            {
                id: 3,
                difficulty: 'easy',
                topic: 'Omission / Duty to Act',
                factPattern: 'Gina, an excellent swimmer, was at a public pool when she saw a young child drowning. She was in no danger, had no special relationship to the child, and could have easily rescued him. She walked away without attempting help. The child drowned.',
                question: 'What is the primary legal issue?',
                options: [
                    'Omission - no duty to act',
                    'Involuntary manslaughter',
                    'Recklessness',
                    'Gross negligence',
                    'Reasonable person standard'
                ],
                correctAnswer: 'Omission - no duty to act',
                explanation: 'While morally troubling, Gina likely had no legal duty to rescue. Absent a special relationship (parent-child, lifeguard-swimmer, etc.) or having created the danger, there is no affirmative duty to rescue under most common law rules.',
                followup: 'Would your answer change if Gina was a hired lifeguard on duty? Explain the different legal duty.',
                modelAnswer: 'Yes, completely. As a lifeguard on duty, Gina would have an explicitly assumed duty of care to rescue swimmers. Her failure to act would constitute criminal negligence or involuntary manslaughter. The key is the creation of a special relationship through her employment status.'
            },
            {
                id: 4,
                difficulty: 'medium',
                topic: 'Felony Murder - Causation Limits',
                factPattern: 'During a bank robbery, one of the tellers suffered a heart attack from fear and died within minutes. The robber used a toy gun that looked realistic. No shots were fired. The death occurred inside the bank during the robbery.',
                question: 'What is the primary legal issue?',
                options: [
                    'Felony murder with causation limits',
                    'Transferred intent',
                    'Assault causing death',
                    'Reckless endangerment',
                    'Conspiracy to commit murder'
                ],
                correctAnswer: 'Felony murder with causation limits',
                explanation: 'Most jurisdictions have adopted limits on felony murder liability. Causes intervening between the dangerous felony and death (like natural responses to fear/terror) may break the chain of causation. Some courts require "in the furtherance of" prongs or foreseeability tests.',
                followup: 'Explain whether different causation theories might apply if the robber had caused the heart attack through direct physical violence versus psychological terror.',
                modelAnswer: 'Direct physical violence (pushing, striking) creates strong causation. The robber directly caused injury leading to death. Psychological terror is more attenuated—the victim\'s medical condition mediates the injury. Courts distinguish: direct physical harm is typically foreseeable; cardiac response to fear is often deemed an intervening cause breaking the chain.'
            },
            {
                id: 5,
                difficulty: 'hard',
                topic: 'Concurrence - Timing of Mens Rea',
                factPattern: 'Tyler found a laptop in a coffee shop. He took it home, planning to post photos on social media to find the owner. After a week with no success, he decided to keep the laptop permanently and sold it for $400.',
                question: 'What is the primary legal issue?',
                options: [
                    'Larceny - concurrence of actus reus and mens rea',
                    'Found property exception',
                    'Conversion vs larceny',
                    'Theft by deception',
                    'Embezzlement'
                ],
                correctAnswer: 'Larceny - concurrence of actus reus and mens rea',
                explanation: 'Concurrence requires mens rea to exist at the time of the taking. Tyler\'s initial taking was not for permanent deprivation (no larceny). His later decision to keep it was not a "taking." Courts split on whether subsequent conversion of initially-innocent possession constitutes larceny or mere conversion.',
                followup: 'Some jurisdictions apply the "continuing trespass" doctrine here. Explain what this doctrine allows and its policy justification.',
                modelAnswer: 'The continuing trespass doctrine treats the original wrongful taking as continuing until the property is returned or the trespass ends. It extends liability by allowing the later-formed intent to steal to relate back to the original taking. Policy-wise, it prevents wrongdoers from avoiding liability through delay. However, many modern courts reject this, requiring the theft intent at the moment of taking.'
            },
            {
                id: 6,
                difficulty: 'medium',
                topic: 'First-Degree Murder - Premeditation & Deliberation',
                factPattern: 'During an argument at a bar, David punched Derek. Derek fell and hit his head. As Derek lay on the ground, David yelled, "I\'m going to stomp your skull in!" and stomped Derek\'s head multiple times, killing him. David claims the stomp was a spontaneous continuation of their fight.',
                question: 'What is the primary legal issue?',
                options: [
                    'Premeditation and deliberation (cooling-off period)',
                    'Provocation and manslaughter',
                    'Heat of passion',
                    'Transferred intent',
                    'Malice aforethought'
                ],
                correctAnswer: 'Premeditation and deliberation (cooling-off period)',
                explanation: 'The key question is timing and reflection. Did the stomp reflect a new decision after cooling off, or continuation of the original rage? David\'s statement shows he consciously decided to escalate. Even if momentary, some courts find this sufficient premeditation—the thought occurred before the act.',
                followup: 'Explain how the "sudden" vs. "formed decision" distinction affects premeditation under different state frameworks.',
                modelAnswer: 'Premeditation requires actual reflection before the killing, though the period can be very brief. "Sudden" suggests unformed reaction (likely no premeditation). "Formed decision" suggests conscious choice (likely premeditation). The statement "I\'m going to stomp your skull" evidences formed decision. However, some courts would still call this heat-of-passion second-degree murder, requiring clear temporal separation between forming intent and acting.'
            },
            {
                id: 7,
                difficulty: 'easy',
                topic: 'Larceny - Identification',
                factPattern: 'Sarah saw her friend Emma\'s jacket hanging on a chair at a party. Without asking, Sarah put it on and wore it home. She intended to return it the next day but forgot about it for a month. When Emma asked for it back, Sarah returned it immediately.',
                question: 'What is the primary legal issue?',
                options: [
                    'Whether larceny occurred (intent at taking)',
                    'Borrowing vs stealing',
                    'Conversion',
                    'Theft by deception',
                    'Receiving stolen property'
                ],
                correctAnswer: 'Whether larceny occurred (intent at taking)',
                explanation: 'Sarah took the jacket without permission, but without intent to permanently deprive Emma of it. At the moment of taking, larceny requires intent to permanently deprive. Sarah\'s intent to return it (even if forgotten) means no larceny. She may have committed conversion (a tort) but not the crime of larceny.',
                followup: 'Would the analysis differ if Sarah had initially intended to keep the jacket but returned it only when confronted by Emma?',
                modelAnswer: 'Yes, significantly. If Sarah intended permanent deprivation at the moment of taking, larceny occurred—even though she later returned it. What matters is the mens rea at the time of the unlawful taking, not her later change of heart. Once she formed the intent to permanently deprive (and took it), the crime was complete.'
            },
            {
                id: 8,
                difficulty: 'medium',
                topic: 'Voluntary Manslaughter - Provocation (Cooling-Off)',
                factPattern: 'Kevin discovered his wife in bed with his boss. Enraged, Kevin left the house, drove around for two hours thinking about what he witnessed, then returned home with a gun and shot both his wife and boss, killing both.',
                question: 'What is the primary legal issue?',
                options: [
                    'Heat of passion with cooling-off period',
                    'Premeditation (first-degree murder)',
                    'Transferred intent',
                    'Temporary insanity',
                    'Crime of passion defense'
                ],
                correctAnswer: 'Heat of passion with cooling-off period',
                explanation: 'Heat of passion/provocation reduces murder to voluntary manslaughter, but only if the defendant did not "cool off." The two-hour gap suggests Kevin had time to regain control. The deliberate return to get a gun suggests premeditation, likely defeating heat-of-passion claim.',
                followup: 'Explain the different approaches to "adequate provocation" across jurisdictions and how they might apply here.',
                modelAnswer: 'Jurisdictions differ: some recognize only specific provocations (catching spouse in adultery), while others use broader "reasonable person" tests (would a reasonable person lose control?). Some focus on words vs. conduct. Here, catching a spouse in adultery IS traditionally adequate provocation—Kevin was immediately enraged. However, the two-hour cooling-off period is fatal to the defense in most jurisdictions. The question becomes: could Kevin have regained control? The deliberate return for a gun suggests no.'
            },
            {
                id: 9,
                difficulty: 'hard',
                topic: 'Second-Degree Murder - Extreme Recklessness',
                factPattern: 'At a party, Rashid fired a gun into a crowded room "as a joke," believing the bullets wouldn\'t hit anyone because he was a "great shot." The bullet struck a partygoer and killed them. Rashid had no prior intent to kill or specific target.',
                question: 'What is the primary legal issue?',
                options: [
                    'Implied malice / extreme recklessness (depraved heart)',
                    'Involuntary manslaughter',
                    'Recklessness vs negligence',
                    'Transferred intent',
                    'Felony murder'
                ],
                correctAnswer: 'Implied malice / extreme recklessness (depraved heart)',

        }

        function selectOption(problemId, optionIdx, option) {
            if (problemState[problemId]?.answered) return; // Already answered

            const problem = problemQueue.find(p => p.id === problemId);
            selectedAnswerIndex = optionIdx;

            // Record answer
            const isCorrect = option === problem.correctAnswer;
            problemState[problemId] = {
                answered: true,
                correct: isCorrect,
                selectedIndex: optionIdx
            };

            // Update stats
            stats.attempted++;
            if (isCorrect) {
                stats.correct++;
                if (!stats.byTopic[problemId]) {
                    stats.byTopic[problemId] = true;
                }
            } else {
                // Add to missed if not already there
                if (!missedProblems.find(p => p.id === problemId)) {
                    missedProblems.push(problem);
                }
            }

            render();
        }

        function toggleModelAnswer(problemId) {
            const modelAnswer = document.getElementById(`model-answer-${problemId}`);
            modelAnswer.classList.toggle('show');
        }

        function nextProblem() {
            currentProblemIndex++;
            selectedAnswerIndex = -1;
            render();
        }

        // ============ INITIALIZE ============
        initializeProblemQueue();
        render();
    </script>
    <script src="../shared.js"></script>
    <script src="../navbar.js"></script>
</body>
</html>
