<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build the Argument - LawGames</title>
    <link rel="stylesheet" href="../../theme.css">
    <style>
        :root {
            --color-issue: #3b82f6;      /* Blue */
            --color-rule: #10b981;       /* Green */
            --color-application: #f97316; /* Orange */
            --color-conclusion: #a855f7;  /* Purple */
            --color-issue-light: #dbeafe;
            --color-rule-light: #dcfce7;
            --color-application-light: #fed7aa;
            --color-conclusion-light: #e9d5ff;
            --color-correct: #10b981;
            --color-incorrect: #ef4444;
            --color-partial: #f59e0b;
            --color-decoy: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--color-bg-secondary);
            font-family: var(--font-sans);
            color: var(--color-text-primary);
        }

        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* ========== SCENARIO SELECTION ========== */
        .scenario-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .scenario-card {
            background: var(--color-bg-primary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid var(--color-border);
            box-shadow: var(--shadow-sm);
        }

        .scenario-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-subject-crim);
        }

        .scenario-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .scenario-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin: 0;
        }

        .scenario-badges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-side {
            background: var(--color-category-blue);
            color: white;
        }

        .badge-charge {
            background: var(--color-subject-crim);
            color: white;
        }

        .scenario-fact {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }

        .scenario-score {
            font-size: 0.85rem;
            color: var(--color-text-tertiary);
            font-weight: 600;
        }

        .scenario-score.completed {
            color: var(--color-correct);
        }

        /* ========== GAME VIEW ========== */
        .game-view {
            display: none;
        }

        .game-view.active {
            display: block;
        }

        .fact-pattern-card {
            background: var(--color-bg-primary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 2px solid var(--color-border);
            box-shadow: var(--shadow-sm);
        }

        .fact-pattern-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .fact-pattern-header h2 {
            margin: 0;
            font-size: 1.25rem;
            color: var(--color-text-primary);
        }

        .fact-badges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .fact-pattern-text {
            font-family: var(--font-serif);
            font-size: 1rem;
            line-height: 1.6;
            color: var(--color-text-primary);
            margin: 0;
        }

        /* ========== GAME LAYOUT (TWO PANEL) ========== */
        .game-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 1024px) {
            .game-layout {
                grid-template-columns: 1fr;
            }
        }

        .game-panel {
            background: var(--color-bg-primary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 2px solid var(--color-border);
            box-shadow: var(--shadow-sm);
        }

        .panel-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin: 0 0 1rem 0;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--color-border);
        }

        /* ========== BLOCK POOL ========== */
        .block-pool {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem;
            min-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .block-pool::-webkit-scrollbar {
            width: 8px;
        }

        .block-pool::-webkit-scrollbar-track {
            background: var(--color-bg-secondary);
            border-radius: 4px;
        }

        .block-pool::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 4px;
        }

        .block-pool::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-tertiary);
        }

        .block-card {
            background: var(--color-bg-primary);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 1rem;
            cursor: grab;
            transition: all 0.2s ease;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .block-card:active {
            cursor: grabbing;
        }

        .block-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .block-card.selected {
            border-color: var(--color-subject-crim);
            background: var(--color-category-blue);
            color: white;
        }

        .block-type-tag {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .block-type-tag.issue {
            background: var(--color-issue-light);
            color: var(--color-issue);
        }

        .block-type-tag.rule {
            background: var(--color-rule-light);
            color: var(--color-rule);
        }

        .block-type-tag.application {
            background: var(--color-application-light);
            color: var(--color-application);
        }

        .block-type-tag.conclusion {
            background: var(--color-conclusion-light);
            color: var(--color-conclusion);
        }

        .block-text {
            font-size: 0.9rem;
            line-height: 1.4;
            color: var(--color-text-primary);
            margin: 0;
        }

        .block-card.selected .block-text {
            color: white;
        }

        .block-card.selected .block-type-tag {
            opacity: 0.7;
        }

        /* ========== DROP ZONES ========== */
        .drop-zones {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .drop-zone {
            border: 2px dashed var(--color-border);
            border-radius: var(--radius-md);
            padding: 1rem;
            min-height: 80px;
            transition: all 0.2s ease;
            background: var(--color-bg-primary);
        }

        .drop-zone.has-blocks {
            border-style: solid;
            background: var(--color-bg-secondary);
        }

        .drop-zone.dragover {
            border-color: var(--color-subject-crim);
            background: rgba(59, 130, 246, 0.1);
        }

        .zone-header {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 3px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .zone-header.issue {
            color: var(--color-issue);
            border-bottom-color: var(--color-issue);
        }

        .zone-header.rule {
            color: var(--color-rule);
            border-bottom-color: var(--color-rule);
        }

        .zone-header.application {
            color: var(--color-application);
            border-bottom-color: var(--color-application);
        }

        .zone-header.conclusion {
            color: var(--color-conclusion);
            border-bottom-color: var(--color-conclusion);
        }

        .zone-count {
            font-size: 0.75rem;
            opacity: 0.7;
            font-weight: normal;
            text-transform: none;
            letter-spacing: normal;
        }

        .zone-content {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .block-in-zone {
            background: var(--color-bg-primary);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: 0.75rem;
            cursor: grab;
            transition: all 0.2s ease;
        }

        .block-in-zone:active {
            cursor: grabbing;
        }

        .block-in-zone.correct {
            border-color: var(--color-correct);
            background: rgba(16, 185, 129, 0.1);
        }

        .block-in-zone.incorrect {
            border-color: var(--color-incorrect);
            background: rgba(239, 68, 68, 0.1);
        }

        .block-in-zone.partial {
            border-color: var(--color-partial);
            background: rgba(245, 158, 11, 0.1);
        }

        .block-in-zone.decoy {
            border-color: var(--color-decoy);
            background: rgba(239, 68, 68, 0.1);
        }

        .block-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        .block-label.correct {
            color: var(--color-correct);
        }

        .block-label.incorrect {
            color: var(--color-incorrect);
        }

        .block-label.partial {
            color: var(--color-partial);
        }

        .block-label.decoy {
            color: var(--color-decoy);
        }

        .block-in-zone.ghost {
            opacity: 0.5;
            border-style: dashed;
            background: var(--color-bg-secondary);
        }

        /* ========== CONTROLS ========== */
        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .game-button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit {
            background: var(--color-subject-crim);
            color: white;
            flex: 1;
        }

        .btn-submit:hover:not(:disabled) {
            opacity: 0.85;
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .block-count {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        /* ========== SCORING & RESULTS ========== */
        .result-view {
            display: none;
        }

        .result-view.active {
            display: block;
        }

        .score-card {
            background: linear-gradient(135deg, var(--color-subject-crim), #a02622);
            color: white;
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
        }

        .score-large {
            font-size: 3rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
        }

        .score-label {
            font-size: 1rem;
            opacity: 0.9;
            margin: 0;
        }

        .score-breakdown {
            background: var(--color-bg-primary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }

        .breakdown-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin: 0 0 1rem 0;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--color-border);
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--color-border);
            font-size: 0.95rem;
        }

        .breakdown-item:last-child {
            border-bottom: none;
        }

        .breakdown-label {
            color: var(--color-text-secondary);
        }

        .breakdown-value {
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .breakdown-value.positive {
            color: var(--color-correct);
        }

        .breakdown-value.negative {
            color: var(--color-incorrect);
        }

        .model-answer {
            background: var(--color-bg-primary);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 2px solid var(--color-border);
            box-shadow: var(--shadow-sm);
        }

        .model-answer-header {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin: 0 0 1rem 0;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--color-border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .model-answer-header:hover {
            color: var(--color-subject-crim);
        }

        .model-answer-toggle {
            font-size: 1rem;
            transition: transform 0.2s ease;
        }

        .model-answer-toggle.open {
            transform: rotate(180deg);
        }

        .model-answer-content {
            display: none;
            margin-top: 1rem;
        }

        .model-answer-content.open {
            display: block;
        }

        .model-zones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .model-zone {
            background: var(--color-bg-secondary);
            border-radius: var(--radius-md);
            padding: 1rem;
            border-left: 4px solid;
        }

        .model-zone.issue {
            border-left-color: var(--color-issue);
        }

        .model-zone.rule {
            border-left-color: var(--color-rule);
        }

        .model-zone.application {
            border-left-color: var(--color-application);
        }

        .model-zone.conclusion {
            border-left-color: var(--color-conclusion);
        }

        .model-zone-title {
            font-weight: 600;
            margin: 0 0 0.75rem 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .model-block {
            background: var(--color-bg-primary);
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            line-height: 1.4;
            color: var(--color-text-primary);
        }

        .model-block:last-child {
            margin-bottom: 0;
        }

        .result-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-action {
            flex: 1;
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--color-border);
            background: var(--color-bg-primary);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            border-color: var(--color-subject-crim);
            background: var(--color-category-blue);
            color: white;
        }

        .btn-action.primary {
            background: var(--color-subject-crim);
            color: white;
            border-color: var(--color-subject-crim);
        }

        .btn-action.primary:hover {
            opacity: 0.85;
        }

        .share-button {
            padding: 0.75rem 1.5rem;
            background: var(--color-bg-primary);
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .share-button:hover {
            border-color: var(--color-subject-crim);
            background: var(--color-category-blue);
            color: white;
        }

        /* ========== MOBILE STYLES ========== */
        @media (max-width: 768px) {
            .game-layout {
                grid-template-columns: 1fr;
            }

            .block-pool {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .score-card {
                padding: 1.5rem;
            }

            .score-large {
                font-size: 2.5rem;
            }

            .result-actions {
                flex-direction: column;
            }

            .game-controls {
                flex-direction: column-reverse;
            }

            .model-zones {
                grid-template-columns: 1fr;
            }
        }

        /* ========== UTILITIES ========== */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--color-text-tertiary);
        }

        .empty-state p {
            margin: 0;
        }

        /* ── Dark theme overrides (dark, midnight, forest, ocean, sunset) ── */
        [data-theme="dark"],
        [data-theme="midnight"],
        [data-theme="forest"],
        [data-theme="ocean"],
        [data-theme="sunset"] {
            --color-issue-light: rgba(59, 130, 246, 0.2);
            --color-rule-light: rgba(16, 185, 129, 0.2);
            --color-application-light: rgba(249, 115, 22, 0.2);
            --color-conclusion-light: rgba(168, 85, 247, 0.2);
        }

        [data-theme="dark"] .block-in-zone.incorrect,
        [data-theme="midnight"] .block-in-zone.incorrect,
        [data-theme="forest"] .block-in-zone.incorrect,
        [data-theme="ocean"] .block-in-zone.incorrect,
        [data-theme="sunset"] .block-in-zone.incorrect,
        [data-theme="dark"] .block-in-zone.decoy,
        [data-theme="midnight"] .block-in-zone.decoy,
        [data-theme="forest"] .block-in-zone.decoy,
        [data-theme="ocean"] .block-in-zone.decoy,
        [data-theme="sunset"] .block-in-zone.decoy {
            background: rgba(239, 68, 68, 0.15);
        }

        [data-theme="dark"] .block-in-zone.partial,
        [data-theme="midnight"] .block-in-zone.partial,
        [data-theme="forest"] .block-in-zone.partial,
        [data-theme="ocean"] .block-in-zone.partial,
        [data-theme="sunset"] .block-in-zone.partial {
            background: rgba(245, 158, 11, 0.15);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header id="app-header"></header>

        <!-- SCENARIO SELECTION VIEW -->
        <div id="scenario-view" class="scenario-view">
            <div class="scenario-selector" id="scenario-selector"></div>
        </div>

        <!-- GAME VIEW -->
        <div id="game-view" class="game-view">
            <div class="fact-pattern-card">
                <div class="fact-pattern-header">
                    <h2>Fact Pattern</h2>
                    <div class="fact-badges" id="fact-badges"></div>
                </div>
                <p class="fact-pattern-text" id="fact-pattern-text"></p>
            </div>

            <div class="game-layout">
                <!-- LEFT/TOP: BLOCK POOL -->
                <div class="game-panel">
                    <h3 class="panel-title">Block Pool</h3>
                    <div class="block-pool" id="block-pool"></div>
                </div>

                <!-- RIGHT/BOTTOM: DROP ZONES -->
                <div class="game-panel">
                    <h3 class="panel-title">Your Argument</h3>
                    <div class="drop-zones" id="drop-zones"></div>
                </div>
            </div>

            <div class="game-controls">
                <div class="block-count"><span id="block-count">0</span> blocks placed</div>
                <button class="game-button btn-submit" id="submit-btn">Submit Argument</button>
            </div>
        </div>

        <!-- RESULT VIEW -->
        <div id="result-view" class="result-view">
            <div class="score-card">
                <p class="score-label">Your Score</p>
                <h2 class="score-large"><span id="final-score">0</span>/100</h2>
            </div>

            <div class="score-breakdown">
                <h3 class="breakdown-title">Score Breakdown</h3>
                <div id="breakdown-content"></div>
            </div>

            <div class="model-answer">
                <div class="model-answer-header" onclick="window.gameState.toggleModelAnswer()">
                    <span>Model Answer</span>
                    <span class="model-answer-toggle">▼</span>
                </div>
                <div class="model-answer-content" id="model-answer-content">
                    <div class="model-zones" id="model-zones"></div>
                </div>
            </div>

            <div class="result-actions">
                <button class="btn-action primary" onclick="window.gameState.nextScenario()">Next Scenario</button>
                <button class="btn-action" onclick="window.gameState.backToMenu()">Back to Menu</button>
                <button class="share-button" onclick="window.gameState.shareResult()">Share 📤</button>
            </div>
        </div>
    </div>
    <script src="../../shared.js"></script>
    <script src="../../navbar.js"></script>
    <script>
        var ARGUMENTS_DATA = {
  "scenarios": [
    {
      "id": 1,
      "fact_pattern": "Dave stabbed Victor during a bar fight after Victor shoved him following an insult to Dave's wife. Victor died on the way to the hospital after a 40-minute ambulance delay.",
      "side": "Prosecution",
      "charge": "Second-Degree Murder",
      "correct_blocks": [
        {
          "type": "issue",
          "text": "Whether Dave is guilty of second-degree murder—an unlawful killing with malice aforethought, but lacking willfulness, deliberation, and premeditation."
        },
        {
          "type": "rule",
          "text": "Under common law, second-degree murder requires malice aforethought but not the elements of first-degree murder. The four forms of malice are: (1) intent to kill, (2) intent to inflict grievous bodily injury, (3) depraved heart murder, or (4) felony murder."
        },
        {
          "type": "rule",
          "text": "Malice is presumed when a defendant intentionally uses a deadly weapon and directs it at a vital area of the body, absent evidence to the contrary."
        },
        {
          "type": "application",
          "text": "Dave intentionally pulled out a knife and stabbed Victor in the chest—a vital area. This demonstrates intent to either kill or inflict grievous bodily injury, satisfying malice aforethought."
        },
        {
          "type": "application",
          "text": "Dave's conduct cannot be reduced to negligent homicide or involuntary manslaughter because he acted with conscious intent, not mere recklessness or negligence."
        },
        {
          "type": "application",
          "text": "While Dave may argue he lacked premeditation (the shove occurred only moments before the stabbing), he clearly possessed malice, making second-degree murder the appropriate charge even if first-degree murder fails."
        },
        {
          "type": "conclusion",
          "text": "Dave is guilty of second-degree murder. His intentional use of a deadly weapon on a vital area establishes malice aforethought. The state need not prove premeditation and deliberation for this conviction."
        }
      ],
      "decoy_blocks": [
        {
          "type": "rule",
          "text": "Involuntary manslaughter requires gross negligence or recklessness, not intentional conduct. Therefore, Dave's deliberate stabbing cannot be charged as involuntary manslaughter."
        },
        {

        // ========== GAME STATE MANAGER ==========
        window.gameState = {
            currentScenario: null,
            allScenarios: [],
            placedBlocks: {},
            blockSelection: null, // For mobile tap-select mode
            isDragging: false,
            draggedElement: null,
            draggedBlockId: null,
            result: null,

            init: function() {
                LawGames.initTheme();
                const header = LawGames.createHeader('Build the Argument', true);
                document.getElementById('app-header').appendChild(header);

                this.loadScenarios();
            },

            loadScenarios: function() {
                Promise.resolve(ARGUMENTS_DATA).then((data) => {
                    this.allScenarios = data.scenarios;
                    this.renderScenarioSelection();
                }).catch((err) => {
                    console.error('Failed to load arguments data:', err);
                    alert('Failed to load game data');
                });
            },

            renderScenarioSelection: function() {
                const container = document.getElementById('scenario-selector');
                container.innerHTML = '';

                this.allScenarios.forEach((scenario) => {
                    const stats = LawGames.getStats('argument');
                    const playedScenarios = JSON.parse(localStorage.getItem('lawgames-argument-played') || '[]');
                    const isCompleted = playedScenarios.includes(scenario.id);

                    const card = document.createElement('div');
                    card.className = 'scenario-card';
                    card.onclick = () => this.startGame(scenario);

                    const header = document.createElement('div');
                    header.className = 'scenario-card-header';

                    const title = document.createElement('h3');
                    title.className = 'scenario-title';
                    title.textContent = scenario.charge;
                    header.appendChild(title);

                    const badges = document.createElement('div');
                    badges.className = 'scenario-badges';

                    const sideBadge = document.createElement('span');
                    sideBadge.className = 'badge badge-side';
                    sideBadge.textContent = scenario.side;
                    badges.appendChild(sideBadge);

                    header.appendChild(badges);
                    card.appendChild(header);

                    const fact = document.createElement('p');
                    fact.className = 'scenario-fact';
                    fact.textContent = scenario.fact_pattern.substring(0, 120) + '...';
                    card.appendChild(fact);

                    if (isCompleted) {
                        const score = document.createElement('p');
                        score.className = 'scenario-score completed';
                        score.textContent = '✓ Completed';
                        card.appendChild(score);
                    }

                    container.appendChild(card);
                });
            },

            startGame: function(scenario) {
                this.currentScenario = scenario;
                this.placedBlocks = {
                    issue: [],
                    rule: [],
                    application: [],
                    conclusion: []
                };
                this.blockSelection = null;

                // Mark as played
                const played = JSON.parse(localStorage.getItem('lawgames-argument-played') || '[]');
                if (!played.includes(scenario.id)) {
                    played.push(scenario.id);
                    localStorage.setItem('lawgames-argument-played', JSON.stringify(played));
                }

                document.getElementById('scenario-view').style.display = 'none';
                document.getElementById('game-view').classList.add('active');
                document.getElementById('result-view').classList.remove('active');

                this.renderGame();
            },

            renderGame: function() {
                const scenario = this.currentScenario;

                // Render fact pattern
                document.getElementById('fact-pattern-text').textContent = scenario.fact_pattern;

                // Render badges
                const badgesContainer = document.getElementById('fact-badges');
                badgesContainer.innerHTML = '';
                const sideBadge = document.createElement('span');
                sideBadge.className = 'badge badge-side';
                sideBadge.textContent = scenario.side;
                badgesContainer.appendChild(sideBadge);
                const chargeBadge = document.createElement('span');
                chargeBadge.className = 'badge badge-charge';
                chargeBadge.textContent = scenario.charge;
                badgesContainer.appendChild(chargeBadge);

                // Render block pool (combined correct + decoy, shuffled)
                this.renderBlockPool();

                // Render drop zones
                this.renderDropZones();

                this.updateBlockCount();
            },

            renderBlockPool: function() {
                const scenario = this.currentScenario;
                const allBlocks = [
                    ...scenario.correct_blocks.map((b, i) => ({
                        ...b,
                        id: 'correct-' + i,
                        isCorrect: true
                    })),
                    ...scenario.decoy_blocks.map((b, i) => ({
                        ...b,
                        id: 'decoy-' + i,
                        isDecoy: true
                    }))
                ];

                const shuffled = LawGames.shuffleArray(allBlocks);
                const poolContainer = document.getElementById('block-pool');
                poolContainer.innerHTML = '';

                shuffled.forEach((block) => {
                    const blockEl = document.createElement('div');
                    blockEl.className = 'block-card';
                    blockEl.draggable = true;
                    blockEl.id = 'block-' + block.id;
                    blockEl.dataset.blockId = block.id;
                    blockEl.dataset.type = block.type;
                    blockEl.dataset.isCorrect = block.isCorrect ? 'true' : 'false';
                    blockEl.dataset.isDecoy = block.isDecoy ? 'true' : 'false';

                    const typeTag = document.createElement('div');
                    typeTag.className = 'block-type-tag ' + block.type;
                    typeTag.textContent = block.type.charAt(0).toUpperCase() + block.type.slice(1);
                    blockEl.appendChild(typeTag);

                    const text = document.createElement('p');
                    text.className = 'block-text';
                    text.textContent = block.text;
                    blockEl.appendChild(text);

                    // Desktop drag
                    blockEl.addEventListener('dragstart', (e) => {
                        this.isDragging = true;
                        this.draggedElement = blockEl;
                        this.draggedBlockId = block.id;
                        blockEl.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                    });

                    blockEl.addEventListener('dragend', (e) => {
                        this.isDragging = false;
                        blockEl.classList.remove('dragging');
                    });

                    // Mobile tap
                    blockEl.addEventListener('click', (e) => {
                        if (this.isDragging) return;
                        this.selectBlock(block, blockEl);
                    });

                    blockEl.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        this.selectBlock(block, blockEl);
                    });

                    poolContainer.appendChild(blockEl);
                });
            },

            selectBlock: function(block, blockEl) {
                // Deselect previous
                if (this.blockSelection && this.blockSelection.element) {
                    this.blockSelection.element.classList.remove('selected');
                }

                // Select new
                blockEl.classList.add('selected');
                this.blockSelection = {
                    block: block,
                    element: blockEl
                };
            },

            renderDropZones: function() {
                const types = ['issue', 'rule', 'application', 'conclusion'];
                const container = document.getElementById('drop-zones');
                container.innerHTML = '';

                types.forEach((type) => {
                    const zone = document.createElement('div');
                    zone.className = 'drop-zone';
                    zone.id = 'zone-' + type;
                    zone.dataset.type = type;

                    const header = document.createElement('div');
                    header.className = 'zone-header ' + type;

                    const titleSpan = document.createElement('span');
                    titleSpan.textContent = type.charAt(0).toUpperCase() + type.slice(1);
                    header.appendChild(titleSpan);

                    const countSpan = document.createElement('span');
                    countSpan.className = 'zone-count';
                    countSpan.textContent = '0';
                    header.appendChild(countSpan);

                    zone.appendChild(header);

                    const content = document.createElement('div');
                    content.className = 'zone-content';
                    content.id = 'zone-content-' + type;
                    zone.appendChild(content);

                    // Desktop drag
                    zone.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        zone.classList.add('dragover');
                    });

                    zone.addEventListener('dragleave', (e) => {
                        zone.classList.remove('dragover');
                    });

                    zone.addEventListener('drop', (e) => {
                        e.preventDefault();
                        zone.classList.remove('dragover');
                        if (this.draggedBlockId) {
                            this.placeBlock(this.draggedBlockId, type);
                        }
                    });

                    // Mobile tap
                    zone.addEventListener('click', (e) => {
                        if (this.blockSelection && e.target === content) {
                            this.placeBlock(this.blockSelection.block.id, type);
                            this.blockSelection.element.classList.remove('selected');
                            this.blockSelection = null;
                        }
                    });

                    container.appendChild(zone);
                });
            },

            placeBlock: function(blockId, targetType) {
                const scenario = this.currentScenario;

                // Find block in scenario
                let block = null;
                let fromType = null;

                // Check if already placed
                for (const type in this.placedBlocks) {
                    const idx = this.placedBlocks[type].findIndex(b => b.id === blockId);
                    if (idx !== -1) {
                        block = this.placedBlocks[type][idx];
                        fromType = type;
                        break;
                    }
                }

                // If not placed, find in scenario
                if (!block) {
                    const allBlocks = [
                        ...scenario.correct_blocks.map((b, i) => ({
                            ...b,
                            id: 'correct-' + i,
                            isCorrect: true
                        })),
                        ...scenario.decoy_blocks.map((b, i) => ({
                            ...b,
                            id: 'decoy-' + i,
                            isDecoy: true
                        }))
                    ];
                    block = allBlocks.find(b => b.id === blockId);
                }

                if (!block) return;

                // Remove from old location if exists
                if (fromType) {
                    this.placedBlocks[fromType] = this.placedBlocks[fromType].filter(b => b.id !== blockId);
                }

                // Add to new location
                if (!this.placedBlocks[targetType]) {
                    this.placedBlocks[targetType] = [];
                }
                this.placedBlocks[targetType].push(block);

                this.renderDropZones();
                this.updateBlockCount();

                // Re-render drop zones with placed blocks
                this.renderPlacedBlocks();
            },

            renderPlacedBlocks: function() {
                const types = ['issue', 'rule', 'application', 'conclusion'];
                types.forEach((type) => {
                    const content = document.getElementById('zone-content-' + type);
                    const header = document.querySelector('#zone-' + type + ' .zone-header');
                    const countSpan = header.querySelector('.zone-count');
                    countSpan.textContent = (this.placedBlocks[type] || []).length;

                    content.innerHTML = '';
                    (this.placedBlocks[type] || []).forEach((block) => {
                        const blockEl = document.createElement('div');
                        blockEl.className = 'block-in-zone';
                        blockEl.draggable = true;
                        blockEl.id = 'placed-' + block.id;
                        blockEl.dataset.blockId = block.id;
                        blockEl.dataset.type = type;

                        const text = document.createElement('p');
                        text.className = 'block-text';
                        text.textContent = block.text;
                        blockEl.appendChild(text);

                        // Desktop drag
                        blockEl.addEventListener('dragstart', (e) => {
                            this.isDragging = true;
                            this.draggedElement = blockEl;
                            this.draggedBlockId = block.id;
                            blockEl.style.opacity = '0.5';
                            e.dataTransfer.effectAllowed = 'move';
                        });

                        blockEl.addEventListener('dragend', (e) => {
                            this.isDragging = false;
                            blockEl.style.opacity = '1';
                        });

                        // Mobile tap
                        blockEl.addEventListener('click', (e) => {
                            if (this.isDragging) return;
                            this.selectBlock(block, blockEl);
                        });

                        content.appendChild(blockEl);
                    });

                    // Update zone appearance
                    const zone = document.getElementById('zone-' + type);
                    if (this.placedBlocks[type].length > 0) {
                        zone.classList.add('has-blocks');
                    } else {
                        zone.classList.remove('has-blocks');
                    }
                });
            },

            updateBlockCount: function() {
                const count = Object.values(this.placedBlocks).reduce((sum, arr) => sum + arr.length, 0);
                document.getElementById('block-count').textContent = count;

                const submitBtn = document.getElementById('submit-btn');
                submitBtn.disabled = count === 0;
            },

            submitArgument: function() {
                const scenario = this.currentScenario;
                const result = this.scoreArgument();

                // Update stats
                const stats = LawGames.recordGame('argument', {
                    won: result.score >= 70,
                    attempts: 1,
                    score: result.score,
                    topics: []
                });

                this.result = result;
                this.showResults();
            },

            scoreArgument: function() {
                const scenario = this.currentScenario;

                let correctBlocksPlaced = 0;
                let incorrectPlacement = 0;
                let decoysPlaced = 0;
                const feedback = {};

                // Check each placed block
                for (const type in this.placedBlocks) {
                    this.placedBlocks[type].forEach((block) => {
                        const blockKey = block.id;
                        feedback[blockKey] = {};

                        if (block.isDecoy) {
                            decoysPlaced += 1;
                            feedback[blockKey].status = 'decoy';
                            feedback[blockKey].zone = type;
                        } else {
                            // Find correct zone for this block
                            let correctZone = null;
                            scenario.correct_blocks.forEach((correctBlock, idx) => {
                                if (blockKey === 'correct-' + idx) {
                                    correctZone = correctBlock.type;
                                }
                            });

                            if (type === correctZone) {
                                correctBlocksPlaced += 1;
                                feedback[blockKey].status = 'correct';
                                feedback[blockKey].zone = type;
                            } else {
                                incorrectPlacement += 1;
                                feedback[blockKey].status = 'incorrect-placement';
                                feedback[blockKey].zone = type;
                                feedback[blockKey].correctZone = correctZone;
                            }
                        }
                    });
                }

                // Check for missing correct blocks
                const missing = [];
                scenario.correct_blocks.forEach((block, idx) => {
                    const blockId = 'correct-' + idx;
                    const placed = Object.values(this.placedBlocks).flat();
                    if (!placed.find(b => b.id === blockId)) {
                        missing.push({ ...block, id: blockId });
                    }
                });

                // Calculate score
                let score = 0;
                score += correctBlocksPlaced * 15;      // +15 for each correct placement
                score += incorrectPlacement * 5;        // +5 for partially correct (right block, wrong zone)
                score -= decoysPlaced * 10;             // -10 for each decoy

                score = Math.max(0, score);
                score = Math.min(100, score);

                return {
                    score: score,
                    correctBlocksPlaced: correctBlocksPlaced,
                    incorrectPlacement: incorrectPlacement,
                    decoysPlaced: decoysPlaced,
                    missing: missing,
                    feedback: feedback,
                    totalCorrect: scenario.correct_blocks.length
                };
            },

            showResults: function() {
                document.getElementById('game-view').classList.remove('active');
                document.getElementById('result-view').classList.add('active');

                const result = this.result;

                // Score
                document.getElementById('final-score').textContent = result.score;

                // Breakdown
                const breakdownContainer = document.getElementById('breakdown-content');
                breakdownContainer.innerHTML = `
                    <div class="breakdown-item">
                        <span class="breakdown-label">Correct blocks in correct zones</span>
                        <span class="breakdown-value positive">+${result.correctBlocksPlaced * 15}</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="breakdown-label">Correct blocks in wrong zones</span>
                        <span class="breakdown-value positive">+${result.incorrectPlacement * 5}</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="breakdown-label">Decoy blocks placed</span>
                        <span class="breakdown-value negative">-${result.decoysPlaced * 10}</span>
                    </div>
                    <div class="breakdown-item" style="font-weight: 600; font-size: 1.05rem; padding: 1rem 0; border-top: 2px solid var(--color-border); margin-top: 0.5rem;">
                        <span>Total Score</span>
                        <span class="breakdown-value">${result.score}/100</span>
                    </div>
                `;

                // Model answer
                this.renderModelAnswer();
            },

            renderModelAnswer: function() {
                const scenario = this.currentScenario;
                const result = this.result;
                const types = ['issue', 'rule', 'application', 'conclusion'];
                const container = document.getElementById('model-zones');
                container.innerHTML = '';

                types.forEach((type) => {
                    const blocks = scenario.correct_blocks.filter(b => b.type === type);
                    if (blocks.length === 0) return;

                    const zone = document.createElement('div');
                    zone.className = 'model-zone ' + type;

                    const title = document.createElement('div');
                    title.className = 'model-zone-title';
                    title.textContent = type.charAt(0).toUpperCase() + type.slice(1);
                    zone.appendChild(title);

                    blocks.forEach((block) => {
                        const blockEl = document.createElement('div');
                        blockEl.className = 'model-block';
                        blockEl.textContent = block.text;
                        zone.appendChild(blockEl);
                    });

                    container.appendChild(zone);
                });
            },

            toggleModelAnswer: function() {
                const toggle = document.querySelector('.model-answer-toggle');
                const content = document.getElementById('model-answer-content');
                toggle.classList.toggle('open');
                content.classList.toggle('open');
            },

            nextScenario: function() {
                const nextId = this.currentScenario.id + 1;
                const nextScenario = this.allScenarios.find(s => s.id === nextId);

                if (nextScenario) {
                    this.startGame(nextScenario);
                } else {
                    this.backToMenu();
                }
            },

            backToMenu: function() {
                document.getElementById('scenario-view').style.display = 'block';
                document.getElementById('game-view').classList.remove('active');
                document.getElementById('result-view').classList.remove('active');
                this.renderScenarioSelection();
            },

            shareResult: function() {
                const scenario = this.currentScenario;
                const score = this.result.score;
                const shareText = `⚖️ Build the Argument — ${scenario.charge} (${scenario.side})\nScore: ${score}/100\nlawgames.github.io`;
                LawGames.copyShareText(shareText);
            }
        };

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => window.gameState.init());
        } else {
            window.gameState.init();
        }

        // Submit button handler
        document.addEventListener('DOMContentLoaded', () => {
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) {
                submitBtn.addEventListener('click', () => window.gameState.submitArgument());
            }
        });
    </script>
</body>
</html>
