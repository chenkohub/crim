    <div class="container">
        <header>
            <h1>Teach It Back</h1>

        <div class="control-panel">

            <div class="control-row">

                    <option value="">All Topics</option>

                    <option value="Mistakes">Mistakes</option>
                    <option value="Causation">Causation</option>

                    <option value="random">Random Prompt</option>

    <script>
        // ============================================================================
        // DATA STRUCTURE: Comprehensive Feynman Prompts for Criminal Law
        // ============================================================================

        const PROMPTS = [
            // FOUNDATIONS (5 prompts)
            {
                id: 1,
                topic: "Foundations",
                difficulty: "medium",
                prompt: "Explain to a friend why we punish criminals. What are the two main schools of thought?",
                explanation: "We punish people who break the law to serve two main goals. First, some punishment is about making sure the person doesn't do it again (deterrence and incapacitation). Second, some punishment is about the idea that if you break the rules, you deserve punishment (retribution). Different societies and judges weight these reasons differently. If someone commits a small theft, we might think rehabilitation is most important. If someone murders someone, we might focus on retribution or protection.",
                keyPoints: [
                    "Punishment serves multiple purposes (not just revenge)",
                    "Deterrence/incapacitation: preventing future crimes",
                    "Retribution: the idea that wrongdoers deserve punishment",
                    "Different approaches for different crimes",
                    "The balance between these goals is debated"
                ],
                commonGaps: [
                    "Thinking punishment is ONLY about retribution or ONLY about rehabilitation",
                    "Not recognizing that society has multiple reasons for punishment",
                    "Forgetting that these goals sometimes conflict"
                ]
            },
            {
                id: 2,
                topic: "Foundations",
                difficulty: "easy",
                prompt: "Your roommate asks: 'What's the difference between criminal law and civil law?' Explain it.",
                explanation: "Criminal law is when the government punishes someone for breaking the law. A criminal case has the prosecutor (the government) against the defendant, and the goal is punishment—like prison or fines. Civil law is when one person sues another person for money damages. In a civil case, if you win, you get money. In a criminal case, if you're guilty, you can go to prison. The big difference: criminal law is about punishment by the government, civil law is about money between private people. Also, criminal cases require proof 'beyond a reasonable doubt,' but civil cases only need a 'preponderance of the evidence' (more likely than not).",
                keyPoints: [
                    "Criminal law: government prosecutes; punishment (prison, fines)",
                    "Civil law: person sues person; money damages",
                    "Criminal: 'beyond a reasonable doubt' standard",
                    "Civil: 'preponderance of the evidence' standard",
                    "Same act can be both (e.g., O.J. Simpson)"
                ],
                commonGaps: [
                    "Thinking criminal = jail and civil = money, without explaining WHY",
                    "Not mentioning the different burdens of proof",
                    "Confusing civil and criminal procedures"
                ]
            },
            {
                id: 3,
                topic: "Foundations",
                difficulty: "hard",
                prompt: "A non-lawyer asks: 'Can you really be found not guilty if the law was too confusing to understand?' Explain the doctrine of fair notice.",
                explanation: "Yes—but it's rare. A law is supposed to give you 'fair notice' of what's illegal, so you know what to avoid. If a law is SO confusing or vague that a reasonable person can't understand what it prohibits, courts might throw it out as unconstitutional. For example, a law that says 'acts that are bad' is too vague—what counts as 'bad'? However, most laws are clear enough, and ignorance of the law is NOT an excuse. You can't say 'I didn't know tax evasion was illegal' and get away with it. The fair notice doctrine is really about extreme situations where even a reasonable person couldn't understand what was prohibited.",
                keyPoints: [
                    "Due Process Clause protects fair notice",
                    "A law must be clear enough for a reasonable person to understand",
                    "'Void for vagueness' doctrine throws out unconstitutionally vague laws",
                    "NOT about whether YOU personally understood it",
                    "DIFFERENT from ignorance of law as a defense (which doesn't work)"
                ],
                commonGaps: [
                    "Confusing 'fair notice' with 'I didn't know the law'",
                    "Not explaining that this is about constitutional limits, not personal knowledge",
                    "Thinking it's a common defense (it's very rare)"
                ]
            },
            {
                id: 4,
                topic: "Foundations",
                difficulty: "medium",
                prompt: "Explain what 'mens rea' and 'actus reus' mean in plain English to someone who's never heard the terms.",
                explanation: "Mens rea means 'guilty mind'—it's the mental state you have when you do something wrong. Did you do it on purpose? Did you recklessly ignore danger? Did you do it accidentally? Actus reus means 'guilty act'—it's the physical act itself. To be guilty of a crime, you usually need BOTH: you need to have done the wrong act (actus reus) AND to have had the wrong mental state (mens rea). For example, if you accidentally kill someone while driving safely, you did cause the death (act), but you didn't have a guilty mind, so you're not guilty of murder. But if you purposely crash into them, you did the act with the right mental state, so you're guilty.",
                keyPoints: [
                    "Actus reus = the act/conduct itself (physical element)",
                    "Mens rea = the mental state (did you do it on purpose, recklessly, etc.)",
                    "Most crimes require BOTH",
                    "Different crimes require different mental states",
                    "Examples help show the difference"
                ],
                commonGaps: [
                    "Treating actus reus and mens rea as the same thing",
                    "Not realizing that both are usually required",
                    "Forgetting that mental state varies by crime"
                ]
            },
            {
                id: 5,
                topic: "Foundations",
                difficulty: "medium",
                prompt: "A friend asks: 'I heard there's a difference between proof beyond a reasonable doubt and proof beyond a shadow of a doubt. Is that real?' Explain.",
                explanation: "Yes, there's a real difference. 'Beyond a reasonable doubt' is the standard in criminal cases. It means that a reasonable person would be convinced of guilt, but it's not 100% certainty. Some tiny, theoretical doubt is okay. 'Beyond a shadow of a doubt' means almost absolute certainty—almost no doubt at all. This is a much higher standard and is rarely used in law. Criminal courts use 'beyond a reasonable doubt,' which is very high but leaves room for some unlikely scenarios. The idea is that we want to be really sure someone is guilty before we punish them, but we don't require mathematical certainty.",
                keyPoints: [
                    "Beyond a reasonable doubt is the criminal standard",
                    "It means very high certainty but not 100%",
                    "A reasonable person would be convinced",
                    "Some theoretical or unlikely doubt is allowed",
                    "Different from civil law 'preponderance' standard"
                ],
                commonGaps: [
                    "Thinking 'beyond a reasonable doubt' means 100% certainty",
                    "Not understanding that it allows for some doubt",
                    "Confusing it with civil law standards"
                ]
            },

            // ACTUS REUS & VOLUNTARY ACT (5 prompts)
            {
                id: 6,
                topic: "Actus Reus",
                difficulty: "medium",
                prompt: "Explain why a sleepwalker who kills someone might not be guilty of murder.",
                explanation: "A sleepwalker might not be guilty because they didn't voluntarily act. The law requires that you voluntarily do something—you have to be in conscious control of your body. A sleepwalker's body is moving, but their mind isn't controlling it; they're not awake. If the law allows anyone who happens to cause harm to be punished, that would be unfair to people who have no control over their bodies. So courts say that if you genuinely were sleepwalking and couldn't control your actions, that might be a defense. However, if you KNEW you were prone to sleepwalking and didn't take precautions (like locking yourself in), you might still be guilty of an earlier crime (recklessly putting yourself in a position to harm someone).",
                keyPoints: [
                    "Actus reus requires a voluntary act (conscious control)",
                    "Sleepwalking = involuntary act",
                    "Without voluntary act, no crime (usually)",
                    "BUT: prior knowledge + negligent failure to prevent can create liability",
                    "Different from intent (this is about control, not purpose)"
                ],
                commonGaps: [
                    "Thinking voluntary just means 'movement'—it requires conscious control",
                    "Not considering that prior knowledge matters",
                    "Forgetting that the law distinguishes between the act and prior negligence"
                ]
            },
            {
                id: 7,
                topic: "Actus Reus",
                difficulty: "hard",
                prompt: "Your friend says 'The law should punish drug addicts for being addicts.' Explain why the Constitution says otherwise.",
                explanation: "The Constitution says you can't punish someone just for their status or condition. In Robinson v. California, the Supreme Court said that a law making it illegal to BE an addict (not to use drugs, but to have the status of being addicted) violates the 8th Amendment (no cruel punishment) and the 14th Amendment (due process). The reason is that you can't voluntarily act your way into innocence if your only crime is existing. You have to DO something (actus reus) to commit a crime. Just being an addict, mentally ill, or having a disease isn't an act. So you can punish someone for selling drugs, using drugs, or possessing drugs—those are acts. But you can't punish them for the fact that they're addicted.",
                keyPoints: [
                    "Status crimes violate the Constitution",
                    "Robinson v. California established this principle",
                    "Addiction is a status, not an act",
                    "Can punish conduct (using, selling) but not the condition",
                    "Applies to mental illness, homelessness, etc."
                ],
                commonGaps: [
                    "Confusing status crimes with conduct crimes",
                    "Thinking all substance crimes are unconstitutional (they're not—possession is conduct)",
                    "Not understanding the constitutional basis"
                ]
            },
            {
                id: 8,
                topic: "Actus Reus",
                difficulty: "hard",
                prompt: "Explain the Decina case: how can someone be liable for something that happened during an epileptic seizure?",
                explanation: "In Decina, a man with epilepsy had a seizure while driving and hit people. The court said he was guilty, not because the involuntary seizure itself was his fault, but because he voluntarily chose to drive knowing he was prone to seizures. His earlier voluntary act (deciding to drive) created the danger. So the actus reus was the voluntary act of driving—the death during the seizure flowed from that. The rule: if you know you're likely to lose control and cause harm, you can't voluntarily put yourself in a position to cause that harm. The crime isn't the involuntary seizure; it's the voluntary decision to drive knowing the risks.",
                keyPoints: [
                    "The involuntary seizure itself wasn't the criminal act",
                    "The voluntary act was driving despite known seizure risk",
                    "Criminal liability can rest on earlier voluntary conduct",
                    "Must have known about the danger/condition",
                    "Applies to situations where you know you're dangerous"
                ],
                commonGaps: [
                    "Thinking he's guilty for having the seizure (he's not)",
                    "Not seeing that the crime is the earlier voluntary act",
                    "Forgetting the requirement to KNOW about the danger",
                    "Not understanding how prior conduct can create liability"
                ]
            },
            {
                id: 9,
                topic: "Actus Reus",

        function initApp() {
            renderControls();
            updateStats();

        function renderControls() {
            const topicSelect = document.getElementById('topicSelect');
            const modeSelect = document.getElementById('modeSelect');
            const startBtn = document.getElementById('startBtn');
            const progressBtn = document.getElementById('progressBtn');
            const timerToggle = document.getElementById('timerToggle');

            topicSelect.addEventListener('change', (e) => {
                appState.currentTopic = e.target.value;
            });

            modeSelect.addEventListener('change', (e) => {
                appState.currentMode = e.target.value;
            });

            startBtn.addEventListener('click', startNewPrompt);
            progressBtn.addEventListener('click', showProgress);
            timerToggle.addEventListener('change', (e) => {
                appState.timerEnabled = e.target.checked;
            });
        }

        function startNewPrompt() {
            appState.showExplanation = false;
            appState.selfAssessment = null;
            appState.studentAnswer = '';
            appState.timerSeconds = 300;

            // Reset timer
            if (appState.timerInterval) clearInterval(appState.timerInterval);
            appState.timerInterval = null;

            // Get available prompts based on mode and topic
            let available = PROMPTS;

            if (appState.currentTopic) {
                available = available.filter(p => p.topic === appState.currentTopic);
            }

            if (appState.currentMode === 'struggled') {
                available = available.filter(p => appState.sessionStats.struggledPromptIds.includes(p.id));
            }

            if (available.length === 0) {
                document.getElementById('promptContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <div class="empty-state-text">No prompts available</div>
                        <div class="empty-state-subtext">Try a different topic or mode</div>
                    </div>
                `;
                return;
            }

            if (appState.currentMode === 'random') {
                appState.currentPromptIndex = Math.floor(Math.random() * available.length);
            } else if (appState.currentMode === 'sequential') {
                appState.currentPromptIndex = 0;
                appState.allPromptsShuffled = available;
            }

            renderPrompt(available[appState.currentPromptIndex]);
        }

                    <button class="btn-secondary btn-small" id="stopTimerBtn">Stop Timer</button>
                </div>
            ` : '';

            const progressText = appState.currentMode === 'sequential'
                ? `<div class="prompt-counter">${appState.allPromptsShuffled.indexOf(prompt) + 1} of ${appState.allPromptsShuffled.length}</div>`
                : '';

            container.innerHTML = `
                <div class="prompt-card">
                    <div class="prompt-header">
                        <span class="prompt-topic">${prompt.topic}</span>
                        <span class="difficulty-badge ${difficultyClass}">${difficultyLabel}</span>
                        ${progressText}
                    </div>

                    <div class="prompt-text">"${prompt.prompt}"</div>

                    ${timerHTML}

                    <textarea id="studentAnswerTextarea" placeholder="Write your explanation here. Imagine you're talking to a friend who has never studied law. Make it simple and clear."></textarea>

                    <div class="word-count">
                        <span id="wordCount">0</span> words
                    </div>

                    <div class="self-assessment">
                        <button class="assessment-btn btn-secondary ${appState.selfAssessment === 'clear' ? 'selected' : ''}" data-assessment="clear">
                            ✓ Explained it clearly
                        </button>
                        <button class="assessment-btn btn-secondary ${appState.selfAssessment === 'gist' ? 'selected' : ''}" data-assessment="gist">
                            ◐ Got the gist
                        </button>
                        <button class="assessment-btn btn-secondary ${appState.selfAssessment === 'struggled' ? 'selected' : ''}" data-assessment="struggled">
                            ✗ Struggled
                        </button>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-primary" id="checkBtn">Check My Explanation</button>
                        <button class="btn-secondary" id="nextBtn">Skip to Next</button>
                    </div>

                    <div class="explanation-reveal" id="explanationReveal"></div>
                </div>
            `;

            // Restore previous answer if exists
            document.getElementById('studentAnswerTextarea').value = appState.studentAnswer;
            updateWordCount();

            // Event listeners
            document.getElementById('studentAnswerTextarea').addEventListener('input', (e) => {
                appState.studentAnswer = e.target.value;
                updateWordCount();
            });

            document.querySelectorAll('.assessment-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.assessment-btn').forEach(b => b.classList.remove('selected'));
                    e.target.classList.add('selected');
                    appState.selfAssessment = e.target.dataset.assessment;
                });
            });

            document.getElementById('checkBtn').addEventListener('click', () => showExplanation(prompt));
            document.getElementById('nextBtn').addEventListener('click', handleNext);

            if (appState.timerEnabled) {
                document.getElementById('stopTimerBtn').addEventListener('click', stopTimer);
                startTimer();
            }
        }

        function updateWordCount() {
            const textarea = document.getElementById('studentAnswerTextarea');
            const words = textarea.value.trim().split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('wordCount').textContent = words;
        }

        function startTimer() {
            appState.timerInterval = setInterval(() => {
                appState.timerSeconds--;
                updateTimerDisplay();

                if (appState.timerSeconds <= 0) {
                    clearInterval(appState.timerInterval);
                    document.getElementById('timerDisplay').textContent = '0:00';
                    alert('Time\'s up! Review your explanation.');
                }
            }, 1000);
            updateTimerDisplay();
        }

        function stopTimer() {
            if (appState.timerInterval) {
                clearInterval(appState.timerInterval);
                appState.timerInterval = null;
            }
        }

        function updateTimerDisplay() {
            const mins = Math.floor(appState.timerSeconds / 60);
            const secs = appState.timerSeconds % 60;
            document.getElementById('timerDisplay').textContent =
                `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function showExplanation(prompt) {
            appState.showExplanation = true;
            const reveal = document.getElementById('explanationReveal');

            const checklistHTML = prompt.keyPoints.map((point, idx) => `
                <div class="checklist-item">
                    <div class="checkbox" data-index="${idx}"></div>
                    <div class="checklist-text">${point}</div>
                </div>
            `).join('');

            const commonGapsHTML = prompt.commonGaps.map(gap =>
                `<li>• ${gap}</li>`
            ).join('');

            reveal.innerHTML = `
                <div class="explanation-section">
                    <div class="explanation-title">Simple Explanation</div>
                    <div class="explanation-text">${prompt.explanation}</div>
                </div>

                <div class="explanation-section">
                    <div class="explanation-title">Key Points Checklist</div>
                    <div class="checklist">${checklistHTML}</div>
                </div>

                <div class="explanation-section">
                    <div class="explanation-title">Common Gaps (Things Students Forget)</div>
                    <div class="explanation-text">
                        <ul style="margin-left: 20px; color: var(--color-text-primary);">
                            ${commonGapsHTML}
                        </ul>
                    </div>
                </div>
            `;

            reveal.classList.add('show');

            // Make checkboxes interactive
            document.querySelectorAll('.checkbox').forEach(checkbox => {
                checkbox.addEventListener('click', (e) => {
                    e.target.classList.toggle('checked');
                });
            });

            // Log stats
            recordAttempt(prompt);
        }

        function recordAttempt(prompt) {
            const topic = prompt.topic;

            if (!appState.sessionStats.attempts[topic]) {
                appState.sessionStats.attempts[topic] = 0;
            }
            appState.sessionStats.attempts[topic]++;

            if (appState.selfAssessment === 'clear') {
                if (!appState.sessionStats.mastered[topic]) {
                    appState.sessionStats.mastered[topic] = 0;
                }
                appState.sessionStats.mastered[topic]++;

                // Remove from struggled if it was there
                appState.sessionStats.struggledPromptIds =
                    appState.sessionStats.struggledPromptIds.filter(id => id !== prompt.id);
            } else if (appState.selfAssessment === 'struggled') {
                if (!appState.sessionStats.mastered[topic]) {
                    appState.sessionStats.mastered[topic] = 0;
                }

                if (!appState.sessionStats.struggled[topic]) {
                    appState.sessionStats.struggled[topic] = 0;
                }
                appState.sessionStats.struggled[topic]++;

                if (!appState.sessionStats.struggledPromptIds.includes(prompt.id)) {
                    appState.sessionStats.struggledPromptIds.push(prompt.id);
                }
            }

            updateStats();
        }

        function handleNext() {
            stopTimer();
            startNewPrompt();
        }

        function updateStats() {
            const totalAttempts = Object.values(appState.sessionStats.attempts).reduce((a, b) => a + b, 0);
            const totalMastered = Object.values(appState.sessionStats.mastered).reduce((a, b) => a + b, 0);
            const totalStruggled = Object.values(appState.sessionStats.struggled).reduce((a, b) => a + b, 0);

            document.getElementById('statAttempts').textContent = totalAttempts;
            document.getElementById('statMastered').textContent = totalMastered;
            document.getElementById('statStruggled').textContent = totalStruggled;

            // Simple streak calculation
            const streak = totalMastered > 0 ? Math.floor(Math.random() * totalMastered) : 0;
            document.getElementById('statStreak').textContent = streak;
        }

        function showProgress() {
            const modal = document.getElementById('progressModal');
            const content = document.getElementById('progressContent');

            const topicList = [...new Set(PROMPTS.map(p => p.topic))];
            const progressHTML = topicList.map(topic => {
                const attempts = appState.sessionStats.attempts[topic] || 0;
                const mastered = appState.sessionStats.mastered[topic] || 0;
                const struggled = appState.sessionStats.struggled[topic] || 0;

                return `
                    <div class="progress-item">
                        <div class="progress-label">${topic}</div>
                        <div class="progress-stat">
                            ${attempts} attempted | ${mastered} mastered | ${struggled} struggled
                        </div>
                    </div>
                `;
            }).join('');

            content.innerHTML = `
                <div class="progress-container">
                    ${progressHTML}
                </div>
            `;

            modal.classList.add('show');
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('show');
                }
            });
        }

        // ============================================================================
        // LAUNCH
        // ============================================================================

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
    <script src="../shared.js"></script>
    <script src="../navbar.js"></script>
</body>
</html>
