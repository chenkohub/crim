const FC=[
{id:1,u:"I",t:"Theories of Punishment",f:"What are the two major categories of punishment theory?",b:"Non-consequentialist (Retribution / just deserts) and Consequentialist (Utilitarianism: deterrence [specific & general], rehabilitation, incapacitation)."},
{id:2,u:"I",t:"Theories of Punishment",f:"What is retribution?",b:"Punishment is justified because the offender deserves it ('just deserts'). Backward-looking \u2014 focuses on the wrong committed, not future outcomes."},
{id:3,u:"I",t:"Theories of Punishment",f:"What are the three forms of consequentialist punishment?",b:"1) Deterrence (specific: deter this offender; general: deter society)\n2) Rehabilitation (reform the offender)\n3) Incapacitation (prevent future crime by confining offender)"},
{id:4,u:"I",t:"Hart / Criminal Law",f:"What differentiates criminal law from civil law according to Hart?",b:"Community condemnation of the offender. Criminal law offers direction on conduct, expresses community norms (social contract), and subjects violators to sanctions carrying moral stigma."},
{id:5,u:"I",t:"Void for Vagueness",f:"What is the void for vagueness doctrine?",b:"Under the 14th Amendment, a criminal statute is unconstitutionally vague if it fails to give ordinary people fair notice of what conduct is prohibited and/or encourages arbitrary enforcement. (United States v. Bronstein)"},
{id:6,u:"I",t:"Rule of Lenity",f:"What is the rule of lenity?",b:"When a criminal statute is ambiguous, it must be construed in favor of the defendant (against the government)."},
{id:7,u:"I",t:"Jury Nullification",f:"What is jury nullification?",b:"The power of a jury to acquit a defendant despite evidence proving guilt beyond a reasonable doubt, effectively 'nullifying' the law. Juries are generally not informed of this power."},
{id:8,u:"II",t:"Actus Reus",f:"What are the three components of actus reus?",b:"1) A voluntary act (or qualifying omission)\n2) That causes\n3) Social harm"},
{id:9,u:"II",t:"Voluntary Act",f:"What constitutes an involuntary act under MPC \u00a7 2.01?",b:"Reflexes, convulsions, bodily movements during unconsciousness or sleep, conduct during hypnosis, and any bodily movement that is NOT a product of the effort or determination of the actor, either conscious or habitual."},
{id:10,u:"II",t:"Voluntary Act",f:"Martin v. State \u2014 What is the rule?",b:"No voluntary act where police carried an intoxicated man onto a public highway and then arrested him for public drunkenness. The 'appearance in public' was not voluntary."},
{id:11,u:"II",t:"Voluntary Act",f:"State v. Decina \u2014 How can an involuntary act still lead to liability?",b:"The voluntary act occurred EARLIER \u2014 when the epileptic defendant chose to drive knowing he was subject to seizures. Culpability attaches to the voluntary decision to put oneself in a dangerous position."},
{id:12,u:"II",t:"Status Crimes",f:"Robinson v. California \u2014 What is the rule on status crimes?",b:"It is unconstitutional to punish a person for their status or condition (e.g., being addicted to narcotics). Criminal punishment must be for ACTS, not conditions. (8th/14th Amendments)"},
{id:13,u:"II",t:"Status Crimes",f:"Powell v. Texas \u2014 How does it limit Robinson?",b:"Being drunk in public is an ACT (appearing in public after drinking), not a status. The statute punished conduct, not the condition of alcoholism. Robinson limited to pure status offenses."},
{id:14,u:"II",t:"Omissions",f:"What are the FIVE categories of legal duty that make an omission satisfy actus reus?",b:"1) Special relationship (parent-child, spouse)\n2) Contractual duty\n3) Statutory duty\n4) Creation of the risk\n5) Voluntary assumption of care\n\nMnemonic: 'S-C-S-C-V'"},
{id:15,u:"II",t:"Omissions",f:"People v. Beardsley \u2014 What limits the 'special relationship' duty?",b:"A romantic/social relationship (mistress/lover) is NOT sufficient. Must have a legal relation of 'protector' \u2014 like parent-child or husband-wife."},
{id:16,u:"II",t:"Omissions",f:"Commonwealth v. Pestinikas \u2014 What type of duty was at issue?",b:"Contractual duty. Defendants agreed to provide food and medical care to the victim. A contractual duty to act creates criminal liability for omission even if services are outsourced."},
{id:17,u:"II",t:"MPC \u00a7 2.02",f:"List the MPC mens rea hierarchy from most to least culpable.",b:"1) PURPOSELY \u2014 conscious object to cause the result\n2) KNOWINGLY \u2014 aware conduct is practically certain to cause result\n3) RECKLESSLY \u2014 consciously disregards substantial and unjustifiable risk\n4) NEGLIGENTLY \u2014 should be aware of substantial and unjustifiable risk (objective)\n\nMnemonic: 'People Kill Rats Nightly'"},
{id:18,u:"II",t:"MPC \u00a7 2.02",f:"What is the DEFAULT mens rea under the MPC when a statute is silent?",b:"RECKLESSNESS. Under MPC \u00a7 2.02, when no culpability level is prescribed, recklessness is sufficient."},
{id:19,u:"II",t:"MPC \u00a7 2.02",f:"MPC \u00a7 2.02(3)\u2013(4): How does a stated mental state apply to elements?",b:"A stated mental state modifies ALL material elements of actus reus, unless contrary purpose plainly appears. Exception: Jurisdictional elements need not have mens rea applied (United States v. Yermian)."},
{id:20,u:"II",t:"Knowledge",f:"What is willful blindness? (United States v. Jewell)",b:"Knowledge satisfied even without positive awareness if D's ignorance was SOLELY the result of a CONSCIOUS EFFORT to disregard the nature of a fact, with a CONSCIOUS PURPOSE to avoid learning the truth. Proxy for positive knowledge."},
{id:21,u:"II",t:"Intent",f:"What is transferred intent? (People v. Scott)",b:"When D intends to harm A but harms B instead, intent 'transfers' to B. D prosecuted for killing of B using intent directed at A. D may ALSO be charged with attempted murder of A."},
{id:22,u:"II",t:"Intent",f:"State v. Fugate \u2014 How can intent to kill be inferred?",b:"Intent to kill may be PRESUMED where the natural and probable consequence of a wrongful act is to produce death. Intent may be deduced from all surrounding circumstances."},
{id:23,u:"II",t:"Gen/Spec Intent",f:"What distinguishes general intent from specific intent crimes? (People v. Atkins)",b:"GENERAL INTENT: Only mental state required is intent to do the actus reus.\nSPECIFIC INTENT: Requires intent to do something BEYOND the actus reus (look for 'with intent to...').\n\nKey test: Does statute require intent language beyond the act itself?"},
{id:24,u:"II",t:"Gen/Spec Intent",f:"How does the gen/spec intent distinction affect mistake of fact defenses?",b:"SPECIFIC INTENT: Honest mistake (even if unreasonable) IF it negates specific intent.\nGENERAL INTENT: Honest AND reasonable mistake.\nSTRICT LIABILITY: Mistake is NEVER a defense."},
{id:25,u:"II",t:"Strict Liability",f:"What are the characteristics of strict liability crimes?",b:"No mens rea for at least one element; health/safety/welfare; punish omissions; risk of significant injury; D in position to prevent harm; light penalties; often regulatory.\n\nMorissette v. United States: Criminal law PRESUMES mens rea. Government bears burden of showing SL intended."},
{id:26,u:"II",t:"Strict Liability",f:"Malum prohibitum vs. malum in se \u2014 relation to strict liability?",b:"SL more readily inferred for MALUM PROHIBITUM (wrong only because prohibited by statute). DISFAVORED for MALUM IN SE (inherently wrong), especially with heavy punishment and moral stigma."},
{id:27,u:"III",t:"Mistake of Fact",f:"State the complete mistake of fact framework.",b:"SPECIFIC INTENT: Honest mistake negates intent (even if unreasonable)\nGENERAL INTENT: Honest AND reasonable mistake required\nSTRICT LIABILITY: No defense at all\n\nMPC \u00a7 2.04: Mistake is defense if it negates the purpose, knowledge, belief, recklessness, or negligence required for a material element."},
{id:28,u:"III",t:"Mistake of Law",f:"General rule on mistake of law + exceptions?",b:"RULE: Ignorance of law is no excuse.\n\nEXCEPTIONS:\n1) Official interpretation reliance (Marrero)\n2) Negates specific mens rea in 'willfulness' crimes (Cheek v. US): honest belief that law doesn't impose duty negates willfulness. BUT disagreement with law does NOT.\n3) Lambert exception (due process)"},
{id:29,u:"III",t:"Causation",f:"What two types of causation must the prosecution prove?",b:"1) ACTUAL CAUSE ('but-for'): But for D's conduct, would harm have occurred?\n2) PROXIMATE CAUSE (legal cause): Is it fair and just to hold D liable? Central inquiry: intervening cause analysis."},
{id:30,u:"III",t:"Causation",f:"Explain the intervening cause framework.",b:"RESPONSIVE (dependent) IC: Reaction to D's act. D liable UNLESS IC was extremely bizarre.\n\u2022 Ex: Shot victim \u2192 pneumonia \u2192 dies = D is proximate cause\n\nCOINCIDENTAL (independent) IC: Would happen regardless. D NOT liable UNLESS IC was foreseeable.\n\u2022 Ex: D leaves victim on road \u2192 hit by truck = D is proximate cause (foreseeable)"},
{id:31,u:"III",t:"Causation",f:"MPC \u00a7 2.03 \u2014 Causation for recklessness crimes?",b:"Not established if actual result NOT within the risk D was aware of, UNLESS:\n(a) Result differs only in different person/property or more serious harm; OR\n(b) Same kind of injury and not too remote/accidental to have just bearing on D's liability."},
{id:32,u:"III",t:"Concurrence",f:"What two forms of concurrence are required?",b:"1) TEMPORAL: Mens rea must exist at the TIME of actus reus.\n2) MOTIVATIONAL: Culpable mental state must MOTIVATE the act.\n\nCourts may 'roll together' a series of acts into one continuous transaction."},
{id:33,u:"IV",t:"Murder",f:"What are the four forms of malice aforethought?",b:"1) Intent to kill (express malice)\n2) Intent to inflict grievous bodily injury\n3) Depraved heart murder (extreme recklessness)\n4) Felony murder rule\n\nMnemonic: 'I-I-D-F'"},
{id:34,u:"IV",t:"First Degree Murder",f:"What is required for first-degree murder (Pennsylvania model)?",b:"Willful, deliberate, and premeditated killing; OR statutorily prescribed manner; OR felony murder.\n\nDELIBERATION: Measuring and evaluating major facets of choice \u2014 weighing reasons for/against, considering consequences (State v. Brown)\nPREMEDITATION: Thinking about it beforehand\n\nCRITICAL: Having TIME to deliberate \u2260 actually deliberating (Bingham)"},
{id:35,u:"IV",t:"First Degree Murder",f:"Gilbert v. State \u2014 Factors supporting P&D?",b:"1) Having gun with bullets nearby\n2) Thinking about different ways to kill\n3) Thinking about alternatives (doctor, nursing home)\n4) Positioning to avoid being seen\n5) Going back for another bullet"},
{id:36,u:"IV",t:"Depraved Heart",f:"Define depraved heart murder and the Knoller standard.",b:"Extreme recklessness evincing extreme indifference to human life.\n\nKnoller (Phillips Test): Malice implied when killing caused by act whose natural consequences are dangerous to life, deliberately performed by person who KNOWS conduct endangers life and acts with CONSCIOUS DISREGARD FOR LIFE.\n\nKEY: Must be risk of DEATH (risk of SBI alone is INSUFFICIENT)."},
{id:37,u:"IV",t:"Murder (MPC)",f:"MPC \u00a7 210.2 \u2014 How does the MPC define murder?",b:"Killing committed:\n(a) PURPOSELY or KNOWINGLY; OR\n(b) RECKLESSLY under circumstances manifesting EXTREME INDIFFERENCE to human life.\n\nMPC does NOT use degrees of murder."},
{id:38,u:"IV",t:"Vol. Manslaughter",f:"Four elements of VM under CATEGORICAL approach?",b:"1) Heat of passion\n2) Legally adequate provocation\n3) No reasonable opportunity to cool off\n4) Causal link: provocation \u2192 passion \u2192 killing\n\nAdequate provocation (judge decides): battery/assault, mutual combat, crime against relative, illegal arrest, spousal adultery.\nMERE WORDS = NOT sufficient."},
{id:39,u:"IV",t:"Vol. Manslaughter",f:"Four elements under MODERN reasonable person approach?",b:"1) Heat of passion\n2) REASONABLY provoked\n3) No time to cool off\n4) REASONABLE PERSON in D's position would not have cooled off\n\nJury decides. Cumulative passion recognized (Berry \u2014 20 hrs). Mere words rule may have exceptions."},
{id:40,u:"IV",t:"Vol. Manslaughter",f:"MPC \u00a7 210.3 EMED standard + Dumlao test?",b:"Manslaughter if D kills under circumstances that would be murder, but committed as result of EMED for which there is reasonable explanation or excuse.\n\nDUMLAO TWO-STEP:\n1) View D's SUBJECTIVE situation + circumstances as D perceived them\n2) Assess whether EXPLANATION for disturbance was reasonable (NOT reasonableness of action)\n\nNo single provocative act needed. Words alone qualify. Jury decides."},
{id:41,u:"IV",t:"Invol. Manslaughter",f:"Mental states for involuntary manslaughter?",b:"COMMON LAW:\n1) Recklessness (aware of risk + conscious disregard)\n2) Gross negligence (gross deviation from reasonable care)\n3) Ordinary negligence (rarely \u2014 Williams)\n\nMPC \u00a7 210.3(1)(a): RECKLESSNESS only. Negligence is NEVER enough."},
{id:42,u:"IV",t:"Felony Murder",f:"Felony murder rule + four limitations?",b:"RULE: Murder if death during commission/attempted commission of felony.\n\nLIMITATIONS (I-R-M-A):\n1) INHERENTLY DANGEROUS (James) \u2014 abstract vs. fact-specific\n2) RES GESTAE (Bodely) \u2014 temporal/spatial + temporary safety rule\n3) MERGER (Rose) \u2014 must be independent felony; assaultive merge. Exception: independent felonious purpose\n4) AGENCY (Canola) \u2014 no third-party kills. Exception: shield case"},
{id:43,u:"IV",t:"Felony Murder",f:"MPC approach to felony murder?",b:"MPC ELIMINATES felony murder.\n\n\u00a7 210.2(1)(b): Recklessness + extreme indifference PRESUMED if D engaged in commission of, attempt to commit, or flight after certain enumerated felonies. Presumption is rebuttable."},
{id:44,u:"V",t:"Larceny",f:"Elements of larceny?",b:"1) TRESPASSORY TAKING\n2) CARRYING AWAY (asportation)\n3) PERSONAL PROPERTY OF ANOTHER\n4) WITHOUT CONSENT\n5) INTENT TO PERMANENTLY DEPRIVE (specific intent)\n\nConcurrence: taking + intent must be SIMULTANEOUS.\nMnemonic: 'TACP-I'"},
{id:45,u:"V",t:"Theft Distinctions",f:"Distinguish larceny, larceny by trick, false pretenses, embezzlement.",b:"LARCENY: Trespassory taking + carrying away + intent to deprive\nLARCENY BY TRICK (Barbour): POSSESSION obtained through fraud\nFALSE PRETENSES (Pierce): TITLE + possession through fraud\nEMBEZZLEMENT: Conversion by someone in LAWFUL POSSESSION (fiduciary)\n\nKey Q: Did D get possession, title, or was D already entrusted?"},
{id:46,u:"V",t:"Theft Concepts",f:"Possession vs. custody vs. constructive possession?",b:"POSSESSION: Sufficient control + unrestricted use\nCUSTODY: Physical control but restricted use (mechanic, valet)\nCONSTRUCTIVE POSSESSION: Owner retains legal possession when not in physical control\n\n'BREAKING THE BULK': Bailee opens package + takes goods = larceny"},
{id:47,u:"VI",t:"Self-Defense",f:"Key requirements for self-defense?",b:"1) REASONABLE BELIEF of imminent unlawful force\n2) PROPORTIONAL force\n3) Some jurisdictions: DUTY TO RETREAT (exception: castle doctrine)\n\nIMPERFECT SELF-DEFENSE: Honest but UNREASONABLE belief \u2192 mitigates murder to VM.\nDEFENSE OF OTHERS: Same principles."},
{id:48,u:"VI",t:"Necessity",f:"Necessity defense? (Dudley and Stephens)",b:"D chose 'lesser evil' between two harms.\n\nElements: (1) Imminent threat; (2) No lawful alternative; (3) Harm avoided > harm caused; (4) D didn't create situation.\n\nKEY (Dudley): Necessity CANNOT justify killing an innocent person to save your own life."},
{id:49,u:"VI",t:"Duress",f:"Duress defense + how it differs from necessity?",b:"DURESS: Crime committed because of HUMAN THREAT of imminent death/SBI.\nElements: (1) Threat of death/SBI; (2) Well-grounded fear; (3) No escape.\n\nNecessity = natural pressure (lesser evil). Duress = human coercion.\nLIMITATION: Duress is NOT a defense to murder."},
{id:50,u:"VI",t:"Justification vs. Excuse",f:"Justification vs. excuse defenses?",b:"JUSTIFICATION: Conduct was RIGHT/permissible. Society approves. (self-defense, necessity)\n\nEXCUSE: Conduct was WRONG but D not blameworthy. Society doesn't approve but doesn't blame. (duress, insanity)"},
{id:51,u:"VII",t:"Attempt",f:"Elements of criminal attempt + key tests?",b:"(1) Specific intent to commit crime; (2) Act beyond mere preparation.\n\nTESTS:\n\u2022 LAST ACT: D did everything needed (rarely used)\n\u2022 DANGEROUS PROXIMITY: How close D came (common law)\n\u2022 SUBSTANTIAL STEP (MPC): Strongly corroborative of criminal purpose"},
{id:52,u:"VII",t:"Conspiracy",f:"Elements of conspiracy?",b:"1) AGREEMENT to commit a crime\n2) INTENT to agree + intent to commit crime\n3) OVERT ACT in furtherance (most jurisdictions)\n\nPINKERTON: Each conspirator liable for foreseeable co-conspirator crimes.\nBILATERAL (CL): Two+ guilty minds.\nUNILATERAL (MPC): Only D's agreement matters."},
{id:53,u:"VII",t:"Accomplice Liability",f:"What is accomplice liability?",b:"AIDING AND ABETTING: D assisted/encouraged the principal.\n\nElements: (1) Act of assistance; (2) Intent to assist; (3) Intent that crime be committed.\n\nAccessory Before Fact: Planned but absent.\nAccessory After Fact: Helped after (lesser offense).\nPrincipal: Actually committed it."}
];

const MN=[
{t:"MPC Mens Rea",m:"People Kill Rats Nightly",x:"Purpose \u2192 Knowledge \u2192 Recklessness \u2192 Negligence"},
{t:"Malice Aforethought",m:"I-I-D-F",x:"Intent to kill, Intent GBI, Depraved heart, Felony murder"},
{t:"Omission Duties",m:"S-C-S-C-V",x:"Special relationship, Contract, Statute, Created risk, Voluntary assumption"},
{t:"FM Limitations",m:"I-R-M-A",x:"Inherently dangerous, Res gestae, Merger, Agency"},
{t:"VM (Categorical)",m:"H-A-C-C",x:"Heat of passion, Adequate provocation, Cooling time, Causal link"},
{t:"Larceny",m:"TACP-I",x:"Trespassory taking, Asportation, Consent (none), Property of another, Intent to permanently deprive"},
{t:"Causation",m:"But-Prox",x:"But-for (actual) + Proximate (legal) cause"},
{t:"Intervening Cause",m:"R-not-B, C-if-F",x:"Responsive \u2192 liable unless Bizarre; Coincidental \u2192 NOT liable unless Foreseeable"}
];

const RD=[
{id:1,p:"Write the MPC \u00a7 2.02 mens rea hierarchy with definitions.",a:"1) PURPOSELY: Conscious object to engage in conduct or cause a result.\n2) KNOWINGLY: Awareness that conduct is practically certain to cause the result.\n3) RECKLESSLY: Conscious disregard of a substantial and unjustifiable risk. Gross deviation from standard of care a law-abiding person would observe.\n4) NEGLIGENTLY: Should be aware of a substantial and unjustifiable risk. Failure to perceive is a gross deviation from care a reasonable person would observe."},
{id:2,p:"Write the four forms of common law malice aforethought.",a:"1) Intent to kill another human being (express malice)\n2) Intent to inflict grievous bodily injury\n3) Depraved heart murder \u2014 extreme recklessness evincing extreme indifference to human life\n4) Felony murder rule \u2014 death during commission of a felony"},
{id:3,p:"Write all four elements of voluntary manslaughter (categorical) + legally adequate provocations.",a:"Elements: (1) Heat of passion; (2) Legally adequate provocation; (3) No reasonable opportunity to cool off; (4) Causal link: provocation \u2192 passion \u2192 killing.\n\nAdequate provocation: Battery/assault, mutual combat, serious crime against close relative, illegal arrest, spousal adultery. Mere words are NOT sufficient."},
{id:4,p:"Write the EMED standard (MPC \u00a7 210.3) and the Dumlao two-step test.",a:"Manslaughter if D kills under circumstances that would ordinarily be murder, but committed as result of EMED for which there is reasonable explanation or excuse.\n\nDumlao:\n1) View D's subjective internal situation and external circumstances as perceived (however inaccurate).\n2) Assess whether the explanation for the disturbance was reasonable (NOT reasonableness of the action).\n\nNo single act needed. Words alone qualify. Jury decides."},
{id:5,p:"Write the four felony murder limitations with case names.",a:"1) INHERENTLY DANGEROUS (People v. James): Abstract (elements only) vs. fact-specific approach.\n2) RES GESTAE (People v. Bodely): Temporal/spatial proximity + causal link. Temporary safety rule.\n3) MERGER (Rose v. State): Must be independent of homicide. Assaultive felonies merge. Exception: independent felonious purpose.\n4) AGENCY (State v. Canola): No third-party kills. Exception: shield case."},
{id:6,p:"Write larceny elements + distinguish from larceny by trick, false pretenses, embezzlement.",a:"LARCENY: (1) Trespassory taking, (2) asportation, (3) personal property of another, (4) without consent, (5) intent to permanently deprive.\n\nLARCENY BY TRICK: POSSESSION (not title) obtained through fraud.\nFALSE PRETENSES: TITLE + possession through false representation.\nEMBEZZLEMENT: Conversion by someone already in lawful possession (fiduciary)."},
{id:7,p:"Write the intervening cause framework for proximate causation.",a:"RESPONSIVE/DEPENDENT IC: Reaction to D's act. D liable UNLESS IC was extremely bizarre.\n\nCOINCIDENTAL/INDEPENDENT IC: Would occur regardless. D NOT liable UNLESS IC was foreseeable.\n\nMPC \u00a7 2.03: Result must be within risk D was aware of, unless differs only in person/property or same kind of harm and not too remote/accidental."},
{id:8,p:"Write the five categories of legal duty for omission liability.",a:"1) SPECIAL RELATIONSHIP (parent-child, spouse; Beardsley limits to legal 'protector')\n2) CONTRACTUAL DUTY (Pestinikas)\n3) STATUTORY DUTY\n4) CREATION OF RISK\n5) VOLUNTARY ASSUMPTION OF CARE (Howard)"}
];

const HY=[
{id:1,title:"The Bar Fight",facts:"Dave and Victor get into a heated argument at a bar after Victor insults Dave's wife. Victor shoves Dave. Dave, enraged, pulls out a knife he always carries and stabs Victor once in the chest. Victor dies on the way to the hospital. Medical evidence shows Victor would have survived if the ambulance hadn't been delayed 40 minutes due to a traffic accident.",
qs:[
{q:"Q1: Is Dave guilty of first-degree murder?",m:"ISSUE: Whether Dave's killing was willful, deliberate, and premeditated.\n\nRULE: First-degree murder requires willful, deliberate, premeditated killing. Deliberation = measuring and evaluating major facets of choice (Brown). Premeditation = thinking beforehand. Having TIME to deliberate \u2260 actually deliberating (Bingham).\n\nPROSECUTION: Dave carried a knife daily (preparedness). Drew weapon and targeted vital area (chest) \u2014 shows weighing of consequences. Choice to use lethal force suggests deliberation.\n\nDEFENSE: Dave reacted in the moment after being shoved. No 'cool head capable of reflection.' Carrying knife is habit, not premeditation. Seconds between shove and stab insufficient under Bingham.\n\nCONCLUSION: First-degree murder unlikely \u2014 facts suggest reactive killing."},
{q:"Q2: Analyze VM under all three frameworks.",m:"CATEGORICAL: (1) Heat of passion: Yes \u2014 'enraged.' (2) Adequate provocation: SHOVE = battery = legally adequate. Verbal insults alone wouldn't qualify, but battery does. (3) Cooling: None \u2014 immediate. (4) Causal link: Shove triggered rage that caused stabbing. All elements satisfied.\n\nMODERN: Would reasonable person be provoked by insults to spouse + physical shove? Likely yes. Immediate response = no cooling. Jury decides.\n\nMPC EMED: Extreme emotional disturbance from insults + battery. Dumlao step 1: D's subjective situation \u2014 wife insulted, physically attacked. Step 2: Reasonable explanation for disturbance? Yes. EMED likely satisfied.\n\nStrongest argument: MPC/EMED (most expansive, focuses on reasonableness of disturbance, not action)."},
{q:"Q3: Analyze the ambulance delay causation issue.",m:"ACTUAL CAUSE: But for Dave's stabbing, Victor wouldn't have needed ambulance or died. Satisfied.\n\nPROXIMATE CAUSE \u2014 Intervening Cause Analysis:\nThe traffic accident causing the delay is a COINCIDENTAL/INDEPENDENT IC (would have happened regardless).\n\nPROSECUTION: Foreseeable that emergency response may be delayed. When you stab someone, you accept risk of imperfect medical care. Under Henderson, foreseeable independent ICs don't break the chain.\n\nDEFENSE: Pure coincidence \u2014 unrelated event. Victor WOULD HAVE SURVIVED. The delay, not the stabbing, caused death. Unforeseeable independent IC breaks proximate causation.\n\nCONCLUSION: Prosecution likely prevails. Courts generally hold delays in treatment are foreseeable consequences of inflicting serious injury."}
]},
{id:2,title:"The Pawn Shop",facts:"Mia borrows Tom's expensive watch, telling him she needs it for a formal event. Instead, she pawns it. Separately, coworker Jake knows Mia pawns stolen items. When Mia asks Jake to drive her to the pawn shop, Jake agrees, suspecting but not confirming the items are stolen. Meanwhile, Mia's friend Carol, a bank teller, has been skimming small amounts from dormant accounts over six months, totaling $12,000.",
qs:[
{q:"Q1: What theft offense did Mia commit regarding the watch?",m:"LARCENY BY TRICK (most likely):\nMia lied about needing watch for formal event. Tom consented to transfer POSSESSION (a loan), not title. Mia obtained possession through fraud. Conversion by selling it. All elements satisfied.\n\nNOT standard larceny: Tom voluntarily handed it over (no trespassory taking).\nNOT false pretenses: Tom didn't transfer TITLE. He lent it expecting return.\nNOT embezzlement: Mia wasn't in position of trust/fiduciary relationship.\n\nCONCLUSION: Larceny by trick (State v. Barbour)."},
{q:"Q2: Analyze Jake's criminal liability and mental state.",m:"ACCOMPLICE LIABILITY: Requires (1) act of assistance, (2) intent to assist, (3) intent that crime be committed. Jake drove Mia (assistance). He SUSPECTED items were stolen.\n\nWILLFUL BLINDNESS (Jewell):\nPROSECUTION: Jake KNEW Mia's pattern. Failure to confirm = conscious avoidance of truth. Satisfies 'knowingly.'\n\nDEFENSE: Mere suspicion \u2248 recklessness, not knowledge. Jake didn't deliberately avoid learning \u2014 he just didn't ask. Jewell requires CONSCIOUS PURPOSE to avoid truth.\n\nMPC: 'Knowingly' = awareness of high probability. Jake knew pattern + willingly drove. Jury could find knowledge.\n\nCONCLUSION: Jake likely liable under willful blindness."},
{q:"Q3: Classify Carol's crime + MPC analysis.",m:"EMBEZZLEMENT: Carol is bank teller (fiduciary, position of trust). Has LAWFUL POSSESSION through employment. 'Skimming' = CONVERSION (adverse to owner). Systematic over 6 months = deliberate.\n\nMPC \u00a7 2.02: PURPOSELY (conscious object to take money). KNOWINGLY (aware conduct practically certain to deprive bank). Systematic nature shows both.\n\nNOT larceny (already had lawful possession). NOT false pretenses (no misrepresentation to obtain title).\n\nCONCLUSION: Embezzlement with purposeful mens rea."}
]},
{id:3,title:"The House Party",facts:"Alex hosts a party where guests use drugs. Ben (heavily intoxicated) beats Chris severely. Alex sees it but does nothing. Chris dies from injuries. Toxicology shows Chris had a rare undiagnosed heart condition \u2014 an otherwise healthy person would have survived. Meanwhile, roommate Dana robs Eddie at knifepoint upstairs. As Dana flees, Eddie chases her into the street where Eddie is struck and killed by a passing car.",
qs:[
{q:"Q1: Analyze Alex's liability for Chris's death (omission).",m:"OMISSION \u2014 DUTY TO ACT:\nPROSECUTION: Alex has duty based on CREATION OF RISK (hosted party with drugs/alcohol, creating dangerous conditions). As host, had control over premises.\n\nDEFENSE: Under Beardsley, social relationship doesn't create legal duty. Host-guest is not a 'protector' relationship. Alex didn't start the fight.\n\nMENS REA: Alex SAW the beating = aware of risk + consciously disregarded it = recklessness.\n\nHEART CONDITION: Responsive factor. 'Thin skull' / take victim as you find them. Doesn't break proximate causation.\n\nCONCLUSION: Depends on whether jurisdiction recognizes host's duty. If yes, involuntary manslaughter (recklessness)."},
{q:"Q2: Dana's felony murder liability \u2014 apply all four limitations.",m:"BASIC: Dana committed robbery. Eddie died during flight. FM applies if limitations met.\n\n1) INHERENTLY DANGEROUS: Knifepoint robbery = inherently dangerous under both approaches. \u2713\n2) RES GESTAE: Eddie killed during Dana's flight. Temporary safety rule: robbery not complete until safe. Still in res gestae. \u2713\n3) MERGER: Robbery has INDEPENDENT FELONIOUS PURPOSE (taking wallet). Not an assaultive felony aimed at killing. No merger. \u2713\n4) AGENCY: Car driver = THIRD PARTY (not co-felon). Under AGENCY RULE: no FM liability. Under PROXIMATE CAUSE THEORY: yes (foreseeable that fleeing victim may be hit).\n\nCONCLUSION: Agency rule jurisdictions = no FM. Proximate cause jurisdictions = FM applies."},
{q:"Q3: How does MPC change the analysis for Dana?",m:"MPC eliminates FM. Instead, \u00a7 210.2(1)(b) PRESUMES extreme recklessness during enumerated felonies (including robbery).\n\nPROSECUTION: Presumption applies \u2014 armed robbery + flight. Jury may infer extreme recklessness.\n\nDEFENSE: Presumption rebuttable. Dana was fleeing, not creating danger directly. Death by car \u2014 not Dana's act. Subjective intent was to escape, not endanger.\n\nALTERNATIVE: MPC manslaughter (\u00a7 210.3) if extreme recklessness not shown \u2014 recklessness alone (aware of risk during knifepoint robbery flight).\n\nCONCLUSION: Murder via presumption (rebuttable) or manslaughter for recklessness."}
]}
];

// ==============================================
// APP STATE + RENDERING (vanilla JS)
// ==============================================
let S={mode:"flashcards",unit:"All",cardIdx:0,flipped:false,conf:{},deck:null,
quiz:{started:false,deck:[],idx:0,ans:"",show:false,score:{c:0,t:0}},
drill:{idx:0,txt:"",show:false},
hypo:{hi:0,qi:0,txt:"",show:false},
mnReveal:{}};

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function filtered(){return S.unit==="All"?FC:FC.filter(c=>c.u===S.unit)}
function getDeck(){if(!S.deck)S.deck=filtered();return S.deck}

function render(){
const root=document.getElementById("root");
let h=`<div class="topbar"><h1>\u2696\uFE0F Criminal Law Study Tool</h1><p class="subtitle">JD2960 \u00b7 Prof. Arnaud \u00b7 Closed-Book Exam Prep</p>`;
h+=`<div class="modes">`;
[["flashcards","\uD83C\uDCCF Cards"],["quiz","\u2705 Quiz"],["rules","\u270D\uFE0F Rules"],["hypos","\uD83D\uDCCB Hypos"],["mnemonics","\uD83E\uDDE0 Mnemonics"]].forEach(([k,l])=>{
h+=`<button class="mode-btn ${S.mode===k?"active":""}" onclick="setMode('${k}')">${l}</button>`;
});
h+=`</div>`;
if(S.mode==="flashcards"||S.mode==="quiz"){
h+=`<div class="units">`;
["All","I","II","III","IV","V","VI","VII"].forEach(u=>{
h+=`<button class="unit-btn ${S.unit===u?"active":""}" onclick="setUnit('${u}')">${u==="All"?"All":u}</button>`;
});
h+=`</div>`;
}
h+=`</div>`;

h+=`<div class="panel">`;
if(S.mode==="flashcards")h+=renderFlashcards();
else if(S.mode==="quiz")h+=renderQuiz();
else if(S.mode==="rules")h+=renderRules();
else if(S.mode==="hypos")h+=renderHypos();
else if(S.mode==="mnemonics")h+=renderMnemonics();
h+=`</div>`;

h+=`<div class="tips"><h4>Study Strategy (Evidence-Based)</h4>`;
h+=`<p><span class="hl">Active Recall:</span> Answer from memory BEFORE flipping. Doubles retention vs. re-reading.</p>`;
h+=`<p><span class="hl">Spaced Repetition:</span> Short sessions over 2\u20134 weeks. Missed cards daily, mastered cards every 3\u20135 days.</p>`;
h+=`<p><span class="hl">Rule Writing:</span> Write rules from memory \u2014 #1 technique for closed-book exams.</p>`;
h+=`<p><span class="hl">Both Sides:</span> Always argue prosecution AND defense using specific facts.</p></div>`;

root.innerHTML=h;
// Restore textarea values
if(S.mode==="quiz"&&S.quiz.started&&!S.quiz.show){let ta=document.getElementById("quizTA");if(ta)ta.value=S.quiz.ans;}
if(S.mode==="rules"){let ta=document.getElementById("ruleTA");if(ta)ta.value=S.drill.txt;}
if(S.mode==="hypos"){let ta=document.getElementById("hypoTA");if(ta)ta.value=S.hypo.txt;}
}

// ---- FLASHCARDS ----
function renderFlashcards(){
const dk=getDeck();
if(!dk.length)return`<div style="text-align:center;color:#64748b;padding:40px">No cards in this unit.</div>`;
const c=dk[S.cardIdx];if(!c)return"";
const cv=Object.values(S.conf);
const got=cv.filter(x=>x==="got").length,shaky=cv.filter(x=>x==="shaky").length,missed=cv.filter(x=>x==="missed").length;
let h=`<div class="meta"><span>Card ${S.cardIdx+1} of ${dk.length} \u00b7 Unit ${c.u} \u00b7 ${c.t}</span><button class="shuffle-btn" onclick="shuffleDeck()">Shuffle</button></div>`;
h+=`<div class="card ${S.flipped?"flipped":""}" onclick="flipCard()">`;
h+=`<div class="card-label">${S.flipped?"Answer":"Question"}${S.flipped?"":'<span class="hint">(tap to flip)</span>'}</div>`;
h+=`<div class="card-text">${S.flipped?c.b:c.f}</div></div>`;
if(S.flipped){
h+=`<div class="conf-btns">`;
h+=`<button class="conf-btn conf-got" onclick="markConf('got')">Got It \u2713</button>`;
h+=`<button class="conf-btn conf-shaky" onclick="markConf('shaky')">Shaky ~</button>`;
h+=`<button class="conf-btn conf-missed" onclick="markConf('missed')">Missed \u2717</button></div>`;
}
h+=`<div class="nav"><button class="nav-btn" onclick="prevCard()" ${S.cardIdx===0?"disabled":""}>← Prev</button>`;
h+=`<div class="score-bar"><span class="score-got">\u2713 ${got}</span><span class="score-shaky">~ ${shaky}</span><span class="score-missed">\u2717 ${missed}</span></div>`;
h+=`<button class="nav-btn" onclick="nextCard()" ${S.cardIdx>=dk.length-1?"disabled":""}>Next →</button></div>`;
return h;
}

// ---- QUIZ ----
function renderQuiz(){
if(!S.quiz.started){
const n=Math.min(15,filtered().length);
return`<div class="quiz-center"><h3>Active Recall Self-Test</h3><p>Type your answer from memory BEFORE seeing the correct answer.</p><p style="font-size:11px;color:#475569;margin-bottom:20px">Research shows retrieval practice doubles long-term retention.</p><button class="action-btn btn-blue" onclick="startQuiz()">Start Quiz (${n} questions)</button></div>`;
}
const dk=S.quiz.deck,c=dk[S.quiz.idx];
if(!c){
const pct=S.quiz.score.t?S.quiz.score.c/S.quiz.score.t:0;
return`<div class="quiz-center"><h3>Quiz Complete!</h3><div class="big-score" style="color:${pct>=.7?"#34d399":"#f87171"}">${S.quiz.score.c} / ${S.quiz.score.t}</div><p>${pct>=.7?"Strong! Review shaky cards.":"Keep drilling \u2014 focus on missed rules."}</p><br><button class="action-btn btn-blue" onclick="startQuiz()">Try Again</button></div>`;
}
let h=`<div class="meta"><span>Q ${S.quiz.idx+1} of ${dk.length}</span><span>Score: ${S.quiz.score.c}/${S.quiz.score.t}</span></div>`;
h+=`<div class="q-box"><div style="font-size:11px;color:#64748b;margin-bottom:4px">Unit ${c.u} \u00b7 ${c.t}</div><div class="text">${c.f}</div></div>`;
if(!S.quiz.show){
h+=`<textarea id="quizTA" rows="5" placeholder="Type your answer from memory..." oninput="S.quiz.ans=this.value"></textarea>`;
h+=`<button class="action-btn btn-blue" onclick="revealQuiz()">Reveal Answer</button>`;
}else{
if(S.quiz.ans)h+=`<div class="your-answer"><div class="label">Your Answer:</div><div class="text">${esc(S.quiz.ans)}</div></div>`;
h+=`<div class="model-answer"><div class="label">Correct Answer:</div><div class="text">${c.b}</div></div>`;
h+=`<div class="conf-btns"><button class="conf-btn conf-got" onclick="quizNext(true)">Got It \u2713</button><button class="conf-btn conf-missed" onclick="quizNext(false)">Missed \u2717</button></div>`;
}
return h;
}

// ---- RULES ----
function renderRules(){
const d=RD[S.drill.idx];
let h=`<h3 style="font-size:17px;color:#e2e8f0;margin-bottom:6px">Rule Writing Drill</h3>`;
h+=`<p class="desc">Write the complete rule from memory. The most effective closed-book memorization technique.</p>`;
h+=`<div class="drill-tabs">`;
RD.forEach((r,i)=>{h+=`<button class="tab ${i===S.drill.idx?"active":""}" onclick="setDrill(${i})">Drill ${i+1}</button>`;});
h+=`</div>`;
h+=`<div class="q-box"><div class="text">${d.p}</div></div>`;
h+=`<textarea id="ruleTA" rows="8" placeholder="Write the complete rule from memory..." oninput="S.drill.txt=this.value"></textarea>`;
h+=`<button class="action-btn btn-blue" onclick="S.drill.show=true;render()">Check Against Model</button>`;
if(S.drill.show)h+=`<div class="model-answer"><div class="label">Model Answer:</div><div class="text">${d.a}</div></div>`;
return h;
}

// ---- HYPOS ----
function renderHypos(){
const hp=HY[S.hypo.hi],q=hp.qs[S.hypo.qi];
let h=`<h3 style="font-size:17px;color:#e2e8f0;margin-bottom:6px">Practice Hypotheticals</h3>`;
h+=`<p class="desc">Issue-spot and write IRAC analysis. Write your answer first, then compare.</p>`;
h+=`<div class="hypo-tabs">`;
HY.forEach((x,i)=>{h+=`<button class="tab ${i===S.hypo.hi?"active":""}" onclick="setHypo(${i})">${x.title}</button>`;});
h+=`</div>`;
h+=`<div class="fact-box"><div class="title">FACT PATTERN: ${hp.title}</div><div class="text">${hp.facts}</div></div>`;
h+=`<div class="hypo-tabs">`;
hp.qs.forEach((_,i)=>{h+=`<button class="tab ${i===S.hypo.qi?"purple active":"" }" onclick="setHypoQ(${i})">Q${i+1}</button>`;});
h+=`</div>`;
h+=`<div class="q-box"><div class="text">${q.q}</div></div>`;
h+=`<textarea id="hypoTA" rows="10" placeholder="Write your IRAC analysis... (Issue \u2192 Rule \u2192 Application \u2192 Conclusion)" oninput="S.hypo.txt=this.value"></textarea>`;
h+=`<button class="action-btn btn-purple" onclick="S.hypo.show=true;render()">Show Model Answer</button>`;
if(S.hypo.show)h+=`<div class="purple-model"><div class="label">Model Answer:</div><div class="text">${q.m}</div></div>`;
return h;
}

// ---- MNEMONICS ----
function renderMnemonics(){
let h=`<h3 style="font-size:17px;color:#e2e8f0;margin-bottom:6px">Mnemonics</h3>`;
h+=`<p class="desc">Mental shortcuts for multi-element rules. Test yourself: what does each letter stand for?</p>`;
MN.forEach((m,i)=>{
h+=`<div class="mnemonic-card"><button class="mnemonic-toggle" onclick="toggleMn(${i})">${S.mnReveal[i]?"Hide":"Reveal"}</button>`;
h+=`<div class="mnemonic-topic">${m.t}</div><div class="mnemonic-text">${m.m}</div>`;
if(S.mnReveal[i])h+=`<div class="mnemonic-meaning">${m.x}</div>`;
h+=`</div>`;
});
return h;
}

// ---- ACTIONS ----
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}
window.setMode=function(m){S.mode=m;render()};
window.setUnit=function(u){S.unit=u;S.deck=null;S.cardIdx=0;S.flipped=false;S.quiz.started=false;render()};
window.flipCard=function(){S.flipped=!S.flipped;render()};
window.nextCard=function(){S.flipped=false;S.cardIdx=Math.min(S.cardIdx+1,getDeck().length-1);render()};
window.prevCard=function(){S.flipped=false;S.cardIdx=Math.max(S.cardIdx-1,0);render()};
window.shuffleDeck=function(){S.deck=shuffle(filtered());S.cardIdx=0;S.flipped=false;render()};
window.markConf=function(l){const c=getDeck()[S.cardIdx];if(c)S.conf[c.id]=l;S.flipped=false;S.cardIdx=Math.min(S.cardIdx+1,getDeck().length-1);render()};
window.startQuiz=function(){S.quiz={started:true,deck:shuffle(filtered()).slice(0,Math.min(15,filtered().length)),idx:0,ans:"",show:false,score:{c:0,t:0}};render()};
window.revealQuiz=function(){S.quiz.show=true;render()};
window.quizNext=function(correct){S.quiz.score.t++;if(correct)S.quiz.score.c++;S.quiz.idx++;S.quiz.ans="";S.quiz.show=false;render()};
window.setDrill=function(i){S.drill={idx:i,txt:"",show:false};render()};
window.setHypo=function(i){S.hypo={hi:i,qi:0,txt:"",show:false};render()};
window.setHypoQ=function(i){S.hypo.qi=i;S.hypo.txt="";S.hypo.show=false;render()};
window.toggleMn=function(i){S.mnReveal[i]=!S.mnReveal[i];render()};

// Swipe support for flashcards
let touchStartX=0;
document.addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX},{passive:true});
document.addEventListener("touchend",e=>{
if(S.mode!=="flashcards")return;
const diff=e.changedTouches[0].clientX-touchStartX;
if(Math.abs(diff)>60){if(diff<0)nextCard();else prevCard();}
},{passive:true});

render();
</script>
