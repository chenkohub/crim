<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criminal Law SRS - Spaced Repetition System</title>
    <style>
        :root, [data-theme] {
            --tool-accent: #06b6d4;
            --tool-accent-dark: #0891b2;
            --tool-accent-light: #22d3ee;
            --tool-accent-lighter: #67e8f9;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            min-height: 100vh;
            padding: 1rem;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem 0;
            border-bottom: 2px solid var(--color-border);
        }

        .header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--tool-accent), var(--tool-accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--color-text-secondary);
            font-size: 0.95rem;
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            padding: 0.7rem 1.5rem;
            background-color: var(--color-bg-secondary);
            color: var(--color-text-secondary);
            border: 2px solid var(--color-border);
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .nav-btn.active {
            background-color: var(--tool-accent);
            color: var(--color-text-primary);
            border-color: var(--tool-accent);
        }

        .nav-btn:hover:not(.active) {
            border-color: var(--tool-accent);
            color: var(--tool-accent);
        }

        /* Panels */
        .panel {
            display: none;
        }

        .panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Dashboard Panel */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--tool-accent);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--tool-accent);
            margin: 0.5rem 0;
        }

        .stat-label {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Box Distribution */
        .box-distribution {
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .box-distribution h3 {
            margin-bottom: 1.5rem;
            color: var(--tool-accent);
            font-size: 1.1rem;
        }

        .box-bars {
            display: grid;
            gap: 1rem;
        }

        .box-bar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .box-label {
            width: 80px;
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        .box-bar-container {
            flex: 1;
            height: 30px;
            background-color: var(--color-bg-primary);
            border-radius: 0.25rem;
            overflow: hidden;
            border: 1px solid var(--color-border);
        }

        .box-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--tool-accent), var(--tool-accent-light));
            border-radius: 0.25rem;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 0.5rem;
            color: var(--color-text-primary);
            font-weight: bold;
            font-size: 0.85rem;
        }

        .box-count {
            width: 40px;
            text-align: right;
            color: var(--color-text-primary);
            font-weight: 500;
        }

        /* Review Session */
        .session-control {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .session-info {
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            padding: 0.8rem 1.5rem;
            font-size: 0.95rem;
            color: var(--color-text-secondary);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background-color: var(--tool-accent);
            color: var(--color-text-primary);
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--tool-accent-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: var(--color-bg-tertiary);
            color: var(--color-text-primary);
        }

        .btn-secondary:hover {
            background-color: var(--color-bg-tertiary);
        }

        /* Filter Section */
        .filter-section {
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .filter-section h3 {
            margin-bottom: 1rem;
            color: var(--tool-accent);
            font-size: 1rem;
        }

        .filter-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.6rem 1.2rem;
            background-color: var(--color-bg-primary);
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background-color: var(--tool-accent);
            color: var(--color-text-primary);
            border-color: var(--tool-accent);
        }

        .filter-btn:hover {
            border-color: var(--tool-accent);
        }

        /* Card Review */
        .card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            margin: 2rem 0;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background-color: var(--color-bg-secondary);
            border: 2px solid var(--color-border);
            border-radius: 1rem;
            padding: 2rem;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--tool-accent), var(--tool-accent-light));
        }

        .card:hover {
            border-color: var(--tool-accent);
            box-shadow: 0 8px 24px rgba(6, 182, 212, 0.2);
        }

        .card-side {
            text-align: center;
        }

        .card-label {
            color: var(--color-text-tertiary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .card-content {
            font-size: 1.3rem;
            line-height: 1.6;
            color: var(--color-text-primary);
            word-break: break-word;
        }

        .card-back .card-content {
            font-size: 1.1rem;
            color: var(--tool-accent);
        }

        .card-flip-hint {
            margin-top: 2rem;
            color: var(--color-text-tertiary);
            font-size: 0.85rem;
            font-style: italic;
        }

        .card-counter {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background-color: var(--color-bg-primary);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            color: var(--color-text-secondary);
            font-size: 0.85rem;
            border: 1px solid var(--color-border);
        }

        /* Rating Buttons */
        .rating-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .rating-btn {
            padding: 1rem;
            border: 2px solid var(--color-border);
            border-radius: 0.5rem;
            background-color: var(--color-bg-secondary);
            color: var(--color-text-primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        .rating-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow-md);
        }

        .rating-btn.again {
            border-color: var(--color-wrong);
            color: #fca5a5;
        }

        .rating-btn.again:hover {
            background-color: rgba(239, 68, 68, 0.15);
            border-color: var(--color-wrong);
        }

        .rating-btn.hard {
            border-color: var(--color-partial);
            color: #fdba74;
        }

        .rating-btn.hard:hover {
            background-color: rgba(249, 115, 22, 0.15);
            border-color: var(--color-partial);
        }

        .rating-btn.good {
            border-color: var(--tool-accent);
            color: var(--tool-accent);
        }

        .rating-btn.good:hover {
            background-color: rgba(14, 165, 233, 0.15);
            border-color: var(--tool-accent);
        }

        .rating-btn.easy {
            border-color: var(--color-correct);
            color: #86efac;
        }

        .rating-btn.easy:hover {
            background-color: rgba(16, 185, 129, 0.15);
            border-color: var(--color-correct);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--color-text-tertiary);
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--color-text-secondary);
        }

        /* Stats Panel */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stats-card {
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
        }

        .stats-card h3 {
            color: var(--tool-accent);
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .accuracy-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .accuracy-item:last-child {
            border-bottom: none;
        }

        .accuracy-value {
            color: var(--tool-accent);
            font-weight: 600;
        }

        /* Cram Mode */
        .cram-mode-banner {
            background-color: rgba(249, 115, 22, 0.15);
            border: 2px solid var(--color-partial);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #fdba74;
            text-align: center;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header h1 {
                font-size: 1.3rem;
            }

            .nav-tabs {
                gap: 0.3rem;
            }

            .nav-btn {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            .card {
                padding: 1.5rem;
                min-height: 200px;
            }

            .card-content {
                font-size: 1.1rem;
            }

            .rating-buttons {
                grid-template-columns: 1fr 1fr;
            }

            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Loading State */
        .spinner {
            border: 3px solid var(--color-border);
            border-top: 3px solid var(--tool-accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-cards {
            text-align: center;
            padding: 3rem 1rem;
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            color: var(--color-text-secondary);
        }
    </style>
    <link rel="stylesheet" href="../theme.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Criminal Law SRS</h1>
            <p>Spaced Repetition System for Mastery</p>
        </div>

        <div class="nav-tabs">
            <button class="nav-btn active" data-panel="dashboard">Dashboard</button>
            <button class="nav-btn" data-panel="review">Review</button>
            <button class="nav-btn" data-panel="stats">Stats</button>
        </div>

        <!-- Dashboard Panel -->
        <div id="dashboard" class="panel active">
            <div class="dashboard-grid">
                <div class="stat-card">
                    <div class="stat-label">Due Today</div>
                    <div class="stat-value" id="cardsDueToday">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Cards</div>
                    <div class="stat-value" id="totalCards">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Session</div>
                    <div class="stat-value" id="sessionNumber">1</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Mastered</div>
                    <div class="stat-value" id="masteredCount">0</div>
                </div>
            </div>

            <div class="box-distribution">
                <h3>Cards by Box</h3>
                <div class="box-bars" id="boxBars"></div>
            </div>

            <div style="text-align: center; margin: 2rem 0;">
                <button class="btn" onclick="app.startNewSession()">Start New Session</button>
                <button class="btn btn-secondary" onclick="app.toggleCramMode()" style="margin-left: 1rem;">Toggle Cram Mode</button>
            </div>
        </div>

        <!-- Review Panel -->
        <div id="review" class="panel">
            <div id="cramModeBanner" class="cram-mode-banner" style="display: none;">
                CRAM MODE ACTIVE - All cards shown, intervals ignored
            </div>

            <div class="session-control">
                <div class="session-info">Session #<span id="sessionNumberReview">1</span></div>
                <button class="btn" onclick="app.startNewSession()">New Session</button>
            </div>

            <div class="filter-section">
                <h3>Filter by Unit</h3>
                <div class="filter-buttons" id="filterButtons"></div>
            </div>

            <div id="reviewContent"></div>
        </div>

        <!-- Stats Panel -->
        <div id="stats" class="panel">
            <div class="stats-grid">
                <div class="stats-card">
                    <h3>Accuracy by Unit</h3>
                    <div id="accuracyByUnit"></div>
                </div>
                <div class="stats-card">
                    <h3>Study Progress</h3>
                    <div id="studyProgress"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Card database with 100+ criminal law cards
        const cardDatabase = [
            // Unit I: Foundations (15 cards)
            { id: 1, unit: 'Unit I', category: 'Foundations', question: 'Define retribution as a criminal law punishment theory.', answer: 'Punishment imposed because the offender deserves it based on moral culpability; focuses on proportionality and moral wrongdoing rather than consequences.' },
            { id: 2, unit: 'Unit I', category: 'Foundations', question: 'Define utilitarianism as a criminal law punishment theory.', answer: 'Punishment justified by its positive consequences (deterrence, rehabilitation, incapacitation); focuses on maximizing social utility rather than desert.' },
            { id: 3, unit: 'Unit I', category: 'Foundations', question: 'Distinguish specific deterrence from general deterrence.', answer: 'Specific: deters the individual offender from future crime. General: deters the public generally by example of punishment.' },
            { id: 4, unit: 'Unit I', category: 'Foundations', question: 'Define rehabilitation as a punishment goal.', answer: 'Reform the offender so they no longer wish to commit crime; addresses underlying causes of criminal conduct.' },
            { id: 5, unit: 'Unit I', category: 'Foundations', question: 'Define incapacitation as a punishment goal.', answer: 'Prevent the offender from committing future crimes by physical restraint (imprisonment) or other means, regardless of whether they are reformed.' },
            { id: 6, unit: 'Unit I', category: 'Foundations', question: 'State Hart\'s distinction between criminal and civil law.', answer: 'Criminal law involves moral condemnation, punishment, and proceeds by the state with strict procedural protections. Civil law involves disputes between parties and remedies like damages.' },
            { id: 7, unit: 'Unit I', category: 'Foundations', question: 'What is the void for vagueness doctrine (Bronstein standard)?', answer: 'A statute is unconstitutional if it fails to provide fair notice of what conduct is prohibited or invites arbitrary and discriminatory enforcement.' },
            { id: 8, unit: 'Unit I', category: 'Foundations', question: 'State the rule of lenity.', answer: 'Ambiguities in criminal statutes must be construed in favor of the defendant; if statute is ambiguous, defendant gets benefit of the doubt.' },
            { id: 9, unit: 'Unit I', category: 'Foundations', question: 'Define jury nullification.', answer: 'Jury\'s power to acquit a defendant despite evidence of guilt because jury disagrees with the law or its application; jurors have power but not right to nullify.' },
            { id: 10, unit: 'Unit I', category: 'Foundations', question: 'What are the three theories of justification for punishment?', answer: 'Retribution (deserved punishment), deterrence (preventing future crime), and rehabilitation/incapacitation (reforming or restraining offender).' },
            { id: 11, unit: 'Unit I', category: 'Foundations', question: 'Define the mens rea requirement in criminal law.', answer: 'Criminal culpability requires not just a guilty act but guilty mind; the actor must have a blameworthy mental state with respect to the elements of the crime.' },
            { id: 12, unit: 'Unit I', category: 'Foundations', question: 'What is the actus reus requirement?', answer: 'A guilty act; the objective conduct element of a crime; must be a voluntary act (not an involuntary reflex or status).' },
            { id: 13, unit: 'Unit I', category: 'Foundations', question: 'Define the concurrence requirement.', answer: 'The mens rea and actus reus must occur together or with sufficient temporal proximity; the guilty mind must coincide with the guilty act.' },
            { id: 14, unit: 'Unit I', category: 'Foundations', question: 'What is strict liability in criminal law?', answer: 'A crime that requires no mens rea; liability is based solely on commission of a proscribed act, regardless of mental state. Usually applies to regulatory offenses.' },
            { id: 15, unit: 'Unit I', category: 'Foundations', question: 'Define causation in criminal law.', answer: 'The link between the defendant\'s conduct and the harm; includes both but-for causation and proximate cause (foreseeability).' },

            // Unit II: Actus Reus & Voluntary Act (12 cards)
            { id: 16, unit: 'Unit II', category: 'Actus Reus', question: 'List the three components of actus reus.', answer: '1) Voluntary act (or failure to perform a legal duty), 2) that brings about the attendant circumstances, 3) which result in the prohibited harm/consequence.' },
            { id: 17, unit: 'Unit II', category: 'Actus Reus', question: 'What acts are involuntary under MPC § 2.01?', answer: 'Reflex or convulsive acts, acts during sleep or hypnosis, acts resulting from bodily movement not controlled by the mind, and acts where person is unconscious.' },
            { id: 18, unit: 'Unit II', category: 'Actus Reus', question: 'State the rule from Martin v. State.', answer: 'Being in a public place while intoxicated is not an actus reus if the defendant was carried/placed there involuntarily; the conduct must be voluntary.' },
            { id: 19, unit: 'Unit II', category: 'Actus Reus', question: 'What is the Decina rule regarding earlier voluntary acts?', answer: 'A defendant can be liable for criminal conduct if prior to the involuntary act, the defendant voluntarily did something that caused the involuntary act (e.g., knew medication would cause unconsciousness but drove anyway).' },
            { id: 20, unit: 'Unit II', category: 'Actus Reus', question: 'State the holding in Robinson v. California.', answer: 'A state cannot criminalize mere status (being a drug addict); it violates cruel and unusual punishment. Requires punishable conduct, not status.' },
            { id: 21, unit: 'Unit II', category: 'Actus Reus', question: 'What did Powell v. Texas hold regarding Robinson?', answer: 'Criminalizing public intoxication does not violate Robinson because it punishes conduct (being in public while drunk), not status (being an alcoholic). Limits Robinson to pure status offenses.' },
            { id: 22, unit: 'Unit II', category: 'Actus Reus', question: 'What constitutes an omission as actus reus?', answer: 'A failure to act when there is a legal duty to act; the defendant had a duty, ability to perform it, and knowledge of the circumstances giving rise to the duty.' },
            { id: 23, unit: 'Unit II', category: 'Actus Reus', question: 'Can silence be an actus reus?', answer: 'Generally no, but if there is a legal duty to speak/disclose, silence can constitute an actus reus (e.g., fiduciary duty, contractual duty to warn).' },
            { id: 24, unit: 'Unit II', category: 'Actus Reus', question: 'Define habitual drunkenness and its legal status.', answer: 'Chronic intoxication status; cannot be criminalized alone (Robinson), but being publicly intoxicated (conduct) can be criminalized.' },
            { id: 25, unit: 'Unit II', category: 'Actus Reus', question: 'What is the difference between acts and conduct?', answer: 'Act is instantaneous; conduct is ongoing behavior that can include multiple acts. Actus reus requires at least one act.' },
            { id: 26, unit: 'Unit II', category: 'Actus Reus', question: 'Can a mistake negate the actus reus requirement?', answer: 'No; mistake of fact/law typically affects mens rea, not whether an act occurred. The act itself must still be voluntary.' },
            { id: 27, unit: 'Unit II', category: 'Actus Reus', question: 'What is the temporal concurrence requirement for actus reus?', answer: 'The mens rea must exist at the time the actus reus is committed or at the time of an earlier voluntary act that made the later involuntary act inevitable.' },

            // Unit III: Omissions (8 cards)
            { id: 28, unit: 'Unit III', category: 'Omissions', question: 'List five duties that can create liability for omission.', answer: '1) Statute/regulation, 2) Contract/employment relationship, 3) Special relationship (parent-child, caretaker), 4) Voluntary assumption of care/undertaking, 5) Creation of peril/prior fault.' },
            { id: 29, unit: 'Unit III', category: 'Omissions', question: 'State the Beardsley limitation on omission liability.', answer: 'A defendant is not obligated to rescue strangers; there is no general duty to prevent harm to third parties you have no relationship with.' },
            { id: 30, unit: 'Unit III', category: 'Omissions', question: 'What does Pestinikas hold about contractual duties?', answer: 'An explicit contractual duty to care (e.g., nursing home caring for patient) creates a legal duty; failure to perform constitutes an omission with actus reus.' },
            { id: 31, unit: 'Unit III', category: 'Omissions', question: 'What is Howard\'s rule on voluntary assumption of duty?', answer: 'If you voluntarily assume care of a helpless person (even a stranger), you create a legal duty to provide that care; abandoning them can be an omission.' },
            { id: 32, unit: 'Unit III', category: 'Omissions', question: 'Can a parent be liable for omitting to feed a child?', answer: 'Yes; the parent-child special relationship creates a legal duty to provide necessities like food. Omitting to feed constitutes actus reus of child abuse/neglect.' },
            { id: 33, unit: 'Unit III', category: 'Omissions', question: 'What is a "creation of peril" duty?', answer: 'If you create a dangerous situation (even accidentally), you have a duty to rescue or warn others; failure to do so is an omission for which you can be liable.' },
            { id: 34, unit: 'Unit III', category: 'Omissions', question: 'What is the "prior fault" duty?', answer: 'If your prior blameworthy conduct created a dangerous situation, you have a duty to act to prevent harm; omission to prevent foreseeable harm is actionable.' },
            { id: 35, unit: 'Unit III', category: 'Omissions', question: 'Can a stranger be liable for failing to rescue a drowning person?', answer: 'Generally no, absent a special relationship, contract, statute, or voluntary assumption of duty. The Beardsley rule means no general rescue duty.' },

            // Unit IV: Mens Rea (15 cards)
            { id: 36, unit: 'Unit IV', category: 'Mens Rea', question: 'State the MPC § 2.02 hierarchy of culpability levels.', answer: '1) Purpose (highest), 2) Knowledge, 3) Recklessness, 4) Negligence (lowest). Each applies to different material elements.' },
            { id: 37, unit: 'Unit IV', category: 'Mens Rea', question: 'Define "purpose" under MPC § 2.02(2)(a).', answer: 'Conscious object to engage in conduct or cause a result; the person acts with desire or intention to bring about the element, or knows it is practically certain to result.' },
            { id: 38, unit: 'Unit IV', category: 'Mens Rea', question: 'Define "knowledge" under MPC § 2.02(2)(b).', answer: 'Aware that conduct is of the required nature, or result is practically certain to follow. Not purpose, but aware of high probability of the element occurring.' },
            { id: 39, unit: 'Unit IV', category: 'Mens Rea', question: 'Define "recklessness" under MPC § 2.02(2)(c).', answer: 'Consciously disregards a substantial and unjustifiable risk that element exists/will result. Must be aware of the risk and disregard it; risk must be substantial.' },
            { id: 40, unit: 'Unit IV', category: 'Mens Rea', question: 'Define "negligence" under MPC § 2.02(2)(d).', answer: 'Fails to perceive a substantial and unjustifiable risk that element exists/will result. Objective standard; reasonable person would perceive the risk.' },
            { id: 41, unit: 'Unit IV', category: 'Mens Rea', question: 'Distinguish general intent from specific intent crimes.', answer: 'General intent: mens rea applies only to the actus reus itself (e.g., intent to strike in assault). Specific intent: requires additional intent beyond the act (e.g., intent to permanently deprive in larceny).' },
            { id: 42, unit: 'Unit IV', category: 'Mens Rea', question: 'What is willful blindness under Jewell?', answer: 'Deliberately closing one\'s eyes to obvious facts (conscious avoidance); treated as equivalent to knowledge under some statutes; defendant acts with knowledge of high probability.' },
            { id: 43, unit: 'Unit IV', category: 'Mens Rea', question: 'State the rule of transferred intent from Scott.', answer: 'If defendant acts with mens rea toward one victim/object but accidentally harms a different victim/object, the mens rea transfers to the actual harm caused.' },
            { id: 44, unit: 'Unit IV', category: 'Mens Rea', question: 'What is the default mens rea rule under common law?', answer: 'If a statute does not specify mens rea, courts presume the legislature intended to require mens rea (usually recklessness or knowledge), absent evidence of strict liability intent.' },
            { id: 45, unit: 'Unit IV', category: 'Mens Rea', question: 'What does MPC § 2.02(3) provide about element-specific mens rea?', answer: 'Each material element of the offense can require a different mens rea level; you must look at whether the element is the conduct, result, or attendant circumstance.' },
            { id: 46, unit: 'Unit IV', category: 'Mens Rea', question: 'Define conditional intent in criminal law.', answer: 'Intent to commit a crime on the condition that something else happens; generally still counts as mens rea sufficient for the crime (e.g., intent to steal if store is empty).' },
            { id: 47, unit: 'Unit IV', category: 'Mens Rea', question: 'What is mistake of fact and when does it negate mens rea?', answer: 'Defendant\'s incorrect belief about facts; negates mens rea only if the mistake negates the required knowledge/purpose element (specific intent crimes or knowledge-based crimes).' },
            { id: 48, unit: 'Unit IV', category: 'Mens Rea', question: 'What is the significance of purpose vs knowledge for accomplices?', answer: 'Accomplice liability typically requires purpose; the accomplice must desire or intend to facilitate the principal\'s crime, not merely know about it.' },
            { id: 49, unit: 'Unit IV', category: 'Mens Rea', question: 'Can intoxication negate mens rea?', answer: 'Voluntary intoxication can negate specific intent crimes if it prevents formation of the required mens rea. Does not negate recklessness or negligence (objective standard).' },
            { id: 50, unit: 'Unit IV', category: 'Mens Rea', question: 'What is the MPC approach to multiple elements and mens rea?', answer: 'Each material element (conduct, result, circumstance) can have different mens rea; defendant can be reckless as to one element and negligent as to another in same crime.' },

            // Unit V: Strict Liability & Mistakes (10 cards)
            { id: 51, unit: 'Unit V', category: 'Strict Liability', question: 'What are the characteristics of a strict liability crime?', answer: 'No mens rea required for one or more material elements; liability based solely on commission of proscribed act; typically regulatory offenses (food/drug/traffic violations).' },
            { id: 52, unit: 'Unit V', category: 'Strict Liability', question: 'State the Morissette presumption regarding mens rea.', answer: 'Common law presumes that statutory crimes require mens rea; prosecution must prove mens rea unless statute clearly indicates otherwise or crime is regulatory in nature.' },
            { id: 53, unit: 'Unit V', category: 'Strict Liability', question: 'How does mistake of fact affect specific intent crimes?', answer: 'A reasonable or unreasonable mistake of fact negates specific intent mens rea if it prevents the defendant from forming the required intent (e.g., mistake about property ownership in larceny).' },
            { id: 54, unit: 'Unit V', category: 'Strict Liability', question: 'How does mistake of fact affect general intent crimes?', answer: 'Only a reasonable mistake of fact negates mens rea in general intent crimes; unreasonable mistake does not negate liability (negligence standard still satisfied).' },
            { id: 55, unit: 'Unit V', category: 'Strict Liability', question: 'How does mistake of fact affect strict liability crimes?', answer: 'Mistake of fact provides no defense to strict liability crimes; the defendant\'s mental state is irrelevant; only the act matters.' },
            { id: 56, unit: 'Unit V', category: 'Strict Liability', question: 'State the general rule regarding mistake of law.', answer: 'Mistake of law is no defense to criminal liability; ignorance of the law is no excuse (except in rare circumstances like Cheek).' },
            { id: 57, unit: 'Unit V', category: 'Strict Liability', question: 'What did Cheek v. United States hold about mistake of law?', answer: 'Mistake of law CAN negate mens rea if defendant genuinely and reasonably misunderstands what the law requires (narrow exception to no-mistake-of-law rule, applies to tax crimes).' },
            { id: 58, unit: 'Unit V', category: 'Strict Liability', question: 'What is the Freeman framework for mistake of law?', answer: 'Mistake of law negates mens rea only if: 1) law was not clear/known, 2) defendant relied on official interpretation, 3) reliance was reasonable, or 4) legislature intended to require knowledge of law.' },
            { id: 59, unit: 'Unit V', category: 'Strict Liability', question: 'Define affirmative defense vs negating mens rea.', answer: 'Negating mens rea: proves element of crime not met (no acquittal burden). Affirmative defense: proves facts that excuse conduct even if crime proven (burden on defendant).' },
            { id: 60, unit: 'Unit V', category: 'Strict Liability', question: 'What is the significance of statutory rape as a strict liability crime?', answer: 'Defendant\'s mistake about victim\'s age (even reasonable mistake) is no defense; liability strict regardless of knowledge of minor status or intent to harm.' },

            // Unit VI: Causation & Concurrence (8 cards)
            { id: 61, unit: 'Unit VI', category: 'Causation', question: 'Define the but-for test for causation.', answer: 'The result would not have occurred but for the defendant\'s conduct; conduct is but-for cause of result if removing it would prevent the result.' },
            { id: 62, unit: 'Unit VI', category: 'Causation', question: 'Define proximate cause in criminal law.', answer: 'The defendant\'s conduct must be the legal/proximate cause of the result; requires foreseeability; intervening causes can break the chain if not foreseeable.' },
            { id: 63, unit: 'Unit VI', category: 'Causation', question: 'Distinguish responsive from coincidental intervening causes.', answer: 'Responsive: intervening act is a natural/foreseeable response to defendant\'s conduct (does not break chain). Coincidental: intervening act is unforeseeable/unrelated (breaks chain).' },
            { id: 64, unit: 'Unit VI', category: 'Causation', question: 'What does MPC § 2.03 provide about causation?', answer: 'Conduct is cause of result if: 1) but-for cause (actual), AND 2) not too remote/accidental to impose liability (proximate). Foreseeability determines proximate cause.' },
            { id: 65, unit: 'Unit VI', category: 'Causation', question: 'What is temporal concurrence in criminal liability?', answer: 'Mens rea and actus reus must be temporally connected; guilty mind must exist at the time of the guilty act or at the time of an earlier voluntary act that made the involuntary result inevitable.' },
            { id: 66, unit: 'Unit VI', category: 'Causation', question: 'What is motivational concurrence?', answer: 'The mens rea must actually motivate or relate to the actus reus committed; defendant cannot have killed A as means to harm B and be convicted of murdering B without separate analysis.' },
            { id: 67, unit: 'Unit VI', category: 'Causation', question: 'Can a victim\'s intervening act break the chain of causation?', answer: 'Yes, if the victim\'s act is extraordinary/unforeseeable. But normal human behavior in response to defendant\'s conduct (like seeking medical help) is foreseeable and does not break chain.' },
            { id: 68, unit: 'Unit VI', category: 'Causation', question: 'What is the "independent act" doctrine regarding intervening causes?', answer: 'An independent, deliberate act by a responsible human agent can break the chain of causation if it is not a reasonably foreseeable response to defendant\'s conduct.' },

            // Unit VII: Homicide (25 cards)
            { id: 69, unit: 'Unit VII', category: 'Homicide', question: 'List the four forms of malice aforethought.', answer: '1) Intent to kill, 2) Intent to cause serious bodily harm, 3) Depraved heart (extreme recklessness), 4) Felony murder rule.' },
            { id: 70, unit: 'Unit VII', category: 'Homicide', question: 'What are the elements of first-degree murder?', answer: '1) Unlawful killing of another human, 2) Malice aforethought (intent to kill or depraved heart), 3) Deliberation, 4) Premeditation.' },
            { id: 71, unit: 'Unit VII', category: 'Homicide', question: 'Define deliberation under the Brown standard.', answer: 'Formed a fixed purpose or decision to kill; requires actual reflection, no particular length of time required if the decision is conscious.' },
            { id: 72, unit: 'Unit VII', category: 'Homicide', question: 'Define premeditation in homicide.', answer: 'Thought given to the killing before the act; can be formed at any time, even moments before, but must show consideration/weighing, not mere reflection.' },
            { id: 73, unit: 'Unit VII', category: 'Homicide', question: 'What is the Bingham rule regarding premeditation?', answer: 'Premeditation requires more than momentary consideration; defendant must have weighed the decision, showing some substantial period of reflection even if brief.' },
            { id: 74, unit: 'Unit VII', category: 'Homicide', question: 'State the Gilbert factors for premeditation and deliberation.', answer: 'Nature/gravity of crime, previous relations between parties, threats/prior conduct, manner of killing, apparent motive; helps determine if killing was premeditated/deliberate.' },
            { id: 75, unit: 'Unit VII', category: 'Homicide', question: 'Define second-degree murder.', answer: 'Unlawful killing with malice aforethought but without premeditation and deliberation; includes intent to cause serious bodily harm and depraved heart killings.' },
            { id: 76, unit: 'Unit VII', category: 'Homicide', question: 'What does MPC § 210.2 provide for murder?', answer: 'Murder is: 1) purposeful or knowing killing, 2) reckless killing under extreme circumstances showing extreme indifference to value of human life. Eliminates death penalty; degrees prescribed by law.' },
            { id: 77, unit: 'Unit VII', category: 'Homicide', question: 'What are the elements of voluntary manslaughter under categorical approach?', answer: '1) Unlawful killing, 2) Adequate provocation, 3) No cooling-off period, 4) Defendant not actually cooled.' },
            { id: 78, unit: 'Unit VII', category: 'Homicide', question: 'What are the legally adequate categories of provocation?', answer: 'Adultery/sexual infidelity, serious physical attack, mutual combat, and trespass (varies by jurisdiction); most jurisdictions reject mere words alone.' },
            { id: 79, unit: 'Unit VII', category: 'Homicide', question: 'What is the modern/reasonable person approach to provocation?', answer: 'Four elements: 1) Adequate provocation (reasonable person would be provoked), 2) Immediate killing (no cooling-off period), 3) Actual provocation, 4) Actual lack of cooling.' },
            { id: 80, unit: 'Unit VII', category: 'Homicide', question: 'What is the EMED test for provocation?', answer: 'Extreme Emotional Distress: Defendant suffered EED AND acted under its influence; must determine if provocation was adequate by reasonable person standard.' },
            { id: 81, unit: 'Unit VII', category: 'Homicide', question: 'What is the Dumlao two-step approach to provocation?', answer: 'Step 1: Would objective reasonable person be provoked? Step 2: Was defendant actually provoked and acting under influence of that provocation?' },
            { id: 82, unit: 'Unit VII', category: 'Homicide', question: 'Define depraved heart murder.', answer: 'Killing committed with extreme recklessness showing conscious disregard for value of human life; no specific intent to kill, but conduct shows depravity.' },
            { id: 83, unit: 'Unit VII', category: 'Homicide', question: 'What did Knoller hold about depraved heart murder?', answer: 'Keeping a dangerous dog with knowledge of its viciousness and allowing it to maul victim can constitute depraved heart murder if conduct shows extreme indifference to human life.' },
            { id: 84, unit: 'Unit VII', category: 'Homicide', question: 'Distinguish involuntary manslaughter under common law vs MPC.', answer: 'CL: Unlawful killing without malice (negligent act or unintended killing during unlawful act). MPC: Reckless killing (conscious disregard of substantial risk).' },
            { id: 85, unit: 'Unit VII', category: 'Homicide', question: 'What did Williams hold about involuntary manslaughter?', answer: 'Involuntary manslaughter can result from unlawful act (not felony murder level) that causes death, or from criminal negligence/extreme recklessness.' },
            { id: 86, unit: 'Unit VII', category: 'Homicide', question: 'State the basic felony murder rule.', answer: 'Death occurring during commission of inherently dangerous felony constitutes first-degree murder; no need to prove intent to kill; malice is implied from intent to commit felony.' },
            { id: 87, unit: 'Unit VII', category: 'Homicide', question: 'What is the inherently dangerous limitation on felony murder?', answer: 'Only deaths during felonies that are inherently dangerous (likely to cause serious bodily harm/death) qualify; safe felonies do not trigger felony murder rule.' },
            { id: 88, unit: 'Unit VII', category: 'Homicide', question: 'What did James hold about inherent dangerousness?', answer: 'For felony murder, the felony itself (in the abstract, as defined by statute) must be inherently dangerous; cannot look at how defendant committed it.' },
            { id: 89, unit: 'Unit VII', category: 'Homicide', question: 'What are res gestae and temporal safety in felony murder?', answer: 'Res gestae (same transaction): felony and death must be part of continuous chain of events. Temporal safety: killing must occur before defendant has reached safety.' },
            { id: 90, unit: 'Unit VII', category: 'Homicide', question: 'What did Bodely hold about temporal scope of felony murder?', answer: 'Felony murder applies only while felony is ongoing; once defendant has fled to safety, deaths are no longer within res gestae of the felony.' },
            { id: 91, unit: 'Unit VII', category: 'Homicide', question: 'State the merger doctrine in felony murder.', answer: 'Assault/battery cannot be the predicate felony because it merges into homicide; would make almost all assaults/batteries first-degree murder.' },
            { id: 92, unit: 'Unit VII', category: 'Homicide', question: 'What is the independent purpose exception to merger doctrine?', answer: 'Assault used as means to accomplish independent felonious purpose does not merge; if assault is merely part of method, it merges and cannot support felony murder.' },
            { id: 93, unit: 'Unit VII', category: 'Homicide', question: 'State the agency rule in felony murder.', answer: 'Deaths caused only by the defendant\'s co-felons qualify for felony murder; if third party kills defendant\'s confederate, defendant not liable for murder (Canola rule).' },
            { id: 94, unit: 'Unit VII', category: 'Homicide', question: 'What is the shield exception to the agency rule?', answer: 'Some jurisdictions hold that if victim/third party kills co-felon, the defendant can still be liable for murder of the victim if death is foreseeable result of felony.' },

            // Unit VIII: Property Crimes (12 cards)
            { id: 95, unit: 'Unit VIII', category: 'Property Crimes', question: 'What are the five elements of larceny?', answer: '1) Trespass (without permission), 2) Taking, 3) Personal property, 4) Of another, 5) With intent to permanently deprive.' },
            { id: 96, unit: 'Unit VIII', category: 'Property Crimes', question: 'What is larceny by trick per Barbour?', answer: 'Obtaining possession of property through fraud/false pretenses with intent to permanently deprive; obtains possession (but not title) by deception.' },
            { id: 97, unit: 'Unit VIII', category: 'Property Crimes', question: 'What did Pierce hold about false pretenses?', answer: 'False pretenses requires obtaining title (not just possession) to property through misrepresentation; more serious than larceny by trick (affects ownership not just possession).' },
            { id: 98, unit: 'Unit VIII', category: 'Property Crimes', question: 'What are the elements of embezzlement?', answer: '1) Conversion, 2) Of personal property, 3) Of another, 4) By person already in lawful possession, 5) With intent to permanently deprive.' },
            { id: 99, unit: 'Unit VIII', category: 'Property Crimes', question: 'What are the elements of robbery?', answer: '1) Larceny, 2) From person or in presence, 3) By force, fear, or threat. (Larceny + force/threat against person).' },
            { id: 100, unit: 'Unit VIII', category: 'Property Crimes', question: 'What are the elements of burglary?', answer: '1) Breaking (or remaining/entering), 2) and entering, 3) Dwelling, 4) Of another, 5) At night (common law; some jurisdictions eliminated), 6) With intent to commit felony inside.' },
            { id: 101, unit: 'Unit VIII', category: 'Property Crimes', question: 'Distinguish possession from custody in property crimes.', answer: 'Possession: rightful control and intent to possess. Custody: limited control (e.g., employee handling goods); employee in custody can be guilty of larceny from employer.' },
            { id: 102, unit: 'Unit VIII', category: 'Property Crimes', question: 'Distinguish custody from constructive possession.', answer: 'Custody: direct/actual control (employee handling). Constructive possession: dominion and control though not in hands (owner of building with goods inside).' },
            { id: 103, unit: 'Unit VIII', category: 'Property Crimes', question: 'What is the breaking the bulk doctrine?', answer: 'Employee who breaks open packages/containers within employer\'s goods obtains possession (not just custody); subsequent taking is larceny, not conversion of employer\'s possession.' },
            { id: 104, unit: 'Unit VIII', category: 'Property Crimes', question: 'What did Navarro hold regarding theft?', answer: 'Employee with authority to handle/sell goods within a range can be guilty of larceny if exceeding authority; exceeding scope of authority means taking without permission.' },
            { id: 105, unit: 'Unit VIII', category: 'Property Crimes', question: 'What is the difference between larceny and embezzlement?', answer: 'Larceny: trespassory taking without permission. Embezzlement: authorized possession then converted with intent to keep; starts with lawful possession.' },
            { id: 106, unit: 'Unit VIII', category: 'Property Crimes', question: 'Can you be guilty of larceny from someone who has no title to the property?', answer: 'Yes; larceny requires taking from "another" who has possessory right (not title); even thief/person without legal title can be victim of larceny.' },

            // Unit IX: Defenses (8 cards)
            { id: 107, unit: 'Unit IX', category: 'Defenses', question: 'What are the elements of self-defense?', answer: '1) Reasonable belief of imminent threat of death/serious bodily injury, 2) Necessary to prevent harm, 3) Proportional response, 4) No provocation/no duty to retreat (jurisdiction-dependent).' },
            { id: 108, unit: 'Unit IX', category: 'Defenses', question: 'Define imperfect self-defense.', answer: 'Defendant acted with honest but unreasonable belief of necessity for self-defense; may reduce first-degree murder to voluntary manslaughter in some jurisdictions.' },
            { id: 109, unit: 'Unit IX', category: 'Defenses', question: 'What is castle doctrine?', answer: 'No duty to retreat from your own home before using force in self-defense; you have right to stand your ground and use deadly force to protect home.' },
            { id: 110, unit: 'Unit IX', category: 'Defenses', question: 'What is duty to retreat in self-defense?', answer: 'Some jurisdictions require defendant to retreat if safe way available before using deadly force (except in home); only use force as last resort when retreat impossible.' },
            { id: 111, unit: 'Unit IX', category: 'Defenses', question: 'What did Dudley & Stephens hold about necessity defense?', answer: 'Necessity (choice of evils) defense rejected for murder; cannot kill innocent person to save yourself even if death otherwise certain; strict liability for murder.' },
            { id: 112, unit: 'Unit IX', category: 'Defenses', question: 'What are the elements of duress defense?', answer: '1) Threat of death/serious bodily injury, 2) Well-grounded fear threat will be carried out, 3) No reasonable opportunity to escape threat, 4) Direct causal connection between threat and crime.' },
            { id: 113, unit: 'Unit IX', category: 'Defenses', question: 'When is duress not available as a defense?', answer: 'Generally not available for murder (some jurisdictions); not available if defendant created the danger/threat by putting self in jeopardy; must be immediate threat.' },
            { id: 114, unit: 'Unit IX', category: 'Defenses', question: 'What is the insanity test in criminal law?', answer: 'M\'Naghten rule: defendant did not know act was wrong due to mental illness. Irresistible impulse: knew act wrong but could not control conduct due to mental illness.' },

            // Unit X: Inchoate Crimes (8 cards)
            { id: 115, unit: 'Unit X', category: 'Inchoate', question: 'What are the elements of attempt?', answer: '1) Specific intent to commit target crime, 2) Substantial step toward commission (MPC) or dangerous proximity (CL), 3) Conduct directed toward that specific crime.' },
            { id: 116, unit: 'Unit X', category: 'Inchoate', question: 'Distinguish substantial step test from dangerous proximity test for attempt.', answer: 'Substantial step (MPC): defendant must take substantial step in furtherance of crime (more flexible). Dangerous proximity: defendant must be dangerously close to commission (stricter).' },
            { id: 117, unit: 'Unit X', category: 'Inchoate', question: 'What are the elements of conspiracy?', answer: '1) Agreement to commit crime, 2) Intent to agree, 3) Intent to achieve the crime\'s objective, 4) Overt act in furtherance (varies by jurisdiction; some require MPC overt act).' },
            { id: 118, unit: 'Unit X', category: 'Inchoate', question: 'What is Pinkerton liability?', answer: 'Co-conspirator can be liable for crimes committed by other conspirators in furtherance of the conspiracy even without direct participation if reasonably foreseeable.' },
            { id: 119, unit: 'Unit X', category: 'Inchoate', question: 'What are the elements of accomplice liability?', answer: '1) Principal commits crime, 2) Accomplice aids/abets/encourages/facilitates principal\'s crime, 3) With knowledge of crime\'s material facts, 4) With purpose that crime be committed.' },
            { id: 120, unit: 'Unit X', category: 'Inchoate', question: 'Can you be accomplice to attempt?', answer: 'Yes; accomplice can aid/abet another\'s attempt to commit crime; same elements apply but directed to the attempted crime.' },
            { id: 121, unit: 'Unit X', category: 'Inchoate', question: 'What is the difference between natural and probable consequence liability?', answer: 'Natural and probable consequence: accomplice liable for crimes that are natural/probable consequence of their aid. Modern approach: accomplice only liable for aided crimes (narrower).' },
            { id: 122, unit: 'Unit X', category: 'Inchoate', question: 'When does withdrawal/renunciation terminate accomplice liability?', answer: 'Withdrawal before crime is committed can terminate liability if defendant communicates repudiation and makes reasonable effort to prevent crime; timing varies by jurisdiction.' },

            // Unit XI: Aggravated Theft & Defenses (25 cards)
            { id: 123, unit: 'Unit XI', category: 'Embezzlement', question: 'What is embezzlement?', answer: 'Intentional conversion of another\'s property by someone entrusted with it or in lawful possession in a fiduciary capacity; the key element is betrayal of trust.' },
            { id: 124, unit: 'Unit XI', category: 'Embezzlement', question: 'What distinguishes embezzlement from larceny?', answer: 'Embezzlement involves lawful possession + fiduciary duty; larceny involves trespassory taking without consent. Embezzlement = betrayal of trust; larceny = theft from the start.' },
            { id: 125, unit: 'Unit XI', category: 'Embezzlement', question: 'What is the distinction from Mills between false pretenses and embezzlement?', answer: 'False pretenses requires purposely false statements with intent victim rely and victim relies; embezzlement requires trust relationship/fiduciary duty. No trust = not embezzlement.' },
            { id: 126, unit: 'Unit XI', category: 'Embezzlement', question: 'What did Steele establish about fiduciary duty?', answer: 'Fiduciary duty can arise from special confidence, not just formal power of attorney; look at depositor\'s intent to confer trust and whether owner reposed special confidence in defendant.' },
            { id: 127, unit: 'Unit XI', category: 'Burglary', question: 'What are the common law elements of burglary?', answer: '1) Breaking, 2) Entry, 3) Into a dwelling house, 4) At nighttime, 5) With intent to commit felony within.' },
            { id: 128, unit: 'Unit XI', category: 'Burglary', question: 'What is the entry requirement per Eichman?', answer: 'Entry requires intrusion within the four walls or beneath the roof of the structure; insertion of hand/arm through window can constitute entry if any part enters.' },
            { id: 129, unit: 'Unit XI', category: 'Burglary', question: 'What is curtilage in burglary law?', answer: 'Area in close proximity to a dwelling house; includes outbuildings within the curtilage; treated as part of the dwelling for burglary purposes.' },
            { id: 130, unit: 'Unit XI', category: 'Burglary', question: 'What did Thibeault establish about consent in burglary?', answer: 'Consent is a complete defense to burglary; knowing lack of license and the intent to commit felony are separate elements that must both be proven.' },
            { id: 131, unit: 'Unit XI', category: 'Burglary', question: 'What constitutes breaking in burglary?', answer: 'Any application of force to enter, however slight; includes opening an unlocked door (some jurisdictions); unlawful entry even without force can satisfy breaking if there was constructive breaking.' },
            { id: 132, unit: 'Unit XI', category: 'Robbery', question: 'What distinguishes robbery from larceny?', answer: 'Robbery requires force, threat of force, or fear in addition to the taking; robbery = theft + violence/intimidation. Larceny has no force element.' },
            { id: 133, unit: 'Unit XI', category: 'Robbery', question: 'What did Crocker hold about force in robbery?', answer: 'Snatching or grabbing property without force, threat, or fear satisfies larceny but NOT robbery; snatching alone is insufficient for robbery.' },
            { id: 134, unit: 'Unit XI', category: 'Robbery', question: 'What did Miller hold about the asportation phase in robbery?', answer: 'Force during the asportation (carrying away) phase satisfies the immediate presence requirement for robbery; force throughout the taking completes the crime.' },
            { id: 135, unit: 'Unit XI', category: 'Defenses', question: 'What is the difference between justification and excuse defenses?', answer: 'Justification: conduct is socially acceptable/permissible (e.g., self-defense); Excuse: conduct is wrongful but actor is not morally culpable (e.g., duress or insanity).' },
            { id: 136, unit: 'Unit XI', category: 'Defenses', question: 'What are the elements of self-defense?', answer: '1) Reasonable belief that force is necessary, 2) To prevent imminent unlawful use of force, 3) Force used is proportional to threat perceived.' },
            { id: 137, unit: 'Unit XI', category: 'Self-Defense', question: 'What is the necessity requirement in self-defense?', answer: 'Force must be necessary to prevent imminent threat; limited to immediate/imminent unlawful force, not future threats or threats of property damage.' },
            { id: 138, unit: 'Unit XI', category: 'Self-Defense', question: 'What is proportionality in self-defense?', answer: 'Force used must be proportional/appropriate to the threat; cannot use deadly force against non-deadly threat; must match nature and severity of aggression.' },
            { id: 139, unit: 'Unit XI', category: 'Self-Defense', question: 'What is the reasonable belief standard in self-defense?', answer: 'Combines subjective and objective elements: defendant\'s actual perspective + reasonable person standard; what would reasonable person with defendant\'s knowledge believe.' },
            { id: 140, unit: 'Unit XI', category: 'Self-Defense', question: 'How does MPC § 3.04 approach self-defense?', answer: 'MPC focuses on subjective belief (did defendant believe force was necessary); reckless or negligent belief = manslaughter per MPC § 3.09(2), not full murder.' },
            { id: 141, unit: 'Unit XI', category: 'Self-Defense', question: 'What did Goetz establish about reasonableness in self-defense?', answer: '"Reasonably" modifies "believes" making it objective standard; but jury considers defendant\'s actual knowledge of victim, physical attributes, prior experiences with aggressor.' },
            { id: 142, unit: 'Unit XI', category: 'Self-Defense', question: 'What did Simon say about the reasonable person standard in self-defense?', answer: 'Belief must be reasonable to reasonable person; prior dealings, anxiety, and mental state are relevant to subjective belief but tested against objective reasonable person standard.' },
            { id: 143, unit: 'Unit XI', category: 'Self-Defense', question: 'What is MPC § 3.09(2) regarding recklessness in self-defense?', answer: 'If defendant was reckless or negligent in believing force was necessary for self-defense, defendant can be convicted of manslaughter (not murder) even if conduct would be murder.' },
            { id: 144, unit: 'Unit XI', category: 'Defenses', question: 'What is imperfect self-defense?', answer: 'Defendant acted with honest but unreasonable belief in necessity of self-defense; may reduce first-degree murder to voluntary manslaughter in some jurisdictions.' },
            { id: 145, unit: 'Unit XI', category: 'Embezzlement', question: 'Who can be guilty of embezzlement?', answer: 'Only someone in lawful possession with a fiduciary duty; employees, bank tellers, trustees, caretakers, attorneys, and others entrusted with property.' },
            { id: 146, unit: 'Unit XI', category: 'Robbery', question: 'When must force occur in robbery relative to the taking?', answer: 'Force can occur before (to overcome resistance), during (to facilitate taking), or after taking but before the defendant reaches safe place; all satisfy robbery elements.' },
            { id: 147, unit: 'Unit XI', category: 'Burglary', question: 'What is the temporal requirement for intent to commit felony in burglary?', answer: 'Intent to commit felony must exist at time of entry; completed when burglar enters with intent even if felony not committed; abandonment does not erase burglary.' },
        ];

        // Spaced Repetition System Application
        const app = {
            cards: [...cardDatabase],
            boxes: {
                1: [],  // Review every session
                2: [],  // Review every 2 sessions
                3: [],  // Review every 4 sessions
                4: [],  // Review every 8 sessions
                5: [],  // Mastered
            },
            session: 1,
            cramMode: false,
            currentReviewCards: [],
            currentCardIndex: 0,
            accuracy: {},
            sessionStats: {},

            init() {
                // Initialize all cards in Box 1
                this.cards.forEach(card => {
                    card.box = 1;
                    card.sessionsSinceReview = 0;
                    if (!this.accuracy[card.unit]) {
                        this.accuracy[card.unit] = { correct: 0, total: 0 };
                    }
                    this.sessionStats[card.unit] = { correct: 0, total: 0 };
                });
                this.updateBoxes();
                this.setupEventListeners();
                this.renderDashboard();
                this.renderFilters();
                this.renderStats();
            },

            updateBoxes() {
                this.boxes = { 1: [], 2: [], 3: [], 4: [], 5: [] };
                this.cards.forEach(card => {
                    this.boxes[card.box].push(card);
                });
            },

            setupEventListeners() {
                document.querySelectorAll('[data-panel]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.switchPanel(e.target.dataset.panel);
                    });
                });
            },

            switchPanel(panelName) {
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(panelName).classList.add('active');
                event.target.classList.add('active');

                if (panelName === 'review') {
                    this.loadReviewSession();
                }
            },

            startNewSession() {
                this.session++;
                this.currentReviewCards = [];
                this.currentCardIndex = 0;
                this.sessionStats = {};
                this.cards.forEach(card => {
                    card.sessionsSinceReview = (card.sessionsSinceReview || 0) + 1;
                });
                this.renderDashboard();
                alert('Session #' + this.session + ' started! Review your due cards.');
            },

            loadReviewSession() {
                const filtered = this.getCardsDueToday();
                this.currentReviewCards = filtered;
                this.currentCardIndex = 0;
                this.renderReviewSession();
            },

            getCardsDueToday() {
                if (this.cramMode) {
                    return this.cards;
                }

                const due = [];
                const intervals = { 1: 1, 2: 2, 3: 4, 4: 8, 5: 999 };

                this.cards.forEach(card => {
                    const sessionsSince = card.sessionsSinceReview || 0;
                    const interval = intervals[card.box];
                    if (sessionsSince >= interval) {
                        due.push(card);
                    }
                });

                return due;
            },

            renderDashboard() {
                const due = this.getCardsDueToday().length;
                const mastered = this.boxes[5].length;

                document.getElementById('cardsDueToday').textContent = due;
                document.getElementById('totalCards').textContent = this.cards.length;
                document.getElementById('sessionNumber').textContent = this.session;
                document.getElementById('masteredCount').textContent = mastered;
                document.getElementById('sessionNumberReview').textContent = this.session;

                const boxBars = document.getElementById('boxBars');
                boxBars.innerHTML = '';

                const names = ['Box 1', 'Box 2', 'Box 3', 'Box 4', 'Mastered'];
                [1, 2, 3, 4, 5].forEach((box, idx) => {
                    const count = this.boxes[box].length;
                    const percent = Math.round((count / this.cards.length) * 100);
                    const width = Math.max(percent, 5);

                    const item = document.createElement('div');
                    item.className = 'box-bar-item';
                    item.innerHTML = `
                        <div class="box-label">${names[idx]}</div>
                        <div class="box-bar-container">
                            <div class="box-bar" style="width: ${width}%">${count}</div>
                        </div>
                        <div class="box-count">${count}</div>
                    `;
                    boxBars.appendChild(item);
                });
            },

            renderFilters() {
                const units = [...new Set(this.cards.map(c => c.unit))];
                const filterButtons = document.getElementById('filterButtons');

                filterButtons.innerHTML = '<button class="filter-btn active" onclick="app.filterByUnit(null)">All Units</button>';

                units.forEach(unit => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.textContent = unit;
                    btn.onclick = () => app.filterByUnit(unit);
                    filterButtons.appendChild(btn);
                });
            },

            filterByUnit(unit) {
                const filtered = unit ? this.getCardsDueToday().filter(c => c.unit === unit) : this.getCardsDueToday();
                this.currentReviewCards = filtered;
                this.currentCardIndex = 0;
                this.renderReviewSession();

                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
            },

            renderReviewSession() {
                const content = document.getElementById('reviewContent');

                if (this.currentReviewCards.length === 0) {
                    content.innerHTML = '<div class="no-cards">No cards due for review in this session. Great job!</div>';
                    return;
                }

                const card = this.currentReviewCards[this.currentCardIndex];
                const progress = `${this.currentCardIndex + 1}/${this.currentReviewCards.length}`;

                content.innerHTML = `
                    <div class="card-container">
                        <div class="card" onclick="app.flipCard(this)">
                            <div class="card-counter">${progress}</div>
                            <div class="card-side" id="cardFront">
                                <div class="card-label">${card.unit} - ${card.category}</div>
                                <div class="card-content">${card.question}</div>
                                <div class="card-flip-hint">Click to reveal answer</div>
                            </div>
                            <div class="card-side" id="cardBack" style="display:none;">
                                <div class="card-label">Answer</div>
                                <div class="card-content">${card.answer}</div>
                                <div class="card-flip-hint">Click to hide answer</div>
                            </div>
                        </div>
                    </div>
                    <div class="rating-buttons">
                        <button class="rating-btn again" onclick="app.rateCard('again')">Again (Box 1)</button>
                        <button class="rating-btn hard" onclick="app.rateCard('hard')">Hard (Same)</button>
                        <button class="rating-btn good" onclick="app.rateCard('good')">Good (+1)</button>
                        <button class="rating-btn easy" onclick="app.rateCard('easy')">Easy (+2)</button>
                    </div>
                `;
            },

            flipCard(element) {
                const front = element.querySelector('#cardFront');
                const back = element.querySelector('#cardBack');

                if (front.style.display === 'none') {
                    front.style.display = 'flex';
                    back.style.display = 'none';
                } else {
                    front.style.display = 'none';
                    back.style.display = 'flex';
                }
            },

            rateCard(rating) {
                const card = this.currentReviewCards[this.currentCardIndex];
                const unit = card.unit;

                if (!this.sessionStats[unit]) {
                    this.sessionStats[unit] = { correct: 0, total: 0 };
                }

                this.sessionStats[unit].total++;

                // Update box placement
                if (rating === 'again') {
                    card.box = 1;
                } else if (rating === 'hard') {
                    // Stay same box
                } else if (rating === 'good') {
                    card.box = Math.min(card.box + 1, 5);
                    this.sessionStats[unit].correct++;
                } else if (rating === 'easy') {
                    card.box = Math.min(card.box + 2, 5);
                    this.sessionStats[unit].correct++;
                }

                card.sessionsSinceReview = 0;
                this.updateBoxes();
                this.renderDashboard();

                // Move to next card
                this.currentCardIndex++;
                if (this.currentCardIndex < this.currentReviewCards.length) {
                    this.renderReviewSession();
                } else {
                    this.endReviewSession();
                }
            },

            endReviewSession() {
                let stats = 'Session Complete!\n\n';
                Object.keys(this.sessionStats).forEach(unit => {
                    const s = this.sessionStats[unit];
                    const accuracy = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
                    stats += `${unit}: ${s.correct}/${s.total} (${accuracy}%)\n`;

                    if (!this.accuracy[unit]) {
                        this.accuracy[unit] = { correct: 0, total: 0 };
                    }
                    this.accuracy[unit].correct += s.correct;
                    this.accuracy[unit].total += s.total;
                });

                document.getElementById('reviewContent').innerHTML = '<div class="empty-state"><h3>Session Complete!</h3><p>Great work! You reviewed ' + this.currentReviewCards.length + ' cards.</p></div>';
                this.renderStats();
            },

            renderStats() {
                const byUnit = document.getElementById('accuracyByUnit');
                byUnit.innerHTML = '';

                Object.keys(this.accuracy).sort().forEach(unit => {
                    const acc = this.accuracy[unit];
                    const percent = acc.total > 0 ? Math.round((acc.correct / acc.total) * 100) : 0;

                    const item = document.createElement('div');
                    item.className = 'accuracy-item';
                    item.innerHTML = `<span>${unit}</span><span class="accuracy-value">${percent}% (${acc.correct}/${acc.total})</span>`;
                    byUnit.appendChild(item);
                });

                const progress = document.getElementById('studyProgress');
                progress.innerHTML = '';

                const totalCards = this.cards.length;
                const masteredCards = this.boxes[5].length;
                const percent = Math.round((masteredCards / totalCards) * 100);

                const item = document.createElement('div');
                item.className = 'accuracy-item';
                item.innerHTML = `<span>Mastery Progress</span><span class="accuracy-value">${percent}% (${masteredCards}/${totalCards})</span>`;
                progress.appendChild(item);
            },

            toggleCramMode() {
                this.cramMode = !this.cramMode;
                const banner = document.getElementById('cramModeBanner');
                if (this.cramMode) {
                    banner.style.display = 'block';
                    alert('Cram mode activated! All cards will be shown, intervals ignored.');
                } else {
                    banner.style.display = 'none';
                    alert('Cram mode deactivated. Spaced repetition intervals restored.');
                }
            }
        };

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
    <script src="../shared.js"></script>
    <script src="../navbar.js"></script>
</body>
</html>
